<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chaty</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --c1: #ff3cac;
    --c2: #784ba0;
    --c3: #2b86c5;
    --c4: #06d6a0;
    --c5: #ffd60a;
    --bg: #0a0a0f;
    --surface: #13131a;
    --surface2: #1e1e2e;
    --border: #2a2a3e;
    --text: #f0f0ff;
    --muted: #6b6b8a;
    --radius: 16px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    overflow: hidden;
  }

  /* ── AUTH SCREEN ── */
  #auth-screen {
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: radial-gradient(ellipse at 20% 50%, #ff3cac22 0%, transparent 60%),
                radial-gradient(ellipse at 80% 20%, #2b86c522 0%, transparent 50%),
                radial-gradient(ellipse at 60% 80%, #784ba022 0%, transparent 50%),
                var(--bg);
  }
  .auth-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 48px 40px;
    width: 420px;
    position: relative;
    overflow: hidden;
  }
  .auth-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--c1), var(--c2), var(--c3), var(--c4));
  }
  .logo {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 2.4rem;
    background: linear-gradient(135deg, var(--c1), var(--c3));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 8px;
  }
  .auth-subtitle { color: var(--muted); font-size: 0.9rem; margin-bottom: 32px; }
  .tabs {
    display: flex;
    gap: 4px;
    background: var(--surface2);
    border-radius: 10px;
    padding: 4px;
    margin-bottom: 28px;
  }
  .tab-btn {
    flex: 1;
    padding: 8px;
    border: none;
    border-radius: 8px;
    background: transparent;
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    cursor: pointer;
    transition: all .2s;
  }
  .tab-btn.active {
    background: linear-gradient(135deg, var(--c1), var(--c2));
    color: #fff;
    font-weight: 500;
  }
  .input-group { margin-bottom: 16px; }
  .input-group label { display: block; font-size: 0.8rem; color: var(--muted); margin-bottom: 6px; }
  .input-group input {
    width: 100%;
    padding: 12px 16px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.95rem;
    outline: none;
    transition: border-color .2s;
  }
  .input-group input:focus { border-color: var(--c1); }
  .auth-btn {
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 10px;
    background: linear-gradient(135deg, var(--c1), var(--c2), var(--c3));
    color: #fff;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 1rem;
    cursor: pointer;
    margin-top: 8px;
    transition: opacity .2s, transform .1s;
  }
  .auth-btn:hover { opacity: 0.9; transform: translateY(-1px); }
  .auth-btn:active { transform: translateY(0); }
  .error-msg {
    color: #ff6b6b;
    font-size: 0.85rem;
    margin-top: 12px;
    display: none;
  }

  /* ── MAIN APP ── */
  #app {
    display: none;
    height: 100vh;
    flex-direction: column;
  }
  #app.visible { display: flex; }

  /* Top nav */
  .topnav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 24px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .topnav .logo { font-size: 1.5rem; margin-bottom: 0; }
  .nav-user { display: flex; align-items: center; gap: 12px; }
  .nav-user span { font-size: 0.85rem; color: var(--muted); }
  .logout-btn {
    padding: 6px 14px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.8rem;
    transition: all .2s;
  }
  .logout-btn:hover { border-color: var(--c1); color: var(--c1); }

  /* Main layout */
  .main-layout {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* Sidebar - user list */
  .sidebar {
    width: 300px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
  }
  .sidebar-header {
    padding: 20px;
    border-bottom: 1px solid var(--border);
  }
  .sidebar-header h2 {
    font-family: 'Syne', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    margin-bottom: 12px;
  }
  .search-box {
    width: 100%;
    padding: 10px 14px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.85rem;
    outline: none;
    transition: border-color .2s;
  }
  .search-box:focus { border-color: var(--c3); }
  .users-list {
    flex: 1;
    overflow-y: auto;
    padding: 12px;
  }
  .users-list::-webkit-scrollbar { width: 4px; }
  .users-list::-webkit-scrollbar-track { background: transparent; }
  .users-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
  .user-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px;
    border-radius: 12px;
    cursor: pointer;
    transition: background .15s;
    border: 1px solid transparent;
  }
  .user-item:hover { background: var(--surface2); }
  .user-item.active {
    background: var(--surface2);
    border-color: var(--border);
  }
  .avatar {
    width: 40px;
    height: 40px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 1rem;
    flex-shrink: 0;
  }
  .user-info { flex: 1; min-width: 0; }
  .user-name {
    font-size: 0.9rem;
    font-weight: 500;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .user-email {
    font-size: 0.75rem;
    color: var(--muted);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .chat-btn-small {
    padding: 5px 10px;
    border-radius: 7px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-size: 0.75rem;
    cursor: pointer;
    white-space: nowrap;
    transition: all .15s;
    font-family: 'DM Sans', sans-serif;
  }
  .chat-btn-small:hover {
    background: linear-gradient(135deg, var(--c1), var(--c2));
    border-color: transparent;
    color: #fff;
  }

  /* Chat area */
  .chat-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .chat-placeholder {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: var(--muted);
    background: radial-gradient(ellipse at center, #784ba011 0%, transparent 70%);
  }
  .chat-placeholder-icon {
    font-size: 4rem;
    margin-bottom: 16px;
    opacity: 0.4;
  }
  .chat-placeholder p { font-size: 1rem; }

  .chat-view { display: none; flex-direction: column; flex: 1; overflow: hidden; }
  .chat-view.active { display: flex; }

  .chat-header {
    padding: 16px 24px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
  }
  .chat-header-info { flex: 1; }
  .chat-header-name {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 1rem;
  }
  .chat-header-status { font-size: 0.75rem; color: var(--c4); }

  .messages-container {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    background: radial-gradient(ellipse at 0% 100%, #ff3cac08, transparent 50%),
                radial-gradient(ellipse at 100% 0%, #2b86c508, transparent 50%),
                var(--bg);
  }
  .messages-container::-webkit-scrollbar { width: 4px; }
  .messages-container::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .msg {
    display: flex;
    flex-direction: column;
    max-width: 65%;
    animation: fadeUp .2s ease;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .msg.sent { align-self: flex-end; align-items: flex-end; }
  .msg.received { align-self: flex-start; align-items: flex-start; }
  .msg-bubble {
    padding: 10px 16px;
    border-radius: 18px;
    font-size: 0.9rem;
    line-height: 1.5;
    word-break: break-word;
  }
  .msg.sent .msg-bubble {
    background: linear-gradient(135deg, var(--c1), var(--c2));
    border-bottom-right-radius: 4px;
    color: #fff;
  }
  .msg.received .msg-bubble {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-bottom-left-radius: 4px;
  }
  .msg-time {
    font-size: 0.7rem;
    color: var(--muted);
    margin-top: 4px;
    padding: 0 4px;
  }

  .chat-input-area {
    padding: 16px 24px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    display: flex;
    gap: 12px;
    align-items: flex-end;
    flex-shrink: 0;
  }
  .msg-input {
    flex: 1;
    padding: 12px 16px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    outline: none;
    resize: none;
    max-height: 120px;
    transition: border-color .2s;
    line-height: 1.4;
  }
  .msg-input:focus { border-color: var(--c1); }
  .send-btn {
    width: 44px;
    height: 44px;
    border-radius: 12px;
    border: none;
    background: linear-gradient(135deg, var(--c1), var(--c2));
    color: #fff;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform .1s, opacity .2s;
    flex-shrink: 0;
  }
  .send-btn:hover { opacity: 0.9; transform: scale(1.05); }
  .send-btn:active { transform: scale(0.97); }
  .send-btn svg { width: 18px; height: 18px; fill: none; stroke: #fff; stroke-width: 2; }

  /* Loading spinner */
  .spinner {
    width: 20px; height: 20px;
    border: 2px solid var(--border);
    border-top-color: var(--c1);
    border-radius: 50%;
    animation: spin .7s linear infinite;
    margin: 20px auto;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Config notice */
  .config-notice {
    position: fixed;
    bottom: 20px; right: 20px;
    background: var(--surface);
    border: 1px solid var(--c5);
    border-radius: 12px;
    padding: 14px 18px;
    font-size: 0.8rem;
    max-width: 340px;
    z-index: 999;
    display: none;
  }
  .config-notice.visible { display: block; }
  .config-notice strong { color: var(--c5); }
  .config-notice code {
    background: var(--surface2);
    padding: 2px 6px;
    border-radius: 4px;
    font-size: 0.75rem;
  }
</style>
</head>

<div class="config-notice" id="config-notice">

<script>
// ── INIT ──────────────────────────────────────────────────────
let supabase;
let currentUser = null;
let currentChatUserId = null;
let allUsers = [];
let realtimeChannel = null;

try {
  if (SUPABASE_URL === 'https://iacrtcghdzjyageyhpdc.supabase.co/') {
    document.getElementById('config-notice').classList.add('visible');
  }
  supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  init();
} catch(e) {
  document.getElementById('config-notice').classList.add('visible');
}

async function init() {
  const { data: { session } } = await supabase.auth.getSession();
  if (session) {
    currentUser = session.user;
    showApp();
  }
  supabase.auth.onAuthStateChange((event, session) => {
    if (session) { currentUser = session.user; showApp(); }
    else { currentUser = null; showAuth(); }
  });
}

// ── AUTH ──────────────────────────────────────────────────────
function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach((b,i) => b.classList.toggle('active', (i===0) === (tab==='login')));
  document.getElementById('login-form').style.display = tab === 'login' ? 'block' : 'none';
  document.getElementById('signup-form').style.display = tab === 'signup' ? 'block' : 'none';
  hideError();
}

function showError(msg) {
  const el = document.getElementById('auth-error');
  el.textContent = msg;
  el.style.display = 'block';
}
function hideError() {
  document.getElementById('auth-error').style.display = 'none';
}

async function doLogin() {
  const email = document.getElementById('login-email').value.trim();
  const pass = document.getElementById('login-pass').value;
  if (!email || !pass) return showError('Fill in all fields.');
  const { error } = await supabase.auth.signInWithPassword({ email, password: pass });
  if (error) showError(error.message);
}

async function doSignup() {
  const name = document.getElementById('signup-name').value.trim();
  const email = document.getElementById('signup-email').value.trim();
  const pass = document.getElementById('signup-pass').value;
  if (!name || !email || !pass) return showError('Fill in all fields.');
  if (pass.length < 6) return showError('Password min 6 characters.');
  const { data, error } = await supabase.auth.signUp({ email, password: pass, options: { data: { display_name: name } } });
  if (error) return showError(error.message);
  // Upsert profile
  if (data.user) {
    await supabase.from('profiles').upsert({ id: data.user.id, display_name: name, email });
  }
}

async function doLogout() {
  if (realtimeChannel) supabase.removeChannel(realtimeChannel);
  await supabase.auth.signOut();
}

// ── SHOW/HIDE ─────────────────────────────────────────────────
function showAuth() {
  document.getElementById('auth-screen').style.display = 'flex';
  document.getElementById('app').classList.remove('visible');
}

async function showApp() {
  document.getElementById('auth-screen').style.display = 'none';
  document.getElementById('app').classList.add('visible');
  // Ensure profile exists
  const meta = currentUser.user_metadata || {};
  const name = meta.display_name || currentUser.email.split('@')[0];
  await supabase.from('profiles').upsert({ id: currentUser.id, display_name: name, email: currentUser.email });
  document.getElementById('nav-username').textContent = name;
  loadUsers();
}

// ── USERS LIST ────────────────────────────────────────────────
const COLORS = [
  'linear-gradient(135deg,#ff3cac,#784ba0)',
  'linear-gradient(135deg,#2b86c5,#06d6a0)',
  'linear-gradient(135deg,#ffd60a,#ff6b6b)',
  'linear-gradient(135deg,#06d6a0,#2b86c5)',
  'linear-gradient(135deg,#ff6b6b,#ff3cac)',
  'linear-gradient(135deg,#784ba0,#2b86c5)',
];
function avatarColor(id) {
  let h = 0; for (const c of id) h = ((h << 5) - h) + c.charCodeAt(0);
  return COLORS[Math.abs(h) % COLORS.length];
}

async function loadUsers() {
  const { data, error } = await supabase.from('profiles').select('*').neq('id', currentUser.id).order('display_name');
  if (error) { document.getElementById('users-list').innerHTML = '<p style="padding:16px;color:var(--muted);font-size:.85rem">Could not load users. Check Supabase setup.</p>'; return; }
  allUsers = data || [];
  renderUsers(allUsers);
}

function renderUsers(users) {
  const list = document.getElementById('users-list');
  if (!users.length) { list.innerHTML = '<p style="padding:16px;color:var(--muted);font-size:.85rem">No users found.</p>'; return; }
  list.innerHTML = users.map(u => `
    <div class="user-item ${currentChatUserId===u.id?'active':''}" id="user-item-${u.id}" onclick="openChat('${u.id}','${u.display_name}')">
      <div class="avatar" style="background:${avatarColor(u.id)}">${u.display_name[0].toUpperCase()}</div>
      <div class="user-info">
        <div class="user-name">${esc(u.display_name)}</div>
        <div class="user-email">${esc(u.email||'')}</div>
      </div>
      <button class="chat-btn-small">Chat</button>
    </div>
  `).join('');
}

function filterUsers() {
  const q = document.getElementById('user-search').value.toLowerCase();
  renderUsers(allUsers.filter(u => u.display_name.toLowerCase().includes(q) || (u.email||'').toLowerCase().includes(q)));
}

// ── CHAT ──────────────────────────────────────────────────────
async function openChat(userId, userName) {
  // Update sidebar active state
  document.querySelectorAll('.user-item').forEach(el => el.classList.remove('active'));
  const item = document.getElementById('user-item-'+userId);
  if (item) item.classList.add('active');

  currentChatUserId = userId;

  document.getElementById('chat-placeholder').style.display = 'none';
  const cv = document.getElementById('chat-view');
  cv.classList.add('active');

  document.getElementById('chat-header-name').textContent = userName;
  const av = document.getElementById('chat-header-avatar');
  av.textContent = userName[0].toUpperCase();
  av.style.background = avatarColor(userId);

  document.getElementById('messages-container').innerHTML = '<div class="spinner"></div>';

  // Load messages
  await loadMessages();

  // Realtime subscription
  if (realtimeChannel) supabase.removeChannel(realtimeChannel);
  realtimeChannel = supabase.channel('chat-'+currentUser.id+'-'+userId)
    .on('postgres_changes', {
      event: 'INSERT', schema: 'public', table: 'messages',
      filter: `sender_id=eq.${userId}`
    }, payload => {
      if (payload.new.receiver_id === currentUser.id && payload.new.sender_id === currentChatUserId) {
        appendMessage(payload.new);
      }
    })
    .subscribe();
}

async function loadMessages() {
  const uid = currentUser.id;
  const other = currentChatUserId;
  const { data } = await supabase.from('messages')
    .select('*')
    .or(`and(sender_id.eq.${uid},receiver_id.eq.${other}),and(sender_id.eq.${other},receiver_id.eq.${uid})`)
    .order('created_at', { ascending: true });

  const container = document.getElementById('messages-container');
  container.innerHTML = '';
  (data||[]).forEach(m => appendMessage(m, false));
  container.scrollTop = container.scrollHeight;
}

function appendMessage(msg, scroll=true) {
  const container = document.getElementById('messages-container');
  const isSent = msg.sender_id === currentUser.id;
  const time = new Date(msg.created_at).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
  const el = document.createElement('div');
  el.className = `msg ${isSent?'sent':'received'}`;
  el.innerHTML = `<div class="msg-bubble">${esc(msg.content)}</div><div class="msg-time">${time}</div>`;
  container.appendChild(el);
  if (scroll) container.scrollTop = container.scrollHeight;
}

async function sendMessage() {
  const input = document.getElementById('msg-input');
  const content = input.value.trim();
  if (!content || !currentChatUserId) return;
  input.value = '';
  input.style.height = '';

  const msg = { sender_id: currentUser.id, receiver_id: currentChatUserId, content };
  const { data, error } = await supabase.from('messages').insert(msg).select().single();
  if (!error && data) appendMessage(data);
}

function handleMsgKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
</script>
