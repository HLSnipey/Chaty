<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Chaty</title>
<style>
  :root {
    --bg: linear-gradient(135deg, #0a0e27 0%, #1a0a3a 50%, #0e1624 100%);
    --bg-solid: #0f1425;
    --surface: linear-gradient(135deg, rgba(30, 20, 60, 0.8) 0%, rgba(20, 30, 60, 0.8) 100%);
    --surface-solid: #1a1530;
    --surface2: rgba(40, 35, 70, 0.8);
    --surface2-solid: #2a2346;
    --surface3: rgba(50, 45, 85, 0.8);
    --surface3-solid: #342d55;
    --border: rgba(100, 150, 255, 0.2);
    --accent: linear-gradient(135deg, #6366f1 0%, #8b5cf6 50%, #d946ef 100%);
    --accent-solid: #7c3aed;
    --accent2: #ec4899;
    --accent-glow: rgba(99, 102, 241, 0.3);
    --text: #f0f4ff;
    --text2: #a5b4fc;
    --text3: #818cf8;
    --danger: #ff6b6b;
    --warning: #ffa500;
    --green: #10b981;
    --cyan: #06b6d4;
    --pink: #ec4899;
    --radius: 16px;
    --radius-sm: 10px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: linear-gradient(135deg, #0a0e27 0%, #1a0a3a 50%, #0e1624 100%); color: var(--text); height: 100dvh; overflow: hidden; }

  /* ── Scrollbars ── */
  ::-webkit-scrollbar { width: 4px; height: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }

  /* ── Auth ── */
  #auth-screen {
    display: flex; align-items: center; justify-content: center;
    height: 100dvh;
    background: linear-gradient(135deg, #0a0e27 0%, #1a0a3a 30%, #1a0a3a 70%, #0e1624 100%);
    position: relative;
    overflow: hidden;
  }
  #auth-screen::before {
    content: '';
    position: absolute;
    top: -50%;
    right: -50%;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle, rgba(99, 102, 241, 0.15) 0%, transparent 70%);
    pointer-events: none;
  }
  .auth-card {
    background: rgba(30, 20, 60, 0.6);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(100, 150, 255, 0.2);
    border-radius: 20px;
    padding: 40px 36px;
    width: 380px;
    max-width: calc(100vw - 32px);
    box-shadow: 0 8px 32px rgba(99, 102, 241, 0.15), inset 0 1px 1px rgba(255,255,255,0.1);
    position: relative;
    z-index: 2;
  }
  .auth-logo { text-align: center; margin-bottom: 28px; }
  .auth-logo h1 { font-size: 2.2rem; font-weight: 800; background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 50%, #ec4899 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
  .auth-logo p { color: var(--text2); font-size: 0.88rem; margin-top: 4px; }
  .auth-tabs { display: flex; background: var(--surface2); border-radius: var(--radius-sm); padding: 3px; margin-bottom: 24px; }
  .auth-tab { flex: 1; padding: 8px; text-align: center; border-radius: 6px; cursor: pointer; font-size: 0.88rem; color: var(--text2); transition: all .2s; }
  .auth-tab.active { background: var(--accent); color: #fff; font-weight: 600; }
  .form-group { margin-bottom: 14px; }
  .form-group label { display: block; font-size: 0.8rem; color: var(--text2); margin-bottom: 6px; font-weight: 500; }
  .form-group input {
    width: 100%; padding: 11px 14px; background: rgba(40, 35, 70, 0.6); border: 1px solid rgba(100, 150, 255, 0.2);
    border-radius: var(--radius-sm); color: var(--text); font-size: 0.95rem; outline: none; transition: all .3s;
  }
  .form-group input:focus { border-color: #6366f1; background: rgba(50, 45, 85, 0.8); box-shadow: 0 0 20px rgba(99, 102, 241, 0.2); }
  .btn { width: 100%; padding: 12px; border: none; border-radius: var(--radius-sm); font-size: 0.95rem; font-weight: 600; cursor: pointer; transition: all .3s; }
  .btn-primary { background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 50%, #d946ef 100%); color: #fff; box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3); }
  .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(99, 102, 241, 0.5); background: linear-gradient(135deg, #7c7eff 0%, #9d7aff 50%, #ff5ee8 100%); }
  .btn-primary:disabled { opacity: .5; cursor: not-allowed; transform: none; }
  .auth-error { color: var(--danger); font-size: 0.82rem; margin-top: 10px; text-align: center; min-height: 18px; }

  /* ── App Shell ── */
  #app { display: none; height: 100dvh; flex-direction: column; }
  #app.visible { display: flex; }

  /* ── Nav ── */
  .nav {
    display: flex; align-items: center; background: rgba(30, 20, 60, 0.6); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(100, 150, 255, 0.2);
    padding: 0 12px; height: 56px; flex-shrink: 0; gap: 2px;
  }
  .nav-brand { font-size: 1.3rem; font-weight: 800; background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 50%, #ec4899 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; margin-right: 12px; }
  .nav-tabs { display: flex; gap: 2px; flex: 1; }
  .nav-tab {
    position: relative; display: flex; align-items: center; gap: 6px;
    padding: 6px 14px; border-radius: var(--radius-sm); cursor: pointer;
    font-size: 0.88rem; color: var(--text2); transition: all .3s; border: none; background: none;
  }
  .nav-tab:hover { background: rgba(99, 102, 241, 0.1); color: var(--text); }
  .nav-tab.active { background: linear-gradient(135deg, rgba(99, 102, 241, 0.6) 0%, rgba(139, 92, 246, 0.6) 100%); color: #fff; box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3); }
  .nav-badge {
    background: var(--danger); color: #fff; font-size: 0.68rem; font-weight: 700;
    min-width: 18px; height: 18px; border-radius: 99px; display: inline-flex; align-items: center; justify-content: center;
    padding: 0 4px;
  }
  .nav-badge:empty, .nav-badge[data-count="0"] { display: none; }
  .nav-user { margin-left: auto; display: flex; align-items: center; gap: 10px; }
  .nav-avatar { width: 32px; height: 32px; border-radius: 50%; background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%); display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 0.85rem; flex-shrink: 0; box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3); }
  .btn-sm { padding: 6px 12px; border-radius: var(--radius-sm); border: 1px solid rgba(100, 150, 255, 0.2); background: rgba(40, 35, 70, 0.6); color: var(--text2); cursor: pointer; font-size: 0.82rem; transition: all .3s; }
  .btn-sm:hover { background: rgba(50, 45, 85, 0.8); color: var(--text); border-color: rgba(100, 150, 255, 0.4); }

  /* ── Pages ── */
  .page { display: none; flex: 1; overflow: hidden; }
  .page.active { display: flex; }

  /* ── Feed ── */
  #feed-page { flex-direction: column; overflow-y: auto; align-items: center; padding: 24px 16px; gap: 16px; }
  .composer {
    background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 16px; width: 100%; max-width: 600px;
  }
  .composer-top { display: flex; gap: 12px; align-items: flex-start; }
  .composer-input {
    flex: 1; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-sm);
    padding: 10px 14px; color: var(--text); font-size: 0.93rem; resize: none; outline: none;
    min-height: 44px; max-height: 120px; font-family: inherit; transition: border-color .2s;
  }
  .composer-input:focus { border-color: var(--accent); }
  .composer-actions { display: flex; align-items: center; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
  .composer-btn {
    padding: 7px 14px; border-radius: var(--radius-sm); border: 1px solid var(--border);
    background: var(--surface2); color: var(--text2); cursor: pointer; font-size: 0.82rem;
    display: flex; align-items: center; gap: 5px; transition: all .2s;
  }
  .composer-btn:hover { border-color: var(--accent); color: var(--accent); }
  .post-btn { margin-left: auto; background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 600; }
  .post-btn:hover { background: var(--accent2); border-color: var(--accent2); color: #fff; }
  .upload-preview { margin-top: 10px; position: relative; display: inline-block; }
  .upload-preview img, .upload-preview video { max-width: 100%; max-height: 200px; border-radius: var(--radius-sm); }
  .upload-preview .remove-btn { position: absolute; top: 4px; right: 4px; background: rgba(0,0,0,0.7); border: none; color: #fff; border-radius: 50%; width: 22px; height: 22px; cursor: pointer; font-size: 0.9rem; display: flex; align-items: center; justify-content: center; }
  .progress-bar { height: 3px; background: var(--surface3); border-radius: 99px; margin-top: 8px; overflow: hidden; display: none; }
  .progress-fill { height: 100%; background: var(--accent); border-radius: 99px; transition: width .3s; width: 0; }

  .post-card {
    background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 16px; width: 100%; max-width: 600px;
  }
  .post-header { display: flex; gap: 10px; align-items: center; margin-bottom: 12px; }
  .post-avatar { width: 38px; height: 38px; border-radius: 50%; background: var(--accent); display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 0.9rem; flex-shrink: 0; }
  .post-meta { flex: 1; }
  .post-author { font-weight: 600; font-size: 0.93rem; }
  .post-time { font-size: 0.78rem; color: var(--text3); }
  .post-text { font-size: 0.93rem; line-height: 1.55; margin-bottom: 10px; word-break: break-word; }
  .post-media { margin-bottom: 10px; border-radius: var(--radius-sm); overflow: hidden; }
  .post-media img { width: 100%; max-height: 400px; object-fit: cover; cursor: pointer; }
  .post-media video { width: 100%; max-height: 400px; }
  .post-media a { color: var(--accent); font-size: 0.88rem; text-decoration: none; display: flex; align-items: center; gap: 6px; padding: 8px; background: var(--surface2); border-radius: var(--radius-sm); }
  .reactions-bar { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px; }
  .reaction-btn {
    display: flex; align-items: center; gap: 4px; padding: 4px 10px;
    border-radius: 99px; border: 1px solid var(--border); background: var(--surface2);
    cursor: pointer; font-size: 0.82rem; color: var(--text2); transition: all .2s; position: relative;
  }
  .reaction-btn:hover, .reaction-btn.reacted { border-color: var(--accent); background: var(--accent-glow); color: var(--accent); }
  .reaction-btn .count { font-weight: 600; }
  .react-picker {
    display: flex; gap: 4px; padding: 6px; background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius-sm); box-shadow: 0 4px 20px rgba(0,0,0,0.4);
  }
  .react-pick { cursor: pointer; font-size: 1.2rem; padding: 4px; border-radius: 6px; transition: transform .15s; }
  .react-pick:hover { transform: scale(1.3); }
  .post-footer { display: flex; gap: 8px; border-top: 1px solid var(--border); padding-top: 10px; }
  .post-action { flex: 1; display: flex; align-items: center; justify-content: center; gap: 6px; padding: 7px; border-radius: var(--radius-sm); cursor: pointer; font-size: 0.85rem; color: var(--text2); transition: all .2s; }
  .post-action:hover { background: var(--surface2); color: var(--text); }
  .comments-section { margin-top: 12px; border-top: 1px solid var(--border); padding-top: 12px; display: none; }
  .comment-item { display: flex; gap: 8px; margin-bottom: 10px; }
  .comment-body { background: var(--surface2); border-radius: var(--radius-sm); padding: 8px 12px; flex: 1; }
  .comment-author { font-size: 0.8rem; font-weight: 600; margin-bottom: 2px; }
  .comment-text { font-size: 0.88rem; }
  .comment-input-row { display: flex; gap: 8px; margin-top: 8px; }
  .comment-input { flex: 1; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 8px 12px; color: var(--text); font-size: 0.88rem; outline: none; font-family: inherit; }
  .comment-input:focus { border-color: var(--accent); }
  .comment-send { background: var(--accent); border: none; border-radius: var(--radius-sm); color: #fff; padding: 8px 14px; cursor: pointer; font-size: 0.88rem; }

  /* Chat page background fix for mobile */
  #chat-page {
    background: var(--bg);
    min-height: 100vh;
  }

  #messages-area {
    background: var(--bg);
    height: calc(100vh - 200px);
    overflow-y: auto;
    padding: 16px;
  }

  @media (max-width: 768px) {
    #chat-page {
      background: var(--bg) !important;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 10;
    }
    
    #messages-area {
      background: var(--bg) !important;
      height: calc(100vh - 160px) !important;
    }
    
    .pages {
      background: var(--bg);
    }
  }

  /* Tooltip */
  .tooltip {
    position: absolute; bottom: calc(100% + 6px); left: 50%; transform: translateX(-50%);
    background: var(--surface3); border: 1px solid var(--border); border-radius: 6px;
    padding: 5px 10px; font-size: 0.76rem; white-space: nowrap; color: var(--text2);
    pointer-events: none; opacity: 0; transition: opacity .15s; z-index: 100;
  }
  .reaction-btn:hover .tooltip { opacity: 1; }

  /* ── People ── */
  #people-page { flex-direction: column; overflow-y: auto; padding: 24px 16px; gap: 16px; }
  .people-header { display: flex; align-items: center; gap: 12px; max-width: 900px; width: 100%; margin: 0 auto; }
  .search-input {
    flex: 1; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm);
    padding: 10px 14px; color: var(--text); font-size: 0.93rem; outline: none; transition: border-color .2s;
  }
  .search-input:focus { border-color: var(--accent); }
  .people-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px; max-width: 900px; width: 100%; margin: 0 auto; }
  .person-card {
    background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 20px 16px; display: flex; flex-direction: column; align-items: center; gap: 8px; text-align: center;
    transition: border-color .2s, transform .2s;
  }
  .person-card:hover { border-color: var(--accent); transform: translateY(-2px); }
  .person-avatar { width: 52px; height: 52px; border-radius: 50%; background: var(--accent); display: flex; align-items: center; justify-content: center; font-size: 1.2rem; font-weight: 700; }
  .person-name { font-weight: 600; font-size: 0.93rem; }
  .person-email { font-size: 0.78rem; color: var(--text3); word-break: break-all; }
  .btn-msg { margin-top: 4px; padding: 7px 16px; border-radius: var(--radius-sm); background: var(--accent); border: none; color: #fff; font-size: 0.82rem; font-weight: 600; cursor: pointer; transition: background .2s; }
  .btn-msg:hover { background: var(--accent2); }

  /* ── Chat ── */
  #chat-page { flex-direction: row; overflow: hidden; }
  .chat-sidebar {
    width: 280px; flex-shrink: 0; border-right: 1px solid var(--border);
    display: flex; flex-direction: column; background: var(--surface);
  }
  .sidebar-head { padding: 14px 14px 10px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 8px; }
  .sidebar-head h3 { flex: 1; font-size: 0.95rem; font-weight: 700; }
  .btn-new-group { background: var(--accent); border: none; color: #fff; border-radius: var(--radius-sm); width: 28px; height: 28px; cursor: pointer; font-size: 1.1rem; display: flex; align-items: center; justify-content: center; }
  .chat-search { padding: 10px 14px; border-bottom: 1px solid var(--border); }
  .chat-list { flex: 1; overflow-y: auto; }
  .chat-item {
    display: flex; align-items: center; gap: 10px; padding: 12px 14px;
    cursor: pointer; transition: background .15s; border-left: 3px solid transparent; position: relative;
  }
  .chat-item:hover { background: var(--surface2); }
  .chat-item.active { background: var(--accent-glow); border-left-color: var(--accent); }
  .chat-item-avatar { width: 40px; height: 40px; border-radius: 50%; background: var(--accent); display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 0.9rem; flex-shrink: 0; }
  .chat-item-info { flex: 1; min-width: 0; }
  .chat-item-name { font-weight: 600; font-size: 0.9rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .chat-item-preview { font-size: 0.78rem; color: var(--text3); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .chat-item-badge { background: var(--danger); color: #fff; font-size: 0.68rem; font-weight: 700; min-width: 18px; height: 18px; border-radius: 99px; display: flex; align-items: center; justify-content: center; padding: 0 4px; }

  .chat-panel { flex: 1; display: flex; flex-direction: column; min-width: 0; }
  .chat-empty { flex: 1; display: flex; align-items: center; justify-content: center; color: var(--text3); font-size: 0.95rem; }
  .chat-header {
    padding: 12px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px;
    background: var(--surface); flex-shrink: 0;
  }
  .chat-header-back { display: none; background: none; border: none; color: var(--text2); cursor: pointer; font-size: 1.2rem; padding: 4px; }
  .chat-header-info { flex: 1; }
  .chat-header-name { font-weight: 700; font-size: 0.95rem; }
  .chat-header-status { font-size: 0.78rem; color: var(--text3); }
  .call-btn { background: none; border: 1px solid var(--border); border-radius: var(--radius-sm); color: var(--text2); padding: 7px 10px; cursor: pointer; transition: all .2s; font-size: 1rem; }
  .call-btn:hover { border-color: var(--accent); color: var(--accent); }
  .messages-area { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 4px; }
  .msg-row { display: flex; align-items: flex-end; gap: 8px; }
  .msg-row.me { flex-direction: row-reverse; }
  .msg-avatar { width: 28px; height: 28px; border-radius: 50%; background: var(--surface3); display: flex; align-items: center; justify-content: center; font-size: 0.7rem; font-weight: 700; flex-shrink: 0; }
  .msg-bubble-wrap { max-width: 65%; display: flex; flex-direction: column; gap: 2px; }
  .msg-row.me .msg-bubble-wrap { align-items: flex-end; }
  .msg-sender-name { font-size: 0.72rem; color: var(--text3); padding: 0 4px; }
  .msg-bubble {
    padding: 9px 13px; border-radius: 16px; font-size: 0.9rem; line-height: 1.45; word-break: break-word;
    background: var(--surface2); color: var(--text); border-bottom-left-radius: 4px; position: relative; cursor: pointer;
  }
  .msg-row.me .msg-bubble { background: var(--accent); border-bottom-left-radius: 16px; border-bottom-right-radius: 4px; }
  .msg-bubble img { max-width: 240px; border-radius: 8px; display: block; }
  .msg-bubble video, .msg-bubble audio { max-width: 240px; border-radius: 8px; display: block; }
  .msg-bubble a { color: inherit; }
  .msg-file-link { display: flex; align-items: center; gap: 8px; text-decoration: none; background: rgba(0,0,0,0.2); border-radius: 8px; padding: 8px; }
  .msg-time { font-size: 0.7rem; color: var(--text3); padding: 0 4px; }
  .msg-reactions { display: flex; gap: 3px; flex-wrap: wrap; padding: 0 4px; }
  .msg-reaction { display: flex; align-items: center; gap: 3px; padding: 2px 7px; border-radius: 99px; background: var(--surface2); border: 1px solid var(--border); font-size: 0.78rem; cursor: pointer; position: relative; }
  .msg-reaction:hover .tooltip { opacity: 1; }
  .msg-reaction .tooltip { bottom: auto; top: auto; bottom: calc(100% + 4px); }
  .msg-emoji-picker {
    position: absolute; bottom: calc(100% + 4px); z-index: 99; display: none;
    background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm);
    padding: 6px; box-shadow: 0 4px 20px rgba(0,0,0,0.4); gap: 4px; flex-wrap: wrap; width: 200px;
  }
  .msg-row.me .msg-emoji-picker { right: 0; left: auto; }
  .msg-emoji-picker .react-pick { font-size: 1.3rem; }

  .chat-input-bar {
    padding: 12px 16px; border-top: 1px solid var(--border); background: var(--surface);
    display: flex; align-items: flex-end; gap: 8px; flex-shrink: 0;
  }
  .chat-attach-btn { background: none; border: 1px solid var(--border); border-radius: var(--radius-sm); color: var(--text2); padding: 9px 11px; cursor: pointer; font-size: 1rem; transition: all .2s; flex-shrink: 0; }
  .chat-attach-btn:hover { border-color: var(--accent); color: var(--accent); }
  .chat-text-input {
    flex: 1; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-sm);
    padding: 10px 14px; color: var(--text); font-size: 0.93rem; outline: none; resize: none;
    max-height: 100px; min-height: 42px; font-family: inherit; transition: border-color .2s;
  }
  .chat-text-input:focus { border-color: var(--accent); }
  .record-btn { background: none; border: 1px solid var(--border); border-radius: var(--radius-sm); color: var(--text2); padding: 9px 11px; cursor: pointer; font-size: 1rem; transition: all .2s; flex-shrink: 0; }
  .record-btn.recording { background: var(--danger); border-color: var(--danger); color: #fff; animation: pulse 1s infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .6; } }
  .send-btn { background: var(--accent); border: none; border-radius: var(--radius-sm); color: #fff; padding: 10px 14px; cursor: pointer; font-size: 1rem; flex-shrink: 0; transition: background .2s; }
  .send-btn:hover { background: var(--accent2); }

  /* ── Modals ── */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(4px);

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const app = initializeApp(firebaseConfig);

// ══════════════════════════════════════════════════════════════════

let currentUser = null;

// ══════════════════════════════════════════════════════════════════
//  DOM HELPERS
// ══════════════════════════════════════════════════════════════════
const $ = id => document.getElementById(id);
const el = (tag, cls, html) => { const e = document.createElement(tag); if(cls) e.className = cls; if(html) e.innerHTML = html; return e; };
function timeAgo(ts) {
  const s = Math.floor((Date.now() - (ts?.toMillis?.() ?? ts)) / 1000);
  if(s < 60) return "just now";
  if(s < 3600) return `${Math.floor(s/60)}m ago`;
  if(s < 86400) return `${Math.floor(s/3600)}h ago`;
  return `${Math.floor(s/86400)}d ago`;
}
function avatarLetter(name="?") { return (name[0]||"?").toUpperCase(); }
function showPage(name) {
  document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
  document.querySelectorAll(".nav-tab").forEach(t => t.classList.toggle("active", t.dataset.page === name));
  $(`${name}-page`).classList.add("active");
  if(name === "people") loadPeople();
  if(name === "chat") { if(chatsUnsub === null) listenChats(); }
  if(name === "feed") { newPostCount = 0; updateFeedBadge(); }
}
function updateFeedBadge() {
  const b = $("feed-badge"); b.textContent = newPostCount > 0 ? newPostCount : ""; b.dataset.count = newPostCount;
}

// ══════════════════════════════════════════════════════════════════
//  AUTH
// ══════════════════════════════════════════════════════════════════
document.querySelectorAll(".auth-tab").forEach(t => {
  t.addEventListener("click", () => {
    document.querySelectorAll(".auth-tab").forEach(x=>x.classList.remove("active"));
    t.classList.add("active");
    $("login-form").style.display = t.dataset.tab === "login" ? "" : "none";
    $("signup-form").style.display = t.dataset.tab === "signup" ? "" : "none";
  });
});

$("btn-login").addEventListener("click", async () => {
  const email = $("login-email").value.trim(), pass = $("login-pass").value;
  if(!email||!pass) return setErr("Fill in all fields");
  $("btn-login").disabled = true;
  try {
    await signInWithEmailAndPassword(auth, email, pass);
  } catch(e) { setErr(e.message); $("btn-login").disabled = false; }
});
$("btn-signup").addEventListener("click", async () => {
  const name = $("signup-name").value.trim();
  const email = $("signup-email").value.trim();
  const pass = $("signup-pass").value;
  if(!name||!email||!pass) return setErr("Fill in all fields");
  if(pass.length < 6) return setErr("Password must be at least 6 characters");
  $("btn-signup").disabled = true;
  setErr("");
  try {
    const cred = await createUserWithEmailAndPassword(auth, email, pass);
    try {
      await setDoc(doc(db,"users",cred.user.uid), {
        name, email, uid: cred.user.uid, createdAt: serverTimestamp()
      });
    } catch(firestoreErr) {
      console.warn("Profile save failed:", firestoreErr);
      // Auth succeeded, continue anyway
    }
  } catch(e) {
    setErr(e.message);
    $("btn-signup").disabled = false;
  }
});
$("btn-logout").addEventListener("click", () => signOut(auth));
function setErr(msg) { $("auth-error").textContent = msg; }

onAuthStateChanged(auth, async user => {
  if(user) {
    currentUser = user;
    const snap = await getDoc(doc(db,"users",user.uid));
    if(snap.exists()) currentUser.profile = snap.data();
    $("auth-screen").style.display = "none";
    $("app").classList.add("visible");
    const letter = avatarLetter(currentUser.profile?.name || user.email);

    loadFeed();
    listenCalls();

    $("app").classList.remove("visible");

    if(postsUnsub) { postsUnsub(); postsUnsub = null; }
    if(callsUnsub) { callsUnsub(); callsUnsub = null; }
  }
});

document.querySelectorAll(".nav-tab").forEach(t => {

});

// ══════════════════════════════════════════════════════════════════

// ══════════════════════════════════════════════════════════════════
async function preloadUsers() {
  const snap = await getDocs(collection(db,"users"));
  snap.forEach(d => { allUsers[d.id] = d.data(); });
}

// ══════════════════════════════════════════════════════════════════
//  CLOUDINARY UPLOAD
// ══════════════════════════════════════════════════════════════════
async function uploadToCloudinary(file, onProgress) {
  const fd = new FormData();
  fd.append("file", file);
  fd.append("upload_preset", CLOUDINARY_UPLOAD_PRESET);
  fd.append("cloud_name", CLOUDINARY_CLOUD_NAME);
  return new Promise((resolve, reject) => {
    const xhr = new XMLHttpRequest();
    xhr.open("POST", `https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD_NAME}/auto/upload`);
    xhr.upload.onprogress = e => { if(e.lengthComputable && onProgress) onProgress(e.loaded/e.total*100); };
    xhr.onload = () => {
      try {
        const res = JSON.parse(xhr.responseText);
        if(res.error) reject(new Error(res.error.message));
        else resolve(res);
      } catch(e) { reject(e); }
    };
    xhr.onerror = () => reject(new Error("Upload failed"));
    xhr.send(fd);
  });
}

// ══════════════════════════════════════════════════════════════════
//  FEED
// ══════════════════════════════════════════════════════════════════
function loadFeed() {
  if(postsUnsub) postsUnsub();
  const q = query(collection(db,"posts"), orderBy("createdAt","desc"), limit(50));
  let first = true;
  postsUnsub = onSnapshot(q, snap => {
    if(first) {
      first = false;
      $("posts-container").innerHTML = "";
      snap.docs.forEach(d => renderPost(d.id, d.data(), true));
      if(snap.docs.length > 0) latestPostTs = snap.docs[0].data().createdAt;
    } else {
      snap.docChanges().forEach(ch => {
        if(ch.type === "added") {
          const data = ch.doc.data();
          if(latestPostTs && data.createdAt && data.createdAt > latestPostTs) {
            if($("feed-page").classList.contains("active")) {
              renderPost(ch.doc.id, data, false, true);
            } else {
              newPostCount++;
              updateFeedBadge();
            }
            latestPostTs = data.createdAt;
          }
        } else if(ch.type === "modified") {
          const existing = document.querySelector(`[data-post-id="${ch.doc.id}"]`);
          if(existing) updatePostReactions(existing, ch.doc.data());
        }
      });
    }
  });
}

function renderPost(pid, data, append=true, prepend=false) {
  const mine = data.authorId === currentUser?.uid;
  const card = el("div","post-card");
  card.dataset.postId = pid;
  const initial = avatarLetter(data.authorName);
  let mediaHtml = "";
  
  // Check if media exists and render accordingly
  if(data.mediaUrl) {
    if(data.mediaType === "image") {
      mediaHtml = `<div class="post-media"><img src="${data.mediaUrl}" alt="post image" style="max-width:100%;border-radius:var(--radius);cursor:pointer;" onclick="document.getElementById('lightbox').classList.add('open');document.getElementById('lightbox-img').src='${data.mediaUrl}'"/></div>`;
    } else if(data.mediaType === "video") {
      mediaHtml = `<div class="post-media"><video src="${data.mediaUrl}" controls style="max-width:100%;border-radius:var(--radius);"></video></div>`;
    } else {
      mediaHtml = `<div class="post-media"><a href="${data.mediaUrl}" target="_blank" rel="noopener noreferrer">📎 ${data.fileName||"Download file"}</a></div>`;
    }
  }
  
  const reactHtml = buildReactionsHtml(data.reactions||{}, pid, "post");
  card.innerHTML = `
    <div class="post-header">
      <div style="display:flex;align-items:center;gap:8px;">
        <div class="avatar" style="background:var(--accent);width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;">${initial}</div>
        <div>
          <div style="font-weight:600;">${escapeHtml(data.authorName)}</div>
          <div style="font-size:0.8rem;color:var(--text2);">${timeAgo(data.createdAt)}</div>
        </div>
      </div>
    </div>
    ${data.text ? `<div class="post-text">${escapeHtml(data.text)}</div>` : ""}
    ${mediaHtml}
    <div class="reactions-bar">${reactHtml}</div>
    <div class="post-footer">
      <button class="post-action" data-comments-toggle="${pid}">💬 Comments</button>
    </div>
    <div class="comments-section" id="comments-${pid}"></div>
  `;
  const container = $("posts-container");
  if(prepend) container.insertBefore(card, container.firstChild);
  else if(append) container.appendChild(card);
}

function buildReactionsHtml(reactions, id, type) {
  return EMOJIS.map(emoji => {
    const users = reactions[emoji]||[];
    if(users.length === 0) return "";
    const reacted = users.includes(currentUser?.uid);
    const names = users.map(u => allUsers[u]?.name||"User").join(", ");
    return `<div class="reaction-btn ${reacted?"reacted":""}" data-react="${emoji}" data-id="${id}" data-type="${type}">
      ${emoji} <span class="count">${users.length}</span>
      <span class="tooltip">${names}</span>
    </div>`;
  }).join("") + `<div class="reaction-btn add-react" data-add-react="${id}" data-type="${type}">+ <span class="tooltip">Add reaction</span></div>`;
}

function updatePostReactions(card, data) {
  const pid = card.dataset.postId;
  const bar = card.querySelector(".reactions-bar");

// Reaction picker popover (feed)
document.addEventListener("click", async e => {
  // close pickers
  document.querySelectorAll(".popover.open").forEach(p => { if(!e.target.closest("[data-add-react]")) p.classList.remove("open"); });

  // post react button → show picker
  if(e.target.closest("[data-add-react]")) {
    const btn = e.target.closest("[data-add-react]");
    const id = btn.dataset.addReact;
    const type = btn.dataset.type;
    let picker = btn.querySelector(".popover");
    if(!picker) {
      picker = el("div","popover");
      picker.style.cssText = "bottom:calc(100% + 4px);left:0;";
      picker.innerHTML = `<div class="react-picker">${EMOJIS.map(em=>`<span class="react-pick" data-emoji="${em}" data-id="${id}" data-type="${type}">${em}</span>`).join("")}</div>`;
      btn.style.position = "relative";
      btn.appendChild(picker);
    }
    picker.classList.toggle("open");
    e.stopPropagation();
    return;
  }

  // emoji pick
  if(e.target.closest(".react-pick")) {
    const s = e.target.closest(".react-pick");
    await reactTo(s.dataset.type, s.dataset.id, s.dataset.emoji);
    s.closest(".popover")?.classList.remove("open");
    return;
  }

  // existing reaction toggle
  if(e.target.closest("[data-react]") && !e.target.closest("[data-add-react]")) {
    const btn = e.target.closest("[data-react]");
    await reactTo(btn.dataset.type, btn.dataset.id, btn.dataset.react);
    return;
  }

  // comments toggle
  if(e.target.closest("[data-comments-toggle]")) {
    const pid = e.target.closest("[data-comments-toggle]").dataset.commentsToggle;
    const section = $(`comments-${pid}`);
    if(!section) return;
    const visible = section.style.display === "block";
    section.style.display = visible ? "none" : "block";
    if(!visible && section.childElementCount === 0) loadComments(pid, section);
  }
});

async function reactTo(type, id, emoji) {
  const uid = currentUser.uid;
  if(type === "post") {
    const ref = doc(db,"posts",id);
    const snap = await getDoc(ref);
    const reactions = snap.data()?.reactions || {};
    const cur = reactions[emoji] || [];
    const update = cur.includes(uid)
      ? { [`reactions.${emoji}`]: arrayRemove(uid) }
      : { [`reactions.${emoji}`]: arrayUnion(uid) };
    await updateDoc(ref, update);
  } else if(type === "msg") {
    const parts = id.split("__");
    const chatId = parts[0], msgId = parts[1];
    const ref = doc(db,"chats",chatId,"messages",msgId);
    const snap = await getDoc(ref);
    const reactions = snap.data()?.reactions || {};
    const cur = reactions[emoji] || [];
    const update = cur.includes(uid)
      ? { [`reactions.${emoji}`]: arrayRemove(uid) }
      : { [`reactions.${emoji}`]: arrayUnion(uid) };
    await updateDoc(ref, update);
  }
}

function loadComments(pid, section) {
  const q = query(collection(db,"posts",pid,"comments"), orderBy("createdAt","asc"));
  onSnapshot(q, snap => {
    section.innerHTML = "";
    snap.docs.forEach(d => {
      const c = d.data();
      const item = el("div","comment-item");
      item.innerHTML = `
        <div class="post-avatar" style="width:28px;height:28px;font-size:0.75rem">${avatarLetter(c.authorName)}</div>
        <div class="comment-body">
          <div class="comment-author">${c.authorName}</div>
          <div class="comment-text">${escapeHtml(c.text)}</div>
        </div>`;
      section.appendChild(item);
    });
    const row = el("div","comment-input-row");
    row.innerHTML = `<input class="comment-input" placeholder="Add a comment…"/><button class="comment-send">Send</button>`;
    row.querySelector(".comment-send").addEventListener("click", async () => {
      const input = row.querySelector(".comment-input");
      const text = input.value.trim();
      if(!text) return;
      await addDoc(collection(db,"posts",pid,"comments"), {
        text, authorId: currentUser.uid, authorName: currentUser.profile?.name||"User", createdAt: serverTimestamp()
      });
      await updateDoc(doc(db,"posts",pid), { commentCount: increment(1) });
      input.value = "";
    });
    row.querySelector(".comment-input").addEventListener("keydown", e => { if(e.key==="Enter") row.querySelector(".comment-send").click(); });
    section.appendChild(row);
  });
}

async function openDmWith(otherUid) {
  showPage("chat");
  // ensure user cache is loaded
  if(!allUsers[otherUid]) {
    const snap = await getDoc(doc(db,"users",otherUid));
    if(snap.exists()) allUsers[otherUid] = snap.data();
  }
  const members = [currentUser.uid, otherUid].sort();
  const roomId = members.join("_");
  const ref = doc(db,"chats",roomId);
  const snap = await getDoc(ref);
  if(!snap.exists()) {
    await setDoc(ref, { members, isGroup: false, createdAt: serverTimestamp() });
  }
  openChat(roomId, false);
}

function listenChats() {
  const q = query(collection(db,"chats"), where("members","array-contains",currentUser.uid));
  chatsUnsub = onSnapshot(q, snap => {
    const list = [];
    snap.forEach(d => list.push({ id: d.id, ...d.data() }));
    renderChatList(list);
  });
}

function renderChatList(chats) {
  const list = $("chat-list"); list.innerHTML = "";
  let totalUnread = 0;
  chats.sort((a,b) => (b.lastTs||0) - (a.lastTs||0));
  chats.forEach(ch => {
    const name = ch.isGroup ? ch.name : getChatName(ch.members);
    const item = el("div","chat-item");
    item.dataset.chatId = ch.id;
    if(ch.id === activeChatId) item.classList.add("active");
    const unread = ch[`unread_${currentUser.uid}`]||0;
    totalUnread += unread;
    item.innerHTML = `
      <div class="chat-item-avatar">${avatarLetter(name)}</div>
      <div class="chat-item-info">
        <div class="chat-item-name">${escapeHtml(name)}</div>
        <div class="chat-item-preview">${escapeHtml(ch.lastMsg||"")}</div>
      </div>
      ${unread > 0 ? `<div class="chat-item-badge">${unread}</div>` : ""}`;
    item.addEventListener("click", () => openChat(ch.id, ch.isGroup, ch));
    list.appendChild(item);
  });
  const badge = $("chat-badge");
  badge.textContent = totalUnread > 0 ? totalUnread : "";
  badge.dataset.count = totalUnread;
}

function getChatName(members) {
  const other = members.find(uid => uid !== currentUser.uid);
  return allUsers[other]?.name || other || "Chat";
}

function openChat(chatId, isGroup, chatData) {
  activeChatId = chatId; activeChatIsGroup = isGroup;
  if(chatData) activeChatMembers = chatData.members||[];

  document.querySelectorAll(".chat-item").forEach(i => i.classList.remove("active"));
  document.querySelectorAll(`.chat-item`).forEach(i => {
      i.classList.toggle("active", i.dataset.chatId === chatId);
  });

  // mobile open
  $("chat-panel").classList.add("open");
  $("chat-empty").style.display = "none";
  $("active-chat").style.display = "flex";

  const name = isGroup ? (chatData?.name||"Group") : getChatName(activeChatMembers);
  $("chat-header-name").textContent = name;
  $("chat-header-status").textContent = isGroup ? `${activeChatMembers.length} members` : "";
  $("btn-voice-call").style.display = isGroup ? "none" : "";
  $("btn-video-call").style.display = isGroup ? "none" : "";

  // clear unread
  updateDoc(doc(db,"chats",chatId), { [`unread_${currentUser.uid}`]: 0 }).catch(()=>{});

  if(msgUnsub) msgUnsub();
  const msgQ = query(collection(db,"chats",chatId,"messages"), orderBy("createdAt","asc"), limit(100));
  const area = $("messages-area"); area.innerHTML = "";
  msgUnsub = onSnapshot(msgQ, snap => {
    snap.docChanges().forEach(ch => {
      if(ch.type === "added") appendMessage(ch.doc.id, ch.doc.data(), chatId);
      else if(ch.type === "modified") updateMsgReactions(ch.doc.id, ch.doc.data(), chatId);
    });
    area.scrollTop = area.scrollHeight;
  });
}

function appendMessage(mid, data, chatId) {
  const area = $("messages-area");
  const mine = data.from === currentUser?.uid;
  const row = el("div",`msg-row ${mine?"me":""}`);
  row.dataset.msgId = mid;
  const senderName = data.senderName||allUsers[data.from]?.name||"User";
  let content = "";
  if(data.type === "text") content = `<span>${escapeHtml(data.text)}</span>`;
  else if(data.type === "image") content = `<img src="${data.url}" alt="" onclick="document.getElementById('lightbox').classList.add('open');document.getElementById('lightbox-img').src='${data.url}'"/>`;
  else if(data.type === "video") content = `<video src="${data.url}" controls></video>`;
  else if(data.type === "audio") content = `<audio src="${data.url}" controls></audio>`;
  else content = `<a class="msg-file-link" href="${data.url}" target="_blank">📎 ${escapeHtml(data.fileName||"File")}</a>`;

  const reactId = `${chatId}__${mid}`;
  const existingReacts = buildMsgReactionsHtml(data.reactions||{}, reactId);

  row.innerHTML = `
    ${!mine ? `<div class="msg-avatar">${avatarLetter(senderName)}</div>` : ""}
    <div class="msg-bubble-wrap">
      ${!mine && activeChatIsGroup ? `<div class="msg-sender-name">${escapeHtml(senderName)}</div>` : ""}
      <div class="msg-bubble" data-msg-id="${mid}">
        ${content}
        <div class="msg-emoji-picker">${EMOJIS.map(em=>`<span class="react-pick" data-emoji="${em}" data-id="${reactId}" data-type="msg">${em}</span>`).join("")}</div>
      </div>
      <div class="msg-reactions">${existingReacts}</div>
      <div class="msg-time">${timeAgo(data.createdAt)}</div>
    </div>`;

  row.querySelector(".msg-bubble").addEventListener("click", e => {
    if(e.target.tagName === "IMG" || e.target.tagName === "VIDEO" || e.target.tagName === "AUDIO" || e.target.tagName === "A") return;
    const picker = row.querySelector(".msg-emoji-picker");
    document.querySelectorAll(".msg-emoji-picker").forEach(p => { if(p !== picker) p.style.display = "none"; });
    picker.style.display = picker.style.display === "flex" ? "none" : "flex";
    e.stopPropagation();
  });
  document.addEventListener("click", () => { row.querySelector(".msg-emoji-picker") && (row.querySelector(".msg-emoji-picker").style.display="none"); }, { once: true });
  area.appendChild(row);
}

function updateMsgReactions(mid, data, chatId) {
  const row = document.querySelector(`[data-msg-id="${mid}"]`);
  if(!row) return;
  const reactId = `${chatId}__${mid}`;
  const reactDiv = row.querySelector(".msg-reactions");
  if(reactDiv) reactDiv.innerHTML = buildMsgReactionsHtml(data.reactions||{}, reactId);
}

function buildMsgReactionsHtml(reactions, reactId) {
  return EMOJIS.map(emoji => {
    const users = reactions[emoji]||[];
    if(!users.length) return "";
    const reacted = users.includes(currentUser?.uid);
    const names = users.map(u => allUsers[u]?.name||"User").join(", ");
    return `<div class="msg-reaction ${reacted?"reacted":""}" data-react="${emoji}" data-id="${reactId}" data-type="msg">
      ${emoji} ${users.length}
      <span class="tooltip">${names}</span>
    </div>`;
  }).join("");
}

// Message send
async function sendMessage(chatId, payload) {

$("record-btn").addEventListener("click", async () => {
  if(!isRecording) {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      mediaRecorder = new MediaRecorder(stream);
      audioChunks = [];
      mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
      mediaRecorder.onstop = async () => {
        const blob = new Blob(audioChunks, { type:"audio/webm" });
        const file = new File([blob],"voice.webm",{type:"audio/webm"});
        stream.getTracks().forEach(t=>t.stop());
        if(activeChatId) {
          $("chat-progress-bar").style.display = "block";
          try {
            const res = await uploadToCloudinary(file, p=>{ $("chat-progress-fill").style.width=p+"%"; });

          } catch(e) { console.error(e); }
          $("chat-progress-bar").style.display="none";
          $("chat-progress-fill").style.width="0";
        }
      };
      mediaRecorder.start();
      isRecording = true;
      $("record-btn").classList.add("recording");
      $("record-btn").title = "Stop recording";
    } catch(e) { alert("Microphone access denied"); }
  } else {
    mediaRecorder.stop();
    isRecording = false;
    $("record-btn").classList.remove("recording");

//  CALLS (WebRTC)
// ══════════════════════════════════════════════════════════════════
let currentCallId = null;
let callerId = null;

$("btn-voice-call").addEventListener("click", () => startCall(false));
$("btn-video-call").addEventListener("click", () => startCall(true));

async function startCall(video) {
  if(!activeChatId) return;
  isVideoCall = video;
  const other = activeChatMembers.find(uid => uid !== currentUser.uid);
  if(!other) return;
  localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video }).catch(e => { alert("Media error: "+e.message); return null; });
  if(!localStream) return;

  peerConnection = new RTCPeerConnection(STUN);
  localStream.getTracks().forEach(t => peerConnection.addTrack(t, localStream));
  remoteStream = new MediaStream();
  $("remote-video").srcObject = remoteStream;
  $("local-video").srcObject = localStream;
  peerConnection.ontrack = e => e.streams[0].getTracks().forEach(t => remoteStream.addTrack(t));

  const callRef = await addDoc(collection(db,"calls"), {
    callerId: currentUser.uid, calleeId: other, isVideo: video,
    status: "ringing", offer: null, answer: null,
    callerCandidates: [], calleeCandidates: []
  });
  currentCallId = callRef.id;

  peerConnection.onicecandidate = async e => {
    if(e.candidate) await updateDoc(callRef, { callerCandidates: arrayUnion(e.candidate.toJSON()) });
  };

  const offer = await peerConnection.createOffer();
  await peerConnection.setLocalDescription(offer);
  await updateDoc(callRef, { offer: { type: offer.type, sdp: offer.sdp } });

  $("call-peer-name").textContent = allUsers[other]?.name||"Calling…";
  $("call-status").textContent = "Ringing…";
  $("call-overlay").classList.add("open");

  callsUnsub = onSnapshot(callRef, async snap => {
    const data = snap.data();
    if(!data) return;
    if(data.answer && peerConnection.currentRemoteDescription === null) {
      await peerConnection.setRemoteDescription(new RTCSessionDescription(data.answer));
      $("call-status").textContent = "Connected";
    }
    (data.calleeCandidates||[]).forEach(async c => {
      try { await peerConnection.addIceCandidate(new RTCIceCandidate(c)); } catch(e) {}
    });
    if(data.status === "ended") endCall();
  });
}

function listenCalls() {
  if(!currentUser) return;
  const q = query(collection(db,"calls"), where("calleeId","==",currentUser.uid), where("status","==","ringing"));
  callsUnsub = onSnapshot(q, snap => {
    snap.docChanges().forEach(ch => {
      if(ch.type === "added") {
        const data = ch.doc.data();
        currentCallId = ch.doc.id;
        callerId = data.callerId;
        $("incoming-caller").textContent = allUsers[callerId]?.name||"Someone";
        $("incoming-type").textContent = data.isVideo ? "📹 Video call" : "📞 Voice call";
        $("incoming-call").classList.add("open");
      }
    });
  });
}

$("btn-accept-call").addEventListener("click", async () => {
  $("incoming-call").classList.remove("open");
  const callRef = doc(db,"calls",currentCallId);
  const snap = await getDoc(callRef);
  const data = snap.data();
  isVideoCall = data.isVideo;
  localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: isVideoCall }).catch(()=>null);
  if(!localStream) return;

  peerConnection = new RTCPeerConnection(STUN);
  localStream.getTracks().forEach(t => peerConnection.addTrack(t, localStream));
  remoteStream = new MediaStream();
  $("remote-video").srcObject = remoteStream;
  $("local-video").srcObject = localStream;
  peerConnection.ontrack = e => e.streams[0].getTracks().forEach(t => remoteStream.addTrack(t));
  peerConnection.onicecandidate = async e => {
    if(e.candidate) await updateDoc(callRef, { calleeCandidates: arrayUnion(e.candidate.toJSON()) });
  };

  await peerConnection.setRemoteDescription(new RTCSessionDescription(data.offer));
  const answer = await peerConnection.createAnswer();
  await peerConnection.setLocalDescription(answer);
  await updateDoc(callRef, { answer: { type: answer.type, sdp: answer.sdp }, status: "answered" });

  (data.callerCandidates||[]).forEach(async c => {
    try { await peerConnection.addIceCandidate(new RTCIceCandidate(c)); } catch(e){}
  });

  $("call-peer-name").textContent = allUsers[callerId]?.name||"Caller";
  $("call-status").textContent = "Connected";
  $("call-overlay").classList.add("open");
});

$("btn-reject-call").addEventListener("click", async () => {
  $("incoming-call").classList.remove("open");
  if(currentCallId) await updateDoc(doc(db,"calls",currentCallId), { status: "ended" }).catch(()=>{});
  currentCallId = null;
});

$("btn-end-call").addEventListener("click", endCall);
async function endCall() {
  $("call-overlay").classList.remove("open");
  if(peerConnection) { peerConnection.close(); peerConnection = null; }
  if(localStream) { localStream.getTracks().forEach(t=>t.stop()); localStream = null; }
  if(currentCallId) {
    await updateDoc(doc(db,"calls",currentCallId), { status: "ended" }).catch(()=>{});
    currentCallId = null;
  }
}

let muted = false, camOff = false;
$("btn-mute").addEventListener("click", () => {
  muted = !muted;
  localStream?.getAudioTracks().forEach(t => t.enabled = !muted);
  $("btn-mute").textContent = muted ? "🔇" : "🎙️";
});
$("btn-cam").addEventListener("click", () => {
  camOff = !camOff;
  localStream?.getVideoTracks().forEach(t => t.enabled = !camOff);
  $("btn-cam").textContent = camOff ? "🚫" : "📹";
});

function escapeHtml(str) {
  return (str||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#39;");
}

// Auto-resize textareas
["post-text","chat-text"].forEach(id => {
  const ta = $(id); if(!ta) return;
  ta.addEventListener("input", () => { ta.style.height="auto"; ta.style.height=ta.scrollHeight+"px"; });
});
