/* ════ CHAT — SIDEBAR ════════════════════════════ */
function renderChatList(list){
  var el=g('cs-list');
  if(!list.length){el.innerHTML='<p style="padding:12px;color:var(--muted);font-size:.8rem;font-weight:500">No users found.</p>';return}

  var html='<div class="cs-section-label">Direct Messages</div>';
  html+=list.map(function(u){
    var roomId=[me.uid,u.id].sort().join('_');
    var act=chatWith===roomId?' active':'';
    return '<div class="cs-row'+act+'" data-uid="'+u.id+'" data-name="'+esc(u.name)+'" data-room="'+roomId+'" data-type="dm">'
      +'<div class="cs-av" style="background:'+grad(u.id)+'">'+u.name[0].toUpperCase()+'</div>'
      +'<div class="cs-info"><div class="cs-name">'+esc(u.name)+'</div><div class="cs-last">'+esc(u.email||'')+'</div></div>'
      +'<span class="cs-unread" id="unread-'+roomId+'"></span>'
      +'</div>';
  }).join('');
  el.innerHTML=html;

  el.querySelectorAll('.cs-row[data-type="dm"]').forEach(function(row){
    listenUnreadForRoom(row.dataset.room);
    row.addEventListener('click',function(){openDM(row.dataset.uid,row.dataset.name)});
  });

  loadGroups();
}

/* Start group unread listeners at boot */
function loadGroupsAtBoot(){
  var q=FB.query(FB.collection(FB.db,'groups'),FB.where('members','array-contains',me.uid));
  FB.onSnapshot(q,function(snap){
    snap.forEach(function(d){listenUnreadForRoom(d.id);});
  });
}

async function loadGroups(){
  var q=FB.query(FB.collection(FB.db,'groups'),FB.where('members','array-contains',me.uid));
  FB.onSnapshot(q,function(snap){
    var existing=g('cs-list').querySelector('.cs-section-label.groups');
    if(existing){var next=existing;while(next&&next.classList&&next.classList.contains('cs-group-row')){var nx=next.nextSibling;next.remove();next=nx}; existing.remove();}
    if(snap.empty)return;
    var label=document.createElement('div');label.className='cs-section-label groups';label.textContent='Groups';
    g('cs-list').appendChild(label);
    snap.forEach(function(d){
      var grp=Object.assign({id:d.id},d.data());
      var act=chatWith===grp.id?' active':'';
      var row=document.createElement('div');
      row.className='cs-row cs-group-row'+act;
      row.dataset.room=grp.id;row.dataset.type='group';row.dataset.gname=grp.name;
      row.innerHTML='<div class="cs-av" style="background:var(--grad-cool)">👥</div>'
        +'<div class="cs-info"><div class="cs-name">'+esc(grp.name)+'</div><div class="cs-last">'+grp.members.length+' members</div></div>'
        +'<span class="cs-unread" id="unread-'+grp.id+'"></span>';
      listenUnreadForRoom(grp.id);
      row.addEventListener('click',function(){openGroup(grp.id,grp.name,grp.members)});
      g('cs-list').appendChild(row);
    });
  });
}

/* ════ CREATE GROUP ══════════════════════════════ */
function openGroupModal(){
  selectedMembers=[];
  g('group-name-input').value='';
  var ml=g('member-list');
  ml.innerHTML=allUsers.map(function(u){
    return '<div class="member-row" data-uid="'+u.id+'"><div class="cs-av" style="background:'+grad(u.id)+';width:28px;height:28px;font-size:.75rem">'+u.name[0].toUpperCase()+'</div>'
      +'<span style="flex:1;font-size:.85rem;font-weight:500">'+esc(u.name)+'</span>'
      +'<div class="member-check"></div></div>';
  }).join('');
  ml.querySelectorAll('.member-row').forEach(function(row){
    row.addEventListener('click',function(){
      var uid=row.dataset.uid;
      if(selectedMembers.includes(uid)){selectedMembers=selectedMembers.filter(function(x){return x!==uid});row.classList.remove('selected');row.querySelector('.member-check').textContent='';}
      else{selectedMembers.push(uid);row.classList.add('selected');row.querySelector('.member-check').textContent='✓';}
    });
  });
  g('group-modal').classList.add('on');
}
function closeGroupModal(){g('group-modal').classList.remove('on')}
async function createGroup(){
  var name=g('group-name-input').value.trim();
  if(!name)return;
  if(selectedMembers.length===0)return showErrorModal('Create Group','Please select at least one member to create a group.');
  var members=[me.uid].concat(selectedMembers);
  var ref=await FB.addDoc(FB.collection(FB.db,'groups'),{name:name,members:members,createdBy:me.uid,createdAt:FB.serverTimestamp()});
  closeGroupModal();
  openGroup(ref.id,name,members);
  switchPage('chat');
}

/* ════ OPEN CHAT — DM / GROUP ════════════════════ */
function openDM(uid,uname){
  var roomId=[me.uid,uid].sort().join('_');
  chatWith=roomId;chatWithName=uname;chatIsGroup=false;
  g('ch-name').textContent=uname;
  g('ch-sub').textContent='Online';
  var av=g('ch-av');av.textContent=uname[0].toUpperCase();av.style.background=grad(uid);
  g('btn-voice-call').dataset.peer=uid;g('btn-video-call').dataset.peer=uid;
  g('call-overlay').dataset.peer=uid;g('call-overlay').dataset.pname=uname;
  openChatRoom(roomId,false);
}
function openGroup(gid,gname,members){
  chatWith=gid;chatWithName=gname;chatIsGroup=true;
  g('ch-name').textContent=gname;
  g('ch-sub').textContent=members.length+' members';
  var av=g('ch-av');av.textContent='👥';av.style.background='var(--grad-cool)';
  openChatRoom(gid,true);
}
function openChatRoom(roomId,isGroup){
  document.querySelectorAll('.cs-row').forEach(function(r){r.classList.remove('active')});
  var row=document.querySelector('[data-room="'+roomId+'"]');if(row)row.classList.add('active');
  g('chat-empty').style.display='none';g('chat-active').classList.add('on');
  if(mob()){g('chat-sidebar').classList.add('away');g('chat-main').classList.add('here')}
  if(chatUnsubFn){chatUnsubFn();chatUnsubFn=null}
  g('msgs-area').innerHTML='<div class="spin"></div>';
  var q=FB.query(FB.collection(FB.db,'chats/'+roomId+'/messages'),FB.orderBy('createdAt','asc'));
  chatUnsubFn=FB.onSnapshot(q,function(snap){
    var area=g('msgs-area'),wasBottom=area.scrollHeight-area.clientHeight<=area.scrollTop+60;
    area.innerHTML='';
    snap.forEach(function(d){appendChatMsg(Object.assign({id:d.id},d.data()),isGroup)});
    if(wasBottom||area.children.length<=20)area.scrollTop=area.scrollHeight;
  });
  unreadCounts[roomId]=0;
  totalUnread=Object.values(unreadCounts).reduce(function(a,b){return a+b},0);
  updateChatBadge();
  var activeRow=document.querySelector('[data-room="'+roomId+'"]');
  if(activeRow){var ab=activeRow.querySelector('.cs-unread');if(ab)setBadge(ab,0);}
  markRoomRead(roomId);
  if(!isGroup)FB.setDoc(FB.doc(FB.db,'chats',roomId),{members:[me.uid,chatWith.replace(me.uid,'').replace('_','')]},{merge:true}).catch(function(){});
}

/* ════ MESSAGE RENDERING ═════════════════════════ */
function appendChatMsg(msg,isGroup){
  var area=g('msgs-area');
  var out=msg.from===me.uid;
  var row=document.createElement('div');row.className='msg-row '+(out?'out':'in');row.dataset.mid=msg.id;

  var t=msg.createdAt&&msg.createdAt.toDate?msg.createdAt.toDate().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}):'';

  if(isGroup&&!out){
    var senderName=msg.senderName||'User';
    var sn=document.createElement('div');sn.className='msg-sender-name';sn.textContent=senderName;row.appendChild(sn);
  }

  var bubble=document.createElement('div');
  if(msg.type==='image'){
    bubble.innerHTML='<img class="msg-img" src="'+esc(msg.url)+'" loading="lazy">';
    bubble.querySelector('.msg-img').addEventListener('click',function(){openLightbox(msg.url)});
  } else if(msg.type==='audio'){
    bubble.className='msg-bubble';
    bubble.innerHTML='<div class="msg-audio">🎙️ <audio src="'+esc(msg.url)+'" controls></audio></div>';
  } else if(msg.type==='video'){
    bubble.innerHTML='<video src="'+esc(msg.url)+'" controls style="max-width:220px;border-radius:14px;display:block"></video>';
  } else if(msg.type==='file'){
    bubble.className='msg-bubble';
    bubble.innerHTML='<a class="msg-file-link" href="'+esc(msg.url)+'" target="_blank" rel="noopener">📎 '+esc(msg.fileName||'File')+'</a>';
  } else {
    bubble.className='msg-bubble';bubble.textContent=msg.text||'';
  }

  bubble.addEventListener('contextmenu',function(e){e.preventDefault();showReactPicker(e,msg.id,chatWith,out)});
  var pressTimer;
  bubble.addEventListener('touchstart',function(){pressTimer=setTimeout(function(){showReactPicker(null,msg.id,chatWith,out,bubble)},500)},{passive:true});
  bubble.addEventListener('touchend',function(){clearTimeout(pressTimer)});

  var bubbleWrap=document.createElement('div');
  bubbleWrap.className='msg-bubble-wrap';
  bubbleWrap.appendChild(bubble);

  var canDeleteMsg=(msg.from===me.uid||ADMIN_UIDS.includes(me.uid));
  if(canDeleteMsg){
    var mBtn=document.createElement('button');
    mBtn.className='msg-menu-btn';mBtn.textContent='⋯';mBtn.title='More options';
    mBtn.addEventListener('click',function(e){
      e.stopPropagation();
      document.querySelectorAll('.overflow-menu').forEach(function(m){m.remove()});
      var menu=document.createElement('div');menu.className='overflow-menu';
      menu.style.top='calc(100% + 4px)';
      menu.style[out?'right':'left']='0';
      var dBtn=document.createElement('button');dBtn.className='overflow-menu-item danger';
      dBtn.textContent='🗑️ Delete message';
      dBtn.addEventListener('click',function(ev){
        ev.stopPropagation();menu.remove();
        deleteChatMsg(msg.id,chatWith,msg.url||null);
      });
      menu.appendChild(dBtn);
      bubbleWrap.appendChild(menu);
      setTimeout(function(){
        document.addEventListener('click',function h(){menu.remove();document.removeEventListener('click',h)},{once:true});
      },0);
    });
    bubbleWrap.appendChild(mBtn);
  }
  row.appendChild(bubbleWrap);

  var reacts=msg.reactions||{};
  var reactKeys=Object.keys(reacts).filter(function(e){return reacts[e]&&reacts[e].length>0});
  if(reactKeys.length){
    var strip=document.createElement('div');strip.className='msg-reactions';
    reactKeys.forEach(function(emoji){
      var arr=reacts[emoji];var mine=arr.includes(me.uid);
      var names=arr.map(function(uid){
        if(uid===me.uid)return'You';
        var u=allUsers.find(function(x){return x.id===uid});return u?u.name:uid.slice(0,6);
      }).join(', ');
      var btn=document.createElement('button');btn.className='msg-react-btn'+(mine?' mine':'');
      btn.innerHTML=emoji+'<span style="font-size:.72rem;margin-left:2px">'+arr.length+'</span>'
        +'<span class="react-tooltip">'+esc(names)+'</span>';
      btn.addEventListener('click',function(e){e.stopPropagation();toggleMsgReaction(msg.id,chatWith,emoji)});
      strip.appendChild(btn);
    });
    row.appendChild(strip);
  }

  var ts=document.createElement('div');ts.className='msg-ts';ts.textContent=t;row.appendChild(ts);
  area.appendChild(row);
}

async function deleteChatMsg(mid, roomId, mediaUrl){
  if(!confirm('Delete this message? This cannot be undone.'))return;
  try{
    await FB.deleteDoc(FB.doc(FB.db,'chats/'+roomId+'/messages',mid));
  }catch(e){showErrorModal('Delete failed',e.message||'Could not delete the message. Please try again.')}
}

function showReactPicker(e,msgId,roomId,out,anchor){
  document.querySelectorAll('.react-picker').forEach(function(p){p.remove()});
  var picker=document.createElement('div');
  picker.className='react-picker '+(out?'out':'in');
  MSG_REACTIONS.forEach(function(emoji){
    var btn=document.createElement('button');btn.className='react-picker-btn';btn.textContent=emoji;
    btn.addEventListener('click',function(ev){ev.stopPropagation();toggleMsgReaction(msgId,roomId,emoji);picker.remove()});
    picker.appendChild(btn);
  });
  if(anchor){anchor.style.position='relative';anchor.appendChild(picker);}
  else if(e){
    var target=e.target.closest('.msg-row');
    if(target){target.style.position='relative';target.appendChild(picker);}
  }
  setTimeout(function(){document.addEventListener('click',function h(){picker.remove();document.removeEventListener('click',h)})},0);
}

async function toggleMsgReaction(msgId,roomId,emoji){
  var ref=FB.doc(FB.db,'chats/'+roomId+'/messages',msgId);
  var snap=await FB.getDoc(ref);if(!snap.exists())return;
  var reactions=snap.data().reactions||{};
  var arr=reactions[emoji]||[];
  var update={};
  if(arr.includes(me.uid))update['reactions.'+emoji]=FB.arrayRemove(me.uid);
  else update['reactions.'+emoji]=FB.arrayUnion(me.uid);
  await FB.updateDoc(ref,update);
}

/* ════ SEND MESSAGE ══════════════════════════════ */
async function sendChatMsg(){
  if(!chatWith)return;
  var text=g('chat-ta').value.trim();
  if(!text&&!chatFilePending)return;
  g('chat-ta').value='';g('chat-ta').style.height='auto';

  if(chatFilePending){
    var file=chatFilePending;clearChatFile();
    try{
      var res=await uploadFile(file,function(pct){if(g('cup-fill'))g('cup-fill').style.width=pct+'%'});
      var type=file.type.startsWith('image')?'image':file.type.startsWith('video')?'video':file.type.startsWith('audio')?'audio':'file';
      var msgData={from:me.uid,type:type,url:res.url,read:false,createdAt:FB.serverTimestamp()};
      if(type==='file')msgData.fileName=file.name;
      if(chatIsGroup)msgData.senderName=myName;
      await FB.addDoc(FB.collection(FB.db,'chats/'+chatWith+'/messages'),msgData);
    }catch(e){showErrorModal('Upload failed',e.message||'Could not upload the file. Please try again.')}
    return;
  }
  var msgData={from:me.uid,text:text,type:'text',read:false,createdAt:FB.serverTimestamp()};
  if(chatIsGroup)msgData.senderName=myName;
  await FB.addDoc(FB.collection(FB.db,'chats/'+chatWith+'/messages'),msgData);
}

/* ── Chat file attach ─────────────────────────── */
function onChatFileSelect(file){
  if(!file)return;chatFilePending=file;
  var cup=g('cup'),thumb=g('cup-thumb'),name=g('cup-name'),fill=g('cup-fill');
  fill.style.width='0%';name.textContent=file.name;
  if(file.type.startsWith('image'))thumb.src=URL.createObjectURL(file);
  else{thumb.src='';thumb.style.display='none';}
  cup.classList.add('show');
}
function clearChatFile(){
  chatFilePending=null;
  g('cup').classList.remove('show');
  g('cup-thumb').src='';g('cup-thumb').style.display='';
  g('cup-name').textContent='';g('cup-fill').style.width='0%';
}

/* ── Voice recording ──────────────────────────── */
async function toggleVoiceRecording(){
  if(mediaRecorder&&mediaRecorder.state==='recording'){
    mediaRecorder.stop();return;
  }
  try{
    var stream=await navigator.mediaDevices.getUserMedia({audio:true});
    audioChunks=[];mediaRecorder=new MediaRecorder(stream);
    mediaRecorder.ondataavailable=function(e){if(e.data.size>0)audioChunks.push(e.data)};
    mediaRecorder.onstop=async function(){
      stream.getTracks().forEach(function(t){t.stop()});
      var blob=new Blob(audioChunks,{type:'audio/webm'});
      var file=new File([blob],'voice-'+Date.now()+'.webm',{type:'audio/webm'});
      try{
        var res=await uploadFile(file,function(){});
        var msgData={from:me.uid,type:'audio',url:res.url,read:false,createdAt:FB.serverTimestamp()};
        if(chatIsGroup)msgData.senderName=myName;
        await FB.addDoc(FB.collection(FB.db,'chats/'+chatWith+'/messages'),msgData);
      }catch(e){showErrorModal('Upload failed',e.message||'Could not upload the voice message.')}
      g('chat-mic-btn').classList.remove('recording');
    };
    mediaRecorder.start();
    g('chat-mic-btn').classList.add('recording');
  }catch(e){showErrorModal('Microphone error','Could not access microphone. Please check your browser permissions.')}
}

/* ════ CALLS (WebRTC) ════════════════════════════ */
var ICE={iceServers:[{urls:'stun:stun.l.google.com:19302'},{urls:'stun:stun1.l.google.com:19302'}]};

async function startCall(isVideo){
  if(!chatWith||chatIsGroup){
    showErrorModal('Calls unavailable','Voice and video calls are only available in 1-on-1 direct messages, not group chats.');
    return;
  }
  var peerId=g('btn-voice-call').dataset.peer;
  var pname=g('call-overlay').dataset.pname||chatWithName;
  if(!peerId)return;
  callIsVideo=isVideo;isCaller=true;
  callRoomId='call_'+[me.uid,peerId].sort().join('_');
  showCallOverlay(pname,grad(peerId),'Calling…',false);
  try{localStream=await navigator.mediaDevices.getUserMedia({audio:true,video:isVideo});}
  catch(e){
    showErrorModal('Access denied','Microphone or camera access was denied. Please allow it in your browser settings and try again.');
    hideCallOverlay();return;
  }
  if(isVideo){g('call-local-video').srcObject=localStream;g('call-video-wrap').classList.add('on');g('btn-cam').classList.remove('hidden')}
  pc=new RTCPeerConnection(ICE);
  localStream.getTracks().forEach(function(t){pc.addTrack(t,localStream)});
  pc.onicecandidate=function(e){if(e.candidate)FB.updateDoc(FB.doc(FB.db,'calls',callRoomId),{callerCandidates:FB.arrayUnion(JSON.stringify(e.candidate))}).catch(function(){})};
  pc.ontrack=function(e){g('call-remote-video').srcObject=e.streams[0];if(isVideo)g('call-video-wrap').classList.add('on')};
  var offer=await pc.createOffer();await pc.setLocalDescription(offer);
  await FB.setDoc(FB.doc(FB.db,'calls',callRoomId),{offer:{type:offer.type,sdp:offer.sdp},callerId:me.uid,callerName:myName,calleeId:peerId,isVideo:isVideo,status:'ringing',callerCandidates:[],calleeCandidates:[]});
  callUnsub=FB.onSnapshot(FB.doc(FB.db,'calls',callRoomId),async function(snap){
    var data=snap.data();if(!data)return;
    if(data.status==='answered'&&data.answer&&pc.signalingState==='have-local-offer'){
      await pc.setRemoteDescription(new RTCSessionDescription(data.answer));
      (data.calleeCandidates||[]).forEach(function(c){pc.addIceCandidate(new RTCIceCandidate(JSON.parse(c))).catch(function(){})});
      g('call-status').textContent='Connected';
    }
    if(data.status==='ended')hangup();
  });
}

function listenIncomingCalls(){
  FB.onSnapshot(FB.query(FB.collection(FB.db,'calls'),FB.where('calleeId','==',me.uid),FB.where('status','==','ringing')),function(snap){
    snap.docChanges().forEach(function(change){
      if(change.type==='added'){
        var data=change.doc.data();
        if(!g('call-overlay').classList.contains('on')){
          callRoomId=change.doc.id;isCaller=false;callIsVideo=data.isVideo;
          showCallOverlay(data.callerName||'Someone',grad(data.callerId||'x'),'Incoming '+(data.isVideo?'video':'voice')+' call…',true);
        }
      }
    });
  });
}

async function acceptCall(){
  if(!callRoomId)return;
  g('btn-accept').classList.add('hidden');g('call-status').textContent='Connecting…';
  var snap=await FB.getDoc(FB.doc(FB.db,'calls',callRoomId));
  var data=snap.data();if(!data)return;
  try{localStream=await navigator.mediaDevices.getUserMedia({audio:true,video:data.isVideo});}
  catch(e){
    showErrorModal('Access denied','Microphone or camera access was denied. Please allow it in your browser settings.');
    hangup();return;
  }
  if(data.isVideo){g('call-local-video').srcObject=localStream;g('call-video-wrap').classList.add('on');g('btn-cam').classList.remove('hidden')}
  pc=new RTCPeerConnection(ICE);
  localStream.getTracks().forEach(function(t){pc.addTrack(t,localStream)});
  pc.onicecandidate=function(e){if(e.candidate)FB.updateDoc(FB.doc(FB.db,'calls',callRoomId),{calleeCandidates:FB.arrayUnion(JSON.stringify(e.candidate))}).catch(function(){})};
  pc.ontrack=function(e){g('call-remote-video').srcObject=e.streams[0]};
  await pc.setRemoteDescription(new RTCSessionDescription(data.offer));
  (data.callerCandidates||[]).forEach(function(c){pc.addIceCandidate(new RTCIceCandidate(JSON.parse(c))).catch(function(){})});
  var answer=await pc.createAnswer();await pc.setLocalDescription(answer);
  await FB.updateDoc(FB.doc(FB.db,'calls',callRoomId),{answer:{type:answer.type,sdp:answer.sdp},status:'answered'});
  callUnsub=FB.onSnapshot(FB.doc(FB.db,'calls',callRoomId),function(snap){
    if(snap.data()&&snap.data().status==='ended')hangup();
  });
  g('call-status').textContent='Connected';
}

async function hangup(){
  if(callRoomId)await FB.updateDoc(FB.doc(FB.db,'calls',callRoomId),{status:'ended'}).catch(function(){});
  if(pc){pc.close();pc=null}
  if(localStream)localStream.getTracks().forEach(function(t){t.stop()});localStream=null;
  if(callUnsub){callUnsub();callUnsub=null}
  callRoomId=null;isMuted=false;isCamOff=false;
  g('call-remote-video').srcObject=null;g('call-local-video').srcObject=null;
  g('call-video-wrap').classList.remove('on');g('btn-cam').classList.add('hidden');
  g('btn-accept').classList.add('hidden');
  hideCallOverlay();
}

function toggleMute(){
  if(!localStream)return;isMuted=!isMuted;
  localStream.getAudioTracks().forEach(function(t){t.enabled=!isMuted});
  g('btn-mute').classList.toggle('off',isMuted);g('btn-mute').title=isMuted?'Unmute':'Mute';
}
function toggleCam(){
  if(!localStream)return;isCamOff=!isCamOff;
  localStream.getVideoTracks().forEach(function(t){t.enabled=!isCamOff});
  g('btn-cam').classList.toggle('off',isCamOff);g('btn-cam').title=isCamOff?'Camera on':'Camera off';
}

function showCallOverlay(pname,pg,status,showAccept){
  var av=g('call-peer-av');av.textContent=pname[0].toUpperCase();av.style.background=pg;
  g('call-peer-name').textContent=pname;g('call-status').textContent=status;
  if(showAccept)g('btn-accept').classList.remove('hidden');
  g('call-overlay').classList.add('on');
}
function hideCallOverlay(){g('call-overlay').classList.remove('on')}

/* ════ UPLOAD (CLOUDINARY) ═══════════════════════ */
function uploadFile(file,onProgress){
  return new Promise(function(resolve,reject){
    if(CLOUDINARY_CLOUD_NAME==='YOUR_CLOUD_NAME'){reject(new Error('Cloudinary is not configured. Add your cloud name and upload preset.'));return}
    var fd=new FormData();fd.append('file',file);fd.append('upload_preset',CLOUDINARY_UPLOAD_PRESET);
    var xhr=new XMLHttpRequest();
    xhr.open('POST','https://api.cloudinary.com/v1_1/'+CLOUDINARY_CLOUD_NAME+'/auto/upload',true);
    xhr.upload.onprogress=function(e){if(e.lengthComputable&&onProgress)onProgress(Math.round(e.loaded/e.total*100))};
    xhr.onload=function(){
      if(xhr.status===200){resolve({url:JSON.parse(xhr.responseText).secure_url});}
      else reject(new Error('Upload failed (status '+xhr.status+'). Check your Cloudinary upload preset is set to Unsigned.'));
    };
    xhr.onerror=function(){reject(new Error('Upload network error — check your internet connection and try again.'))};
    xhr.send(fd);
  });
}
