// ─── VOICE RECORDING ─────────────────────────────
g('chat-mic-btn').onclick=function(){
  if(!mediaRecorder||mediaRecorder.state==='inactive'){startRecording();}
  else{stopRecording();}
};

function startRecording(){
  navigator.mediaDevices.getUserMedia({audio:true}).then(function(stream){
    audioChunks=[];
    mediaRecorder=new MediaRecorder(stream);
    mediaRecorder.ondataavailable=function(e){audioChunks.push(e.data);};
    mediaRecorder.onstop=function(){
      stream.getTracks().forEach(function(t){t.stop();});
      var blob=new Blob(audioChunks,{type:'audio/webm'});
      var file=new File([blob],'voice.webm',{type:'audio/webm'});
      chatFilePending=file;
      g('cup').classList.remove('hidden');g('cup-name').textContent='🎙️ Voice message';g('cup-thumb').style.display='none';
      sendMessage();
    };
    mediaRecorder.start();
    g('chat-mic-btn').classList.add('recording');
  }).catch(function(){showErrorModal('Mic Error','Could not access microphone.');});
}
function stopRecording(){if(mediaRecorder&&mediaRecorder.state!=='inactive'){mediaRecorder.stop();g('chat-mic-btn').classList.remove('recording');}}

// ─── UNREAD SYSTEM ───────────────────────────────
function listenUnreadForRoom(roomId){
  var q=FB.query(FB.collection(FB.db,'chats',roomId,'messages'),FB.where('from','!=',me.uid),FB.where('read','==',false));
  unreadUnsubs[roomId]=FB.onSnapshot(q,function(snap){
    unreadCounts[roomId]=snap.size;
    totalUnread=Object.values(unreadCounts).reduce(function(a,b){return a+b;},0);
    setBadge(g('badge-chat'),totalUnread);
    renderChatSidebar();renderGroupsSidebar();
  });
}

function markRoomRead(roomId){
  var q=FB.query(FB.collection(FB.db,'chats',roomId,'messages'),FB.where('from','!=',me.uid),FB.where('read','==',false));
  FB.getDocs(q).then(function(snap){
    snap.forEach(function(d){FB.updateDoc(d.ref,{read:true});});
  });
}

// ─── NOTIFICATIONS ───────────────────────────────
function createNotification(toUid,fromUid,fromName,type,body){
  if(toUid===me.uid)return;
  FB.addDoc(FB.collection(FB.db,'notifications'),{toUid:toUid,fromUid:fromUid,fromName:fromName,type:type,body:body,read:false,createdAt:FB.serverTimestamp()});
}

function initNotifications(){
  notifFirstLoad=true;
  var q=FB.query(FB.collection(FB.db,'notifications'),FB.where('toUid','==',me.uid),FB.orderBy('createdAt','desc'),FB.limit(40));
  notifUnsub=FB.onSnapshot(q,function(snap){
    if(notifFirstLoad){
      notifFirstLoad=false;
      notifList=[];snap.forEach(function(d){notifList.push(Object.assign({id:d.id},d.data()));knownNotifIds.add(d.id);});
      renderNotifPanel();
    } else {
      snap.docChanges().forEach(function(change){
        if(change.type==='added'){
          var n=Object.assign({id:change.doc.id},change.doc.data());
          if(!knownNotifIds.has(n.id)){knownNotifIds.add(n.id);notifList.unshift(n);if(!n.read)showToast(n);}
        }
        if(change.type==='modified'){
          var n2=Object.assign({id:change.doc.id},change.doc.data());
          var idx=notifList.findIndex(function(x){return x.id===n2.id;});
          if(idx>-1)notifList[idx]=n2;
        }
      });
      renderNotifPanel();
    }
    var unread=notifList.filter(function(n){return!n.read;}).length;
    setBadge(g('notif-badge'),unread);
  });
}

function renderNotifPanel(){
  var list=g('notif-list');list.innerHTML='';
  if(notifList.length===0){list.innerHTML='<div style="padding:1.5rem;text-align:center;color:var(--brown);font-size:.85rem;">No notifications yet ✦</div>';return;}
  notifList.forEach(function(n){
    var icon={message:'💬',reaction:'❤️',comment:'💬',story:'✨'}[n.type]||'🔔';
    var div=document.createElement('div');div.className='notif-item'+(n.read?'':' unread');
    div.innerHTML='<div class="notif-icon">'+icon+'</div><div class="notif-body">'+
      '<strong>'+esc(n.fromName||'Someone')+'</strong><p>'+esc(n.body||'')+'</p>'+
      '<div class="notif-time">'+timeAgo(n.createdAt)+'</div></div>';
    div.onclick=function(){
      FB.updateDoc(FB.doc(FB.db,'notifications',n.id),{read:true});
      closeNotifPanel();
      if(n.type==='message'){switchPage('chat');setTimeout(function(){openDM(n.fromUid,n.fromName);},80);}
      else{switchPage('feed');}
    };
    list.appendChild(div);
  });
}

function toggleNotifPanel(){
  g('notif-panel').classList.toggle('hidden');
}
function closeNotifPanel(){g('notif-panel').classList.add('hidden');}
window.toggleNotifPanel=toggleNotifPanel;

function markAllNotifsRead(){
  notifList.filter(function(n){return!n.read;}).forEach(function(n){FB.updateDoc(FB.doc(FB.db,'notifications',n.id),{read:true});});
}
window.markAllNotifsRead=markAllNotifsRead;

function showToast(n){
  clearTimeout(toastTimeout);
  var icon={message:'💬',reaction:'❤️',comment:'💬',story:'✨'}[n.type]||'🔔';
  g('notif-toast-icon').textContent=icon;
  g('notif-toast-title').textContent=n.fromName||'Someone';
  g('notif-toast-msg').textContent=n.body||'';
  g('notif-toast').classList.add('show');
  toastTimeout=setTimeout(dismissToast,5000);
  if(Notification.permission==='granted'){new Notification(n.fromName||'Chaty',{body:n.body,tag:n.id});}
}
function dismissToast(){g('notif-toast').classList.remove('show');}
window.dismissToast=dismissToast;

function requestNotifPerm(){
  Notification.requestPermission().then(function(p){if(p!=='default')g('notif-perm-banner').classList.add('hidden');});
}
window.requestNotifPerm=requestNotifPerm;

// ─── STORIES ─────────────────────────────────────
function loadStories(){
  storiesUnsub=FB.onSnapshot(FB.query(FB.collection(FB.db,'stories'),FB.orderBy('createdAt','desc')),function(snap){
    var stories=[];
    snap.forEach(function(d){stories.push(Object.assign({id:d.id},d.data()));});
    var cutoff=Date.now()-86400000;
    stories=stories.filter(function(s){return s.createdAt&&s.createdAt.toDate().getTime()>cutoff;});
    renderStoriesBar(stories);
  });
}

function renderStoriesBar(stories){
  var row=g('stories-row');
  // Keep add button (first child)
  var addBtn=g('add-story-btn');
  row.innerHTML='';row.appendChild(addBtn);

  // Group by author
  var byAuthor={};
  stories.forEach(function(s){
    if(!byAuthor[s.authorId])byAuthor[s.authorId]=[];
    byAuthor[s.authorId].push(s);
  });

  Object.keys(byAuthor).forEach(function(uid){
    var list=byAuthor[uid];var first=list[0];
    var bubble=document.createElement('div');bubble.className='story-bubble';
    var isMine2=uid===me.uid;
    bubble.innerHTML='<div class="story-ring'+(isMine2?' seen':'')+'" >'+
      '<div class="story-ring-inner">'+
      (first.authorAvatar?'<img src="'+esc(first.authorAvatar)+'"/>':
        '<div class="story-av" style="background:'+grad(uid)+'">'+esc((first.authorName||'?')[0].toUpperCase())+'</div>')+
      '</div></div>'+
      '<span class="story-name">'+esc(isMine2?'Your story':first.authorName||'User')+'</span>';
    bubble.onclick=function(){openStoryViewer(list);};
    row.appendChild(bubble);
  });
}

function openStoryViewer(list){
  storyCurrentList=list;storyCurrentIdx=0;
  g('story-viewer').classList.add('open');
  renderStorySlide();
}

function renderStorySlide(){
  clearInterval(storyTimer);
  var s=storyCurrentList[storyCurrentIdx];if(!s){closeStoryViewer();return;}

  // Progress bar
  var bar=g('sv-progress-bar');bar.innerHTML='';
  storyCurrentList.forEach(function(x,i){
    var seg=document.createElement('div');seg.className='sv-seg';
    var fill=document.createElement('div');fill.className='sv-seg-fill';
    if(i<storyCurrentIdx)fill.style.width='100%';
    seg.appendChild(fill);bar.appendChild(seg);
  });

  g('sv-uname').textContent=s.authorName||'User';
  g('sv-time').textContent=timeAgo(s.createdAt);
  g('sv-text').textContent=s.caption||'';
  if(s.authorAvatar){g('sv-av').innerHTML='<img src="'+esc(s.authorAvatar)+'" style="width:100%;height:100%;object-fit:cover;border-radius:50%;"/>';}
  else{g('sv-av').innerHTML=esc((s.authorName||'?')[0].toUpperCase());}

  var img=g('sv-img'),vid=g('sv-vid');
  if(s.mediaType==='video'){img.style.display='none';vid.style.display='';vid.src=s.mediaUrl;vid.play();}
  else{vid.style.display='none';vid.src='';img.style.display='';img.src=s.mediaUrl;}

  var dur=s.mediaType==='video'?15000:5000;
  var start=Date.now();
  var activeFill=bar.children[storyCurrentIdx].querySelector('.sv-seg-fill');
  storyTimer=setInterval(function(){
    var p=Math.min((Date.now()-start)/dur,1);
    activeFill.style.width=(p*100)+'%';
    if(p>=1){clearInterval(storyTimer);storyNav(1);}
  },50);
}

function storyNav(dir){
  storyCurrentIdx+=dir;
  if(storyCurrentIdx<0)storyCurrentIdx=0;
  if(storyCurrentIdx>=storyCurrentList.length){closeStoryViewer();return;}
  renderStorySlide();
}
window.storyNav=storyNav;

function closeStoryViewer(){
  clearInterval(storyTimer);
  g('story-viewer').classList.remove('open');
  g('sv-vid').pause();g('sv-vid').src='';g('sv-img').src='';
}
window.closeStoryViewer=closeStoryViewer;

function openStoryCreate(){g('story-create-modal').classList.add('open');}
function closeStoryCreate(){g('story-create-modal').classList.remove('open');scmFile=null;g('scm-prev-img').style.display='none';g('scm-prev-vid').style.display='none';g('scm-placeholder').style.display='';g('scm-caption').value='';}
window.openStoryCreate=openStoryCreate;window.closeStoryCreate=closeStoryCreate;

g('scm-file-input').addEventListener('change',function(){
  scmFile=this.files[0];if(!scmFile)return;
  g('scm-placeholder').style.display='none';
  if(scmFile.type.startsWith('image/')){g('scm-prev-img').src=URL.createObjectURL(scmFile);g('scm-prev-img').style.display='';g('scm-prev-vid').style.display='none';}
  else{g('scm-prev-vid').src=URL.createObjectURL(scmFile);g('scm-prev-vid').style.display='';g('scm-prev-img').style.display='none';}
});

function submitStory(){
  if(!scmFile){showErrorModal('No Media','Pick a photo or video first.');return;}
  uploadFile(scmFile,null).then(function(res){
    var mt=scmFile.type.startsWith('image/')?'image':'video';
    FB.addDoc(FB.collection(FB.db,'stories'),{
      authorId:me.uid,authorName:myName,authorAvatar:myAvatarUrl,
      caption:g('scm-caption').value.trim(),
      mediaUrl:res.url,mediaType:mt,createdAt:FB.serverTimestamp()
    });
    closeStoryCreate();
    showToast({type:'story',fromName:'You',body:'Story shared! ✨'});
  }).catch(function(){showErrorModal('Upload Failed','Could not upload story.');});
}
window.submitStory=submitStory;

// ─── CALLS (WebRTC) ──────────────────────────────
var seenCalleeCandidates={},seenCallerCandidates={};

g('btn-voice-call').onclick=function(){if(chatIsGroup){showErrorModal('Groups','Voice calls are only available in DMs.');return;}startCall(false);};
g('btn-video-call').onclick=function(){if(chatIsGroup){showErrorModal('Groups','Video calls are only available in DMs.');return;}startCall(true);};

function startCall(isVideo){
  if(!currentPeerId){showErrorModal('Error','No call target.');return;}
  callIsVideo=isVideo;isCaller=true;
  callRoomId='call_'+[me.uid,currentPeerId].sort().join('_');
  seenCalleeCandidates={};
  showCallOverlay(currentPeerName,currentPeerId,true);
  navigator.mediaDevices.getUserMedia({audio:true,video:isVideo}).then(function(stream){
    localStream=stream;
    if(isVideo){g('local-video').srcObject=stream;g('call-videos').classList.remove('hidden');}
    pc=new RTCPeerConnection({iceServers:[{urls:'stun:stun.l.google.com:19302'},{urls:'stun:stun1.l.google.com:19302'}]});
    stream.getTracks().forEach(function(t){pc.addTrack(t,stream);});
    pc.ontrack=function(e){g('remote-video').srcObject=e.streams[0];};
    pc.onicecandidate=function(e){
      if(e.candidate){FB.updateDoc(FB.doc(FB.db,'calls',callRoomId),{callerCandidates:FB.arrayUnion(JSON.stringify(e.candidate.toJSON()))});}
    };
    return pc.createOffer();
  }).then(function(offer){
    return pc.setLocalDescription(offer).then(function(){
      return FB.setDoc(FB.doc(FB.db,'calls',callRoomId),{offer:{type:offer.type,sdp:offer.sdp},callerId:me.uid,callerName:myName,calleeId:currentPeerId,isVideo:callIsVideo,status:'ringing',callerCandidates:[],calleeCandidates:[],createdAt:FB.serverTimestamp()});
    });
  }).then(function(){
    callUnsub=FB.onSnapshot(FB.doc(FB.db,'calls',callRoomId),function(snap){
      if(!snap.exists())return;
      var d=snap.data();
      if(d.status==='answered'&&d.answer&&pc.signalingState!=='stable'){
        pc.setRemoteDescription(new RTCSessionDescription(d.answer));
      }
      if(d.status==='ended')hangUp();
      (d.calleeCandidates||[]).forEach(function(cStr){
        if(!seenCalleeCandidates[cStr]){seenCalleeCandidates[cStr]=true;pc.addIceCandidate(new RTCIceCandidate(JSON.parse(cStr)));}
      });
    });
  }).catch(function(e){showErrorModal('Call Error',e.message);hangUp();});
}

function listenIncomingCalls(){
  var q=FB.query(FB.collection(FB.db,'calls'),FB.where('calleeId','==',me.uid),FB.where('status','==','ringing'));
  FB.onSnapshot(q,function(snap){
    snap.docChanges().forEach(function(change){
      if(change.type==='added'){
        var d=change.doc.data();
        if(Date.now()-d.createdAt.toDate().getTime()>60000)return;
        if(callRoomId)return;
        callRoomId=change.doc.id;callIsVideo=d.isVideo;isCaller=false;
        seenCallerCandidates={};
        showCallOverlay(d.callerName,d.callerId,false);
        if(Notification.permission==='granted'){new Notification(d.callerName+' is calling...',{tag:'call'});}
      }
    });
  });
}

function showCallOverlay(peerName,peerId,outgoing){
  var u=allUsers.find(function(x){return x.id===peerId;})||{name:peerName};
  setAvEl(g('call-peer-av'),peerName,peerId,u.avatarUrl||'');
  g('call-peer-av').style.background=grad(peerId||'x');
  g('call-peer-name').textContent=peerName;
  g('call-status').textContent=outgoing?'Calling...':'Incoming call...';
  g('call-accept').style.display=outgoing?'none':'flex';
  g('call-overlay').classList.add('open');
}

function acceptCall(){
  navigator.mediaDevices.getUserMedia({audio:true,video:callIsVideo}).then(function(stream){
    localStream=stream;
    if(callIsVideo){g('local-video').srcObject=stream;g('call-videos').classList.remove('hidden');}
    pc=new RTCPeerConnection({iceServers:[{urls:'stun:stun.l.google.com:19302'},{urls:'stun:stun1.l.google.com:19302'}]});
    stream.getTracks().forEach(function(t){pc.addTrack(t,stream);});
    pc.ontrack=function(e){g('remote-video').srcObject=e.streams[0];};
    pc.onicecandidate=function(e){
      if(e.candidate){FB.updateDoc(FB.doc(FB.db,'calls',callRoomId),{calleeCandidates:FB.arrayUnion(JSON.stringify(e.candidate.toJSON()))});}
    };
    return FB.getDoc(FB.doc(FB.db,'calls',callRoomId)).then(function(snap){
      var offer=snap.data().offer;
      return pc.setRemoteDescription(new RTCSessionDescription(offer)).then(function(){return pc.createAnswer();});
    });
  }).then(function(answer){
    return pc.setLocalDescription(answer).then(function(){
      return FB.updateDoc(FB.doc(FB.db,'calls',callRoomId),{answer:{type:answer.type,sdp:answer.sdp},status:'answered'});
    });
  }).then(function(){
    callUnsub=FB.onSnapshot(FB.doc(FB.db,'calls',callRoomId),function(snap){
      if(!snap.exists())return;
      var d=snap.data();
      if(d.status==='ended')hangUp();
      (d.callerCandidates||[]).forEach(function(cStr){
        if(!seenCallerCandidates[cStr]){seenCallerCandidates[cStr]=true;pc.addIceCandidate(new RTCIceCandidate(JSON.parse(cStr)));}
      });
    });
    g('call-status').textContent='Connected';g('call-accept').style.display='none';
  }).catch(function(e){showErrorModal('Call Error',e.message);hangUp();});
}
window.acceptCall=acceptCall;

function hangUp(){
  if(callRoomId){try{FB.updateDoc(FB.doc(FB.db,'calls',callRoomId),{status:'ended'});}catch(e){}}
  if(localStream)localStream.getTracks().forEach(function(t){t.stop();});
  if(pc){pc.close();pc=null;}
  if(callUnsub){callUnsub();callUnsub=null;}
  g('call-overlay').classList.remove('open');
  g('call-videos').classList.add('hidden');
  g('remote-video').srcObject=null;g('local-video').srcObject=null;
  callRoomId=null;localStream=null;isMuted=false;isCamOff=false;
}
window.hangUp=hangUp;

function toggleMute(){isMuted=!isMuted;if(localStream)localStream.getAudioTracks().forEach(function(t){t.enabled=!isMuted;});g('call-mute').textContent=isMuted?'🔈':'🔇';}
function toggleCam(){isCamOff=!isCamOff;if(localStream)localStream.getVideoTracks().forEach(function(t){t.enabled=!isCamOff;});g('call-cam-toggle').textContent=isCamOff?'🚫':'📷';}
window.toggleMute=toggleMute;window.toggleCam=toggleCam;
