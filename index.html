<style>
/* ══ VARIABLES ═══════════════════════════════════ */
:root {
  --pink:   #ff2d78;
  --orange: #ff6b2b;
  --yellow: #ffd60a;
  --cyan:   #00e5ff;
  --green:  #00e676;
  --purple: #c44dff;
  --red:    #ff3333;

  --bg:     #080810;
  --s1:     #0f0f18;
  --s2:     #161622;
  --s3:     #1e1e2e;
  --border: #252535;
  --text:   #f0f0ff;
  --muted:  #5a5a7a;

  --grad-main: linear-gradient(135deg, var(--pink), var(--orange));
  --grad-cool: linear-gradient(135deg, var(--cyan), var(--purple));
  --grad-fire: linear-gradient(135deg, var(--red), var(--pink), var(--orange));
}
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html, body { height:100%; overflow:hidden; }
body { font-family:'Plus Jakarta Sans',sans-serif; background:var(--bg); color:var(--text); }

/* ══ SCROLLBARS ══════════════════════════════════ */
::-webkit-scrollbar { width:3px; height:3px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }

/* ══ UTILS ═══════════════════════════════════════ */
.hidden { display:none !important; }
.spin { width:20px; height:20px; border:2px solid var(--border); border-top-color:var(--pink); border-radius:50%; animation:rot .7s linear infinite; margin:20px auto; }
@keyframes rot { to { transform:rotate(360deg); } }
.grad-text {
  background: var(--grad-fire);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
}

/* ══ AUTH SCREEN ═════════════════════════════════ */
#auth-screen {
  height:100%; display:flex; align-items:center; justify-content:center; padding:16px;
  background:
    radial-gradient(ellipse at 10% 20%, rgba(255,45,120,.15) 0%, transparent 50%),
    radial-gradient(ellipse at 90% 80%, rgba(196,77,255,.12) 0%, transparent 50%),
    radial-gradient(ellipse at 50% 50%, rgba(0,229,255,.06) 0%, transparent 60%),
    var(--bg);
}
.auth-wrap { width:100%; max-width:420px; }
.auth-logo {
  font-family:'Syne',sans-serif; font-weight:900; font-size:3rem;

  -webkit-text-fill-color:transparent; background-clip:text;
  text-align:center; margin-bottom:4px; display:block;
}
.auth-tagline { text-align:center; color:var(--muted); font-size:.85rem; margin-bottom:28px; }

  padding:32px 28px; position:relative; overflow:hidden;
}
.auth-card::before {

}

.tab-btn {

}
.tab-btn.active { background:var(--grad-main); color:#fff; font-weight:600; }
.field { margin-bottom:13px; }
.field label { display:block; font-size:.72rem; color:var(--muted); margin-bottom:5px; text-transform:uppercase; letter-spacing:.05em; }
.field input {
  width:100%; padding:11px 14px; background:var(--s2); border:1px solid var(--border);
  border-radius:10px; color:var(--text); font-family:'Plus Jakarta Sans',sans-serif; font-size:.95rem;

}

.a-ok  { color:var(--green); font-size:.8rem; margin-top:10px; display:none; }

/* ══ APP SHELL ═══════════════════════════════════ */

/* ── TOP NAV ─────────────────────────────────── */

}

/* ══ MAIN CONTENT ════════════════════════════════ */
.main { flex:1; overflow:hidden; display:flex; }

/* ── FEED PAGE ──────────────────────────────── */
#page-feed {

}
.feed-inner { width:100%; max-width:600px; display:flex; flex-direction:column; gap:16px; }

/* create post box */

.cp-media-btn {

}
.cp-media-btn:hover { background:var(--s2); color:var(--text); }

}

/* post card */
.post-card {
  background:var(--s1); border:1px solid var(--border); border-radius:18px;
  overflow:hidden; animation:slideIn .25s ease;
}
@keyframes slideIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
.post-head { display:flex; align-items:center; gap:10px; padding:14px 16px 10px; }
.post-av { width:36px; height:36px; border-radius:9px; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-family:'Syne',sans-serif; font-weight:800; font-size:.88rem; color:#fff; }
.post-meta { flex:1; min-width:0; }
.post-name { font-size:.88rem; font-weight:600; }

}

}

.post-comments { border-top:1px solid var(--border); padding:12px 16px; display:none; }
.post-comments.open { display:block; }
.comment-list { display:flex; flex-direction:column; gap:8px; margin-bottom:10px; max-height:200px; overflow-y:auto; }
.comment-item { display:flex; gap:8px; align-items:flex-start; }
.comment-av { width:26px; height:26px; border-radius:7px; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-family:'Syne',sans-serif; font-weight:800; font-size:.7rem; color:#fff; }
.comment-body { flex:1; background:var(--s2); border-radius:9px; padding:7px 10px; }

.comment-input {

}

/* ── PEOPLE PAGE ──────────────────────────────── */
#page-people {
  flex:1; overflow-y:auto; padding:20px;
  display:flex; flex-direction:column; align-items:center;
}
.people-inner { width:100%; max-width:600px; }
.people-search-wrap { margin-bottom:16px; }
.people-search {
  width:100%; padding:11px 16px; background:var(--s1); border:1px solid var(--border);

/* ── CHAT PAGE ────────────────────────────────── */

  flex:1; padding:10px 13px; background:var(--s2); border:1px solid var(--border);
  border-radius:11px; color:var(--text); font-family:'Plus Jakarta Sans',sans-serif; font-size:.88rem;
  outline:none; resize:none; max-height:100px; transition:border-color .2s; line-height:1.4;
}
.chat-ta:focus { border-color:var(--pink); }
.chat-send-btn {
  width:38px; height:38px; border-radius:9px; border:none; background:var(--grad-main);
  display:flex; align-items:center; justify-content:center; cursor:pointer; flex-shrink:0;
  transition:transform .1s, opacity .2s;
}
.chat-send-btn:hover  { opacity:.85; }
.chat-send-btn:active { transform:scale(.93); }
.chat-send-btn svg { width:16px; height:16px; fill:none; stroke:#fff; stroke-width:2.2; }
.chat-upload-preview {
  padding:8px 16px; background:var(--s2); border-top:1px solid var(--border);
  display:none; align-items:center; gap:10px;
}
.chat-upload-preview.show { display:flex; }
.cup-thumb { width:48px; height:48px; border-radius:8px; object-fit:cover; }
.cup-name { flex:1; font-size:.78rem; color:var(--muted); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.cup-rm { background:none; border:none; color:var(--muted); cursor:pointer; font-size:1.1rem; }
.cup-progress { width:100%; height:2px; background:var(--border); border-radius:2px; margin-top:4px; }
.cup-progress-fill { height:100%; background:var(--grad-main); border-radius:2px; width:0%; transition:width .3s; }

/* ── LIGHTBOX ─────────────────────────────── */
.lightbox {
  position:fixed; inset:0; background:rgba(0,0,0,.92); z-index:999;
  display:none; align-items:center; justify-content:center; padding:20px;
}
.lightbox.on { display:flex; }
.lightbox img { max-width:100%; max-height:90vh; border-radius:12px; object-fit:contain; }
.lightbox-close {
  position:absolute; top:16px; right:16px; width:36px; height:36px; border-radius:50%;
  background:rgba(255,255,255,.1); border:none; color:#fff; font-size:1.2rem; cursor:pointer;
  display:flex; align-items:center; justify-content:center; transition:background .2s;
}
.lightbox-close:hover { background:rgba(255,255,255,.2); }

/* ── CONFIG BANNER ────────────────────────── */
.cfg-bar {
  position:fixed; bottom:0; left:0; right:0; z-index:500;
  background:#110600; border-top:2px solid var(--orange); padding:10px 18px;
  font-size:.8rem; text-align:center; display:none;
}
.cfg-bar.on { display:block; }
.cfg-bar strong { color:var(--yellow); }
.cfg-bar code { background:#1a0e00; padding:1px 5px; border-radius:4px; font-size:.76rem; }

/* ══ MOBILE ══════════════════════════════════════ */
@media (max-width:640px) {
  .nav-tabs .nav-tab span { display:none; }
  .nav-tabs .nav-tab svg  { width:16px; height:16px; }
  .nav-name { display:none; }

  /* feed */
  #page-feed { padding:12px; }

  /* people grid */
  .people-grid { grid-template-columns:repeat(2, 1fr); }

  /* chat — slide panels */
  #page-chat { display:block; }
  .chat-sidebar {
    position:absolute; inset:0; width:100%; z-index:2;
    transform:translateX(0); transition:transform .28s cubic-bezier(.4,0,.2,1);
  }
  .chat-sidebar.away { transform:translateX(-100%); }
  .chat-main {
    position:absolute; inset:0; width:100%; z-index:2;
    transform:translateX(100%); transition:transform .28s cubic-bezier(.4,0,.2,1);
  }
  .chat-main.here { transform:translateX(0); }
  .chat-back-btn { display:flex; }

  /* messages wider */
  .msg-wrap { max-width:85%; }
  .msgs-area { padding:12px; }
  .chat-input-bar { padding:10px 12px; }
}
</style>
</head>
<body>

<!-- ══ AUTH ════════════════════════════════════════ -->
<div id="auth-screen">
  <div class="auth-wrap">
    <span class="auth-logo">Chaty</span>
    <p class="auth-tagline">Posts · Reactions · Chat · Files — all in one place</p>
    <div class="auth-card">
      <div class="tabs">
        <button class="tab-btn active" id="tab-in">Login</button>
        <button class="tab-btn"        id="tab-up">Sign Up</button>
      </div>
      <div id="form-in">
        <div class="field"><label>Email</label><input type="email" id="in-email" placeholder="you@example.com" autocomplete="email"></div>
        <div class="field"><label>Password</label><input type="password" id="in-pass" placeholder="••••••••" autocomplete="current-password"></div>
        <button class="auth-btn" id="btn-in">Login →</button>
      </div>
      <div id="form-up" style="display:none">
        <div class="field"><label>Display Name</label><input type="text" id="up-name" placeholder="Your name" autocomplete="name"></div>
        <div class="field"><label>Email</label><input type="email" id="up-email" placeholder="you@example.com" autocomplete="email"></div>
        <div class="field"><label>Password</label><input type="password" id="up-pass" placeholder="Min 6 characters" autocomplete="new-password"></div>
        <button class="auth-btn" id="btn-up">Create Account →</button>
      </div>
      <div class="a-err" id="a-err"></div>
      <div class="a-ok"  id="a-ok"></div>
    </div>
  </div>
</div>

<!-- ══ APP ═════════════════════════════════════════ -->
<div id="app">
  <!-- TOP NAV -->
  <nav class="topnav">
    <span class="nav-logo grad-text">Chaty</span>
    <div class="nav-tabs">
      <button class="nav-tab active" id="ntab-feed" onclick="switchPage('feed')">
        <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
        <span>Feed</span>
      </button>
      <button class="nav-tab" id="ntab-people" onclick="switchPage('people')">
        <svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        <span>People</span>
      </button>
      <button class="nav-tab" id="ntab-chat" onclick="switchPage('chat')">
        <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        <span>Chat</span>
      </button>
    </div>
    <div class="nav-right">
      <div class="nav-av" id="nav-av"></div>
      <button class="btn-out" id="btn-logout">Logout</button>
    </div>
  </nav>

  <!-- PAGES -->
  <div class="main">

    <!-- FEED PAGE -->
    <div id="page-feed" style="display:none">
      <div class="feed-inner">
        <!-- Create Post -->
        <div class="create-post">
          <div class="cp-top">
            <div class="cp-av" id="cp-av"></div>
            <textarea class="cp-ta" id="cp-ta" placeholder="What's on your mind?" rows="2"></textarea>
          </div>
          <div class="cp-preview" id="cp-preview">
            <img id="cp-prev-img" style="display:none">
            <video id="cp-prev-vid" style="display:none" controls></video>
            <button class="cp-preview-rm" id="cp-prev-rm">✕</button>
          </div>
          <div class="cp-progress" id="cp-progress">
            <div class="cp-progress-bar"><div class="cp-progress-fill" id="cp-prog-fill"></div></div>
          </div>
          <div class="cp-actions">
            <div class="cp-media-btns">
              <button class="cp-media-btn" id="cp-img-btn">
                <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
                Photo/GIF
              </button>
              <button class="cp-media-btn" id="cp-vid-btn">
                <svg viewBox="0 0 24 24"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2"/></svg>
                Video
              </button>
              <button class="cp-media-btn" id="cp-file-btn">
                <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
                File
              </button>
            </div>
            <button class="cp-submit" id="cp-submit">Post</button>
          </div>
          <input type="file" id="cp-file-input" style="display:none" accept="image/*,video/*,image/gif">
          <input type="file" id="cp-vid-input"  style="display:none" accept="video/*">
          <input type="file" id="cp-any-input"  style="display:none">
        </div>
        <!-- Posts list -->
        <div id="posts-list"></div>
      </div>
    </div>

    <!-- PEOPLE PAGE -->
    <div id="page-people" style="display:none">
      <div class="people-inner">
        <div class="people-search-wrap">
          <input class="people-search" id="people-search" type="search" placeholder="Search people…" autocomplete="off">
        </div>
        <div class="people-grid" id="people-grid"><div class="spin"></div></div>
      </div>
    </div>

    <!-- CHAT PAGE -->
    <div id="page-chat" style="display:none">
      <!-- Sidebar -->
      <aside class="chat-sidebar" id="chat-sidebar">
        <div class="cs-head">
          <h3>Messages</h3>
          <input class="cs-search" id="cs-search" type="search" placeholder="Search…" autocomplete="off">
        </div>
        <div class="cs-list" id="cs-list"><div class="spin"></div></div>
      </aside>
      <!-- Chat main -->
      <div class="chat-main" id="chat-main">
        <div class="chat-empty-state" id="chat-empty">
          <div class="big-icon">💬</div>
          <p>Select someone to start chatting</p>
        </div>
        <div class="chat-active" id="chat-active">
          <div class="chat-head-bar">
            <button class="chat-back-btn" id="chat-back">
              <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
            </button>
            <div class="cs-av" id="ch-av"></div>
            <div>
              <div class="chat-head-name" id="ch-name"></div>
              <div class="chat-head-status">Online</div>
            </div>
          </div>
          <!-- Upload preview strip -->
          <div class="chat-upload-preview" id="cup">
            <img class="cup-thumb" id="cup-thumb" src="" alt="">
            <div style="flex:1">
              <div class="cup-name" id="cup-name"></div>
              <div class="cup-progress"><div class="cup-progress-fill" id="cup-fill"></div></div>
            </div>
            <button class="cup-rm" id="cup-rm">✕</button>
          </div>
          <div class="msgs-area" id="msgs-area"></div>
          <div class="chat-input-bar">
            <button class="chat-attach-btn" id="chat-attach-btn" title="Attach file">
              <svg viewBox="0 0 24 24"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
            </button>
            <textarea class="chat-ta" id="chat-ta" rows="1" placeholder="Type a message…"></textarea>
            <button class="chat-send-btn" id="chat-send-btn">
              <svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
            </button>
            <input type="file" id="chat-file-input" style="display:none">
          </div>
        </div>
      </div>
    </div>

  </div><!-- .main -->
</div><!-- #app -->

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox">
  <button class="lightbox-close" id="lb-close">✕</button>
  <img id="lb-img" src="" alt="">
</div>

<!-- CONFIG BANNER -->
<div class="cfg-bar" id="cfg-bar">
  <strong>⚡ Setup needed:</strong> Open <code>index.html</code> and replace the <code>firebaseConfig</code> values near the top of the file. See README for instructions.
</div>

<script>
(function(){
'use strict';

/* ── State ──────────────────────────────────────── */
var FB, me=null, myName='', myGrad='';
var allUsers=[], chatWith=null, chatWithName='', chatUnsubFn=null;
var postFileData=null, chatFileData=null, chatFilePending=null;
var postsUnsub=null;

var GRADS=[
  'linear-gradient(135deg,#ff2d78,#ff6b2b)',
  'linear-gradient(135deg,#00e5ff,#c44dff)',
  'linear-gradient(135deg,#ffd60a,#ff2d78)',
  'linear-gradient(135deg,#00e676,#00e5ff)',
  'linear-gradient(135deg,#c44dff,#ff2d78)',
  'linear-gradient(135deg,#ff6b2b,#ffd60a)',
  'linear-gradient(135deg,#ff3333,#ff2d78)',
  'linear-gradient(135deg,#00e5ff,#00e676)',
];
var REACTIONS=['❤️','🔥','😂','😮','👍','🎉'];

function g(id){ return document.getElementById(id); }
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function grad(uid){ var h=0; for(var i=0;i<uid.length;i++) h=((h<<5)-h)+uid.charCodeAt(i); return GRADS[Math.abs(h)%GRADS.length]; }
function timeAgo(ts){
  if(!ts) return '';
  var d = ts.toDate ? ts.toDate() : new Date(ts);
  var s = Math.floor((Date.now()-d)/1000);
  if(s<60) return 'just now';
  if(s<3600) return Math.floor(s/60)+'m ago';
  if(s<86400) return Math.floor(s/3600)+'h ago';
  return Math.floor(s/86400)+'d ago';
}
function mob(){ return window.innerWidth<=640; }

/* ── Wait for Firebase ──────────────────────────── */
document.addEventListener('fb-ready', function(){
  FB = window.__FB;
  if(!FB){ g('cfg-bar').classList.add('on'); return; }
  wire();
  FB.onAuthStateChanged(FB.auth, function(user){
    if(user){ me=user; myName=user.displayName||user.email.split('@')[0]; myGrad=grad(user.uid); enterApp(); }
    else    { me=null; showAuth(); }
  });
});

/* ── Wire static UI ─────────────────────────────── */
function wire(){
  // auth tabs
  g('tab-in').onclick=function(){ switchTab('in'); };
  g('tab-up').onclick=function(){ switchTab('up'); };
  g('btn-in').onclick=doLogin;
  g('btn-up').onclick=doSignup;
  g('in-pass').onkeydown=function(e){ if(e.key==='Enter') doLogin(); };
  g('up-pass').onkeydown=function(e){ if(e.key==='Enter') doSignup(); };
  g('btn-logout').onclick=doLogout;

  // post create
  g('cp-img-btn').onclick=function(){ g('cp-file-input').click(); };
  g('cp-vid-btn').onclick=function(){ g('cp-vid-input').click(); };
  g('cp-file-btn').onclick=function(){ g('cp-any-input').click(); };
  g('cp-file-input').onchange=function(){ onPostFileSelect(this.files[0]); };
  g('cp-vid-input').onchange=function(){ onPostFileSelect(this.files[0]); };
  g('cp-any-input').onchange=function(){ onPostFileSelect(this.files[0]); };
  g('cp-prev-rm').onclick=function(){ clearPostFile(); };
  g('cp-submit').onclick=submitPost;
  g('cp-ta').onkeydown=function(e){ if(e.key==='Enter'&&e.ctrlKey) submitPost(); };

  // people search
  g('people-search').oninput=function(){
    var q=this.value.toLowerCase();
    renderPeople(allUsers.filter(function(u){ return u.name.toLowerCase().includes(q)||(u.email||'').toLowerCase().includes(q); }));
  };

  // chat sidebar search
  g('cs-search').oninput=function(){
    var q=this.value.toLowerCase();
    renderChatList(allUsers.filter(function(u){ return u.name.toLowerCase().includes(q); }));
  };

  // chat send
  g('chat-send-btn').onclick=sendChatMsg;
  g('chat-ta').onkeydown=function(e){
    if(e.key==='Enter'&&!e.shiftKey){ e.preventDefault(); sendChatMsg(); }
  };
  g('chat-ta').oninput=function(){
    this.style.height='auto'; this.style.height=Math.min(this.scrollHeight,100)+'px';
  };

  // chat attach
  g('chat-attach-btn').onclick=function(){ g('chat-file-input').click(); };
  g('chat-file-input').onchange=function(){ onChatFileSelect(this.files[0]); this.value=''; };
  g('cup-rm').onclick=clearChatFile;

  // chat back (mobile)
  g('chat-back').onclick=function(){
    g('chat-sidebar').classList.remove('away');
    g('chat-main').classList.remove('here');
  };

  // lightbox
  g('lb-close').onclick=function(){ g('lightbox').classList.remove('on'); };
  g('lightbox').onclick=function(e){ if(e.target===this) this.classList.remove('on'); };
}

/* ── Auth ───────────────────────────────────────── */
function switchTab(t){
  g('tab-in').classList.toggle('active', t==='in');
  g('tab-up').classList.toggle('active', t==='up');
  g('form-in').style.display = t==='in'?'block':'none';
  g('form-up').style.display = t==='up'?'block':'none';
  clearFb();
}
async function doLogin(){
  var email=g('in-email').value.trim(), pass=g('in-pass').value;
  if(!email||!pass) return setErr('Fill in all fields.');
  clearFb();
  try{ await FB.signInWithEmailAndPassword(FB.auth,email,pass); }
  catch(e){ setErr(e.message.replace('Firebase:','').replace(/\(.*\)/,'')); }
}
async function doSignup(){
  var name=g('up-name').value.trim(), email=g('up-email').value.trim(), pass=g('up-pass').value;
  if(!name||!email||!pass) return setErr('Fill in all fields.');
  if(pass.length<6) return setErr('Password needs at least 6 characters.');
  clearFb();
  try{
    var cred = await FB.createUserWithEmailAndPassword(FB.auth, email, pass);
    await FB.updateProfile(cred.user, {displayName:name});
    await FB.setDoc(FB.doc(FB.db,'users',cred.user.uid), {name:name, email:email, uid:cred.user.uid, createdAt:FB.serverTimestamp()});
  } catch(e){ setErr(e.message.replace('Firebase:','').replace(/\(.*\)/,'')); }
}
async function doLogout(){
  if(postsUnsub) postsUnsub();
  if(chatUnsubFn) chatUnsubFn();
  await FB.signOut(FB.auth);
}
function setErr(m){ g('a-err').textContent=m; g('a-err').style.display='block'; }
function setOk(m) { g('a-ok').textContent=m;  g('a-ok').style.display='block'; }
function clearFb(){ g('a-err').style.display='none'; g('a-ok').style.display='none'; }

/* ── Screens ────────────────────────────────────── */
function showAuth(){
  g('auth-screen').style.display='flex';
  g('app').classList.remove('on');
}
async function enterApp(){
  g('auth-screen').style.display='none';
  g('app').classList.add('on');
  // ensure user doc
  var uref=FB.doc(FB.db,'users',me.uid);
  var usnap=await FB.getDoc(uref);
  if(!usnap.exists()) await FB.setDoc(uref,{name:myName,email:me.email,uid:me.uid,createdAt:FB.serverTimestamp()});

  // set nav avatar
  var nav=g('nav-av');
  nav.textContent=myName[0].toUpperCase();
  nav.style.background=myGrad;
  g('cp-av').textContent=myName[0].toUpperCase();
  g('cp-av').style.background=myGrad;

  await loadAllUsers();
  switchPage('feed');
}

/* ── Page switching ─────────────────────────────── */
function switchPage(page){
  ['feed','people','chat'].forEach(function(p){
    g('page-'+p).style.display='none';
    g('ntab-'+p).classList.remove('active');
  });
  g('page-'+page).style.display='flex';
  g('ntab-'+page).classList.add('active');

  if(page==='feed' && !postsUnsub) loadFeed();
  if(page==='people') renderPeople(allUsers);
  if(page==='chat') renderChatList(allUsers);
}

/* ── Load all users ─────────────────────────────── */
async function loadAllUsers(){
  var snap=await FB.getDocs(FB.collection(FB.db,'users'));
  allUsers=[];
  snap.forEach(function(d){
    if(d.id!==me.uid) allUsers.push(Object.assign({id:d.id},d.data()));
  });
}

/* ════════════════════════════════════════════════
   FEED
════════════════════════════════════════════════ */
function loadFeed(){
  var q=FB.query(FB.collection(FB.db,'posts'), FB.orderBy('createdAt','desc'), FB.limit(50));
  postsUnsub=FB.onSnapshot(q, function(snap){
    var posts=[];
    snap.forEach(function(d){ posts.push(Object.assign({id:d.id},d.data())); });
    renderFeed(posts);
  });
}

function renderFeed(posts){
  var el=g('posts-list');
  if(!posts.length){ el.innerHTML='<p style="text-align:center;color:var(--muted);padding:40px;font-size:.88rem">No posts yet. Be the first!</p>'; return; }
  el.innerHTML='';
  posts.forEach(function(p){ el.appendChild(buildPostCard(p)); });
}

function buildPostCard(p){
  var div=document.createElement('div');
  div.className='post-card';
  div.dataset.pid=p.id;

  var uname=p.authorName||'User';
  var ug=grad(p.authorId||'x');
  var reactions=p.reactions||{};
  var reactionBtns=REACTIONS.map(function(emoji){
    var cnt=reactions[emoji]?reactions[emoji].length:0;
    var reacted=reactions[emoji]&&reactions[emoji].includes(me.uid);
    return '<button class="react-btn'+(reacted?' reacted':'')+'" data-emoji="'+emoji+'" data-pid="'+p.id+'">'
      +'<span class="emoji">'+emoji+'</span>'+(cnt?'<span class="cnt">'+cnt+'</span>':'')
      +'</button>';
  }).join('');

  var commentCount=p.commentCount||0;
  var mediaHtml='';
  if(p.mediaUrl){
    var t=p.mediaType||'';
    if(t.startsWith('video')) mediaHtml='<div class="post-media"><video src="'+esc(p.mediaUrl)+'" controls preload="metadata"></video></div>';
    else if(t.startsWith('image')||t.startsWith('gif')) mediaHtml='<div class="post-media"><img src="'+esc(p.mediaUrl)+'" loading="lazy" style="cursor:pointer" data-lb="'+esc(p.mediaUrl)+'"></div>';
    else mediaHtml='<div style="padding:8px 16px"><a class="msg-file-link" href="'+esc(p.mediaUrl)+'" target="_blank" rel="noopener">📎 Download attachment</a></div>';
  }

  div.innerHTML=
    '<div class="post-head">'
    +'<div class="post-av" style="background:'+ug+'">'+uname[0].toUpperCase()+'</div>'
    +'<div class="post-meta"><div class="post-name">'+esc(uname)+'</div><div class="post-time">'+timeAgo(p.createdAt)+'</div></div>'
    +'</div>'
    +(p.text?'<div class="post-text">'+esc(p.text)+'</div>':'')
    +mediaHtml
    +'<div class="post-reactions">'+reactionBtns
    +'<button class="post-comment-toggle" data-pid="'+p.id+'">'
    +'<svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>'
    +(commentCount?' '+commentCount:'')+'</button>'
    +'</div>'
    +'<div class="post-comments" id="comments-'+p.id+'">'
    +'<div class="comment-list" id="clist-'+p.id+'"></div>'
    +'<div class="comment-input-row">'
    +'<input class="comment-input" id="cinput-'+p.id+'" placeholder="Write a comment…">'
    +'<button class="comment-send" data-pid="'+p.id+'">Send</button>'
    +'</div></div>';

  // wire reactions
  div.querySelectorAll('.react-btn').forEach(function(btn){
    btn.addEventListener('click', function(){ toggleReaction(btn.dataset.pid, btn.dataset.emoji); });
  });
  // wire comment toggle
  div.querySelector('.post-comment-toggle').addEventListener('click', function(){
    toggleComments(p.id);
  });
  // wire comment send
  div.querySelector('.comment-send').addEventListener('click', function(){
    postComment(p.id);
  });
  div.querySelector('#cinput-'+p.id).addEventListener('keydown', function(e){
    if(e.key==='Enter') postComment(p.id);
  });
  // wire lightbox
  div.querySelectorAll('[data-lb]').forEach(function(img){
    img.addEventListener('click', function(){ openLightbox(img.dataset.lb); });
  });

  return div;
}

async function toggleReaction(pid, emoji){
  var pref=FB.doc(FB.db,'posts',pid);
  var snap=await FB.getDoc(pref);
  if(!snap.exists()) return;
  var reactions=snap.data().reactions||{};
  var arr=reactions[emoji]||[];
  var update={};
  if(arr.includes(me.uid)){
    update['reactions.'+emoji]=FB.arrayRemove(me.uid);
  } else {
    update['reactions.'+emoji]=FB.arrayUnion(me.uid);
  }
  await FB.updateDoc(pref, update);
}

function toggleComments(pid){
  var el=g('comments-'+pid);
  el.classList.toggle('open');
  if(el.classList.contains('open')) loadComments(pid);
}

async function loadComments(pid){
  var el=g('clist-'+pid);
  el.innerHTML='<div class="spin" style="margin:10px auto;width:14px;height:14px"></div>';
  var q=FB.query(FB.collection(FB.db,'posts/'+pid+'/comments'), FB.orderBy('createdAt','asc'));
  var snap=await FB.getDocs(q);
  el.innerHTML='';
  snap.forEach(function(d){
    var c=d.data();
    var item=document.createElement('div');
    item.className='comment-item';
    item.innerHTML='<div class="comment-av" style="background:'+grad(c.authorId||'x')+'">'+((c.authorName||'U')[0].toUpperCase())+'</div>'
      +'<div class="comment-body"><div class="comment-author">'+esc(c.authorName||'User')+'</div><div class="comment-text">'+esc(c.text)+'</div></div>';
    el.appendChild(item);
  });
  el.scrollTop=el.scrollHeight;
}

async function postComment(pid){
  var input=g('cinput-'+pid);
  var text=input.value.trim();
  if(!text) return;
  input.value='';
  await FB.addDoc(FB.collection(FB.db,'posts/'+pid+'/comments'),{
    text:text, authorId:me.uid, authorName:myName, createdAt:FB.serverTimestamp()
  });
  await FB.updateDoc(FB.doc(FB.db,'posts',pid),{ commentCount: FB.arrayUnion('_') }).catch(function(){
    FB.updateDoc(FB.doc(FB.db,'posts',pid),{ commentCount:(0+1) });
  });
  loadComments(pid);
}

/* post file select */
function onPostFileSelect(file){
  if(!file) return;
  postFileData=file;
  var prev=g('cp-preview');
  var img=g('cp-prev-img'), vid=g('cp-prev-vid');
  img.style.display='none'; vid.style.display='none';
  if(file.type.startsWith('image')){
    img.src=URL.createObjectURL(file); img.style.display='block';
  } else if(file.type.startsWith('video')){
    vid.src=URL.createObjectURL(file); vid.style.display='block';
  }
  prev.style.display='block';
}
function clearPostFile(){
  postFileData=null;
  g('cp-preview').style.display='none';
  g('cp-prev-img').src=''; g('cp-prev-vid').src='';
  g('cp-file-input').value=''; g('cp-vid-input').value=''; g('cp-any-input').value='';
}

async function submitPost(){
  var text=g('cp-ta').value.trim();
  if(!text && !postFileData) return;
  g('cp-submit').disabled=true;

  var mediaUrl=null, mediaType=null;
  if(postFileData){
    g('cp-progress').style.display='block';
    var result=await uploadFile(postFileData,'posts/'+me.uid+'_'+Date.now()+'_'+postFileData.name, function(pct){
      g('cp-prog-fill').style.width=pct+'%';
    });
    mediaUrl=result.url; mediaType=postFileData.type;
    g('cp-progress').style.display='none';
    clearPostFile();
  }

  await FB.addDoc(FB.collection(FB.db,'posts'),{
    text:text||'', authorId:me.uid, authorName:myName,
    mediaUrl:mediaUrl||null, mediaType:mediaType||null,
    reactions:{}, commentCount:0, createdAt:FB.serverTimestamp()
  });

  g('cp-ta').value='';
  g('cp-submit').disabled=false;
}

/* ════════════════════════════════════════════════
   PEOPLE PAGE
════════════════════════════════════════════════ */
function renderPeople(list){
  var el=g('people-grid');
  if(!list.length){ el.innerHTML='<p style="color:var(--muted);font-size:.85rem;padding:20px">No users found.</p>'; return; }
  el.innerHTML=list.map(function(u){
    return '<div class="person-card" data-uid="'+u.id+'" data-name="'+esc(u.name)+'">'
      +'<div class="person-av-lg" style="background:'+grad(u.id)+'">'+u.name[0].toUpperCase()+'</div>'
      +'<div class="person-name">'+esc(u.name)+'</div>'
      +'<div class="person-email">'+esc(u.email||'')+'</div>'
      +'<button class="person-chat-btn">Message</button>'
      +'</div>';
  }).join('');
  el.querySelectorAll('.person-card').forEach(function(card){
    card.querySelector('.person-chat-btn').addEventListener('click', function(e){
      e.stopPropagation();
      switchPage('chat');
      openChat(card.dataset.uid, card.dataset.name);
    });
  });
}

/* ════════════════════════════════════════════════
   CHAT
════════════════════════════════════════════════ */
function renderChatList(list){
  var el=g('cs-list');
  if(!list.length){ el.innerHTML='<p style="padding:12px;color:var(--muted);font-size:.8rem">No users found.</p>'; return; }
  el.innerHTML=list.map(function(u){
    var act=chatWith===u.id?' active':'';
    return '<div class="cs-row'+act+'" data-uid="'+u.id+'" data-name="'+esc(u.name)+'">'
      +'<div class="cs-av" style="background:'+grad(u.id)+'">'+u.name[0].toUpperCase()+'</div>'
      +'<div class="cs-info"><div class="cs-name">'+esc(u.name)+'</div><div class="cs-last">'+esc(u.email||'')+'</div></div>'
      +'<button class="chat-btn-sm">Chat</button>'
      +'</div>';
  }).join('');
  el.querySelectorAll('.cs-row').forEach(function(row){
    row.addEventListener('click', function(){ openChat(row.dataset.uid, row.dataset.name); });
  });
}

function openChat(uid, uname){
  // highlight in sidebar
  document.querySelectorAll('.cs-row').forEach(function(r){ r.classList.remove('active'); });
  var row=document.querySelector('[data-uid="'+uid+'"]');
  if(row) row.classList.add('active');

  chatWith=uid; chatWithName=uname;
  g('chat-empty').style.display='none';
  g('chat-active').classList.add('on');
  g('ch-name').textContent=uname;
  var av=g('ch-av');
  av.textContent=uname[0].toUpperCase();
  av.style.background=grad(uid);

  if(mob()){
    g('chat-sidebar').classList.add('away');
    g('chat-main').classList.add('here');
  }

  // load messages realtime
  if(chatUnsubFn){ chatUnsubFn(); chatUnsubFn=null; }
  var roomId=[me.uid,uid].sort().join('_');
  var q=FB.query(FB.collection(FB.db,'chats/'+roomId+'/messages'), FB.orderBy('createdAt','asc'));
  g('msgs-area').innerHTML='<div class="spin"></div>';
  chatUnsubFn=FB.onSnapshot(q, function(snap){
    var area=g('msgs-area'); area.innerHTML='';
    snap.forEach(function(d){ appendChatMsg(Object.assign({id:d.id},d.data())); });
    area.scrollTop=area.scrollHeight;
  });
}

function appendChatMsg(msg){
  var area=g('msgs-area');
  var out=msg.from===me.uid;
  var wrap=document.createElement('div');
  wrap.className='msg-wrap '+(out?'out':'in');

  var t=msg.createdAt&&msg.createdAt.toDate?msg.createdAt.toDate().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}):'';

  if(msg.type==='image'){
    wrap.innerHTML='<img class="msg-img" src="'+esc(msg.url)+'" loading="lazy" data-lb="'+esc(msg.url)+'">'
      +'<div class="msg-ts">'+t+'</div>';
    wrap.querySelector('.msg-img').addEventListener('click', function(){ openLightbox(msg.url); });
  } else if(msg.type==='file'){
    wrap.innerHTML='<div class="msg-bubble"><a class="msg-file-link" href="'+esc(msg.url)+'" target="_blank" rel="noopener">📎 '+esc(msg.fileName||'File')+'</a></div>'
      +'<div class="msg-ts">'+t+'</div>';
  } else if(msg.type==='video'){
    wrap.innerHTML='<video src="'+esc(msg.url)+'" controls style="max-width:220px;border-radius:12px;display:block"></video>'
      +'<div class="msg-ts">'+t+'</div>';
  } else {
    wrap.innerHTML='<div class="msg-bubble">'+esc(msg.text||'')+'</div><div class="msg-ts">'+t+'</div>';
  }
  area.appendChild(wrap);
}

async function sendChatMsg(){
  var ta=g('chat-ta');
  var text=ta.value.trim();

  if(chatFilePending){
    await sendChatFile();
    return;
  }
  if(!text||!chatWith) return;
  ta.value=''; ta.style.height='';

  var roomId=[me.uid,chatWith].sort().join('_');
  // ensure room doc
  await FB.setDoc(FB.doc(FB.db,'chats',roomId),{members:[me.uid,chatWith]},{merge:true});
  await FB.addDoc(FB.collection(FB.db,'chats/'+roomId+'/messages'),{
    text:text, from:me.uid, type:'text', createdAt:FB.serverTimestamp()
  });
}

/* chat file handling */
function onChatFileSelect(file){
  if(!file) return;
  chatFilePending=file;
  var cup=g('cup');
  var thumb=g('cup-thumb');
  if(file.type.startsWith('image')){ thumb.src=URL.createObjectURL(file); thumb.style.display='block'; }
  else { thumb.style.display='none'; }
  g('cup-name').textContent=file.name;
  g('cup-fill').style.width='0%';
  cup.classList.add('show');
  g('chat-ta').placeholder='Press send to upload…';
}
function clearChatFile(){
  chatFilePending=null;
  g('cup').classList.remove('show');
  g('chat-ta').placeholder='Type a message…';
  g('cup-thumb').src='';
}
async function sendChatFile(){
  if(!chatFilePending||!chatWith) return;
  var file=chatFilePending;
  clearChatFile();
  var roomId=[me.uid,chatWith].sort().join('_');
  await FB.setDoc(FB.doc(FB.db,'chats',roomId),{members:[me.uid,chatWith]},{merge:true});

  // upload with progress
  var path='chats/'+roomId+'/'+Date.now()+'_'+file.name;
  g('cup').classList.add('show');
  g('cup-name').textContent='Uploading '+file.name+'…';
  var result=await uploadFile(file, path, function(pct){ g('cup-fill').style.width=pct+'%'; });
  g('cup').classList.remove('show');

  var msgType=file.type.startsWith('image')?'image':file.type.startsWith('video')?'video':'file';
  await FB.addDoc(FB.collection(FB.db,'chats/'+roomId+'/messages'),{
    url:result.url, fileName:file.name, from:me.uid, type:msgType, createdAt:FB.serverTimestamp()
  });
}

/* ── Upload helper ──────────────────────────────── */
function uploadFile(file, path, onProgress){
  return new Promise(function(resolve, reject){
    var storageRef=FB.ref(FB.store, path);
    var task=FB.uploadBytesResumable(storageRef, file);
    task.on('state_changed',
      function(snap){ if(onProgress) onProgress(Math.round(snap.bytesTransferred/snap.totalBytes*100)); },
      reject,
      function(){ FB.getDownloadURL(task.snapshot.ref).then(function(url){ resolve({url:url}); }); }
    );
  });
}

/* ── Lightbox ───────────────────────────────────── */
function openLightbox(src){
  g('lb-img').src=src;
  g('lightbox').classList.add('on');
}

/* ── Page display helper ────────────────────────── */
// override switchPage display for flex pages
var _switchPage=switchPage;
switchPage=function(page){
  ['feed','people','chat'].forEach(function(p){
    var el=g('page-'+p);
    el.style.display='none';
    el.classList.remove('active-page');
    g('ntab-'+p).classList.remove('active');
  });
  var el=g('page-'+page);
  el.style.display='flex';
  g('ntab-'+page).classList.add('active');
  if(page==='feed' && !postsUnsub) loadFeed();
  if(page==='people') renderPeople(allUsers);
  if(page==='chat') renderChatList(allUsers);
};

}());
