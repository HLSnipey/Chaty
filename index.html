<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chaty</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --c1: #ff3cac; --c2: #784ba0; --c3: #2b86c5;
    --c4: #06d6a0; --c5: #ffd60a;
    --bg: #0a0a0f; --surface: #13131a; --surface2: #1e1e2e;
    --border: #2a2a3e; --text: #f0f0ff; --muted: #6b6b8a;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--text); height:100vh; overflow:hidden; }

  /* AUTH */
  #auth-screen {
    height:100vh; display:flex; align-items:center; justify-content:center;
    background: radial-gradient(ellipse at 20% 50%,#ff3cac22 0%,transparent 60%),
                radial-gradient(ellipse at 80% 20%,#2b86c522 0%,transparent 50%),
                radial-gradient(ellipse at 60% 80%,#784ba022 0%,transparent 50%), var(--bg);
  }
  .auth-card {
    background:var(--surface); border:1px solid var(--border);
    border-radius:24px; padding:48px 40px; width:420px; position:relative; overflow:hidden;
  }
  .auth-card::before {
    content:''; position:absolute; top:0; left:0; right:0; height:3px;
    background:linear-gradient(90deg,var(--c1),var(--c2),var(--c3),var(--c4));
  }
  .logo {
    font-family:'Syne',sans-serif; font-weight:800; font-size:2.4rem;
    background:linear-gradient(135deg,var(--c1),var(--c3));
    -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; margin-bottom:8px;
  }
  .auth-subtitle { color:var(--muted); font-size:.9rem; margin-bottom:32px; }
  .tabs { display:flex; gap:4px; background:var(--surface2); border-radius:10px; padding:4px; margin-bottom:28px; }
  .tab-btn {
    flex:1; padding:8px; border:none; border-radius:8px; background:transparent; color:var(--muted);
    font-family:'DM Sans',sans-serif; font-size:.9rem; cursor:pointer; transition:all .2s;
  }
  .tab-btn.active { background:linear-gradient(135deg,var(--c1),var(--c2)); color:#fff; font-weight:500; }
  .input-group { margin-bottom:16px; }
  .input-group label { display:block; font-size:.8rem; color:var(--muted); margin-bottom:6px; }
  .input-group input {
    width:100%; padding:12px 16px; background:var(--surface2); border:1px solid var(--border);
    border-radius:10px; color:var(--text); font-family:'DM Sans',sans-serif; font-size:.95rem;
    outline:none; transition:border-color .2s;
  }
  .input-group input:focus { border-color:var(--c1); }
  .auth-btn {
    width:100%; padding:14px; border:none; border-radius:10px;
    background:linear-gradient(135deg,var(--c1),var(--c2),var(--c3));
    color:#fff; font-family:'Syne',sans-serif; font-weight:700; font-size:1rem;
    cursor:pointer; margin-top:8px; transition:opacity .2s,transform .1s;
  }
  .auth-btn:hover { opacity:.9; transform:translateY(-1px); }
  .auth-btn:active { transform:translateY(0); }
  .error-msg   { color:#ff6b6b; font-size:.85rem; margin-top:12px; display:none; }
  .success-msg { color:var(--c4); font-size:.85rem; margin-top:12px; display:none; }

  /* APP */
  #app { display:none; height:100vh; flex-direction:column; }
  #app.visible { display:flex; }
  .topnav {
    display:flex; align-items:center; justify-content:space-between;
    padding:14px 24px; background:var(--surface); border-bottom:1px solid var(--border); flex-shrink:0;
  }
  .topnav .logo { font-size:1.5rem; margin-bottom:0; }
  .nav-user { display:flex; align-items:center; gap:12px; }
  .nav-user span { font-size:.85rem; color:var(--muted); }
  .logout-btn {
    padding:6px 14px; border:1px solid var(--border); border-radius:8px;
    background:transparent; color:var(--muted); cursor:pointer;
    font-family:'DM Sans',sans-serif; font-size:.8rem; transition:all .2s;
  }
  .logout-btn:hover { border-color:var(--c1); color:var(--c1); }
  .main-layout { display:flex; flex:1; overflow:hidden; }

  /* SIDEBAR */
  .sidebar { width:300px; background:var(--surface); border-right:1px solid var(--border); display:flex; flex-direction:column; flex-shrink:0; }
  .sidebar-header { padding:20px; border-bottom:1px solid var(--border); }
  .sidebar-header h2 { font-family:'Syne',sans-serif; font-size:1rem; font-weight:700; margin-bottom:12px; }
  .search-box {
    width:100%; padding:10px 14px; background:var(--surface2); border:1px solid var(--border);
    border-radius:10px; color:var(--text); font-family:'DM Sans',sans-serif; font-size:.85rem; outline:none; transition:border-color .2s;
  }
  .search-box:focus { border-color:var(--c3); }
  .users-list { flex:1; overflow-y:auto; padding:12px; }
  .users-list::-webkit-scrollbar { width:4px; }
  .users-list::-webkit-scrollbar-thumb { background:var(--border); border-radius:4px; }
  .user-item {
    display:flex; align-items:center; gap:12px; padding:12px;
    border-radius:12px; cursor:pointer; transition:background .15s; border:1px solid transparent;
  }
  .user-item:hover { background:var(--surface2); }
  .user-item.active { background:var(--surface2); border-color:var(--border); }
  .avatar {
    width:40px; height:40px; border-radius:12px; display:flex; align-items:center; justify-content:center;
    font-family:'Syne',sans-serif; font-weight:700; font-size:1rem; flex-shrink:0; color:#fff;
  }
  .user-info { flex:1; min-width:0; }
  .user-name { font-size:.9rem; font-weight:500; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .user-email { font-size:.75rem; color:var(--muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .chat-btn-small {
    padding:5px 10px; border-radius:7px; border:1px solid var(--border);
    background:transparent; color:var(--muted); font-size:.75rem; cursor:pointer;
    white-space:nowrap; transition:all .15s; font-family:'DM Sans',sans-serif;
  }
  .chat-btn-small:hover { background:linear-gradient(135deg,var(--c1),var(--c2)); border-color:transparent; color:#fff; }

  /* CHAT */
  .chat-area { flex:1; display:flex; flex-direction:column; overflow:hidden; }
  .chat-placeholder {
    flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center;
    color:var(--muted); background:radial-gradient(ellipse at center,#784ba011 0%,transparent 70%);
  }
  .chat-placeholder-icon { font-size:4rem; margin-bottom:16px; opacity:.4; }
  .chat-view { display:none; flex-direction:column; flex:1; overflow:hidden; }
  .chat-view.active { display:flex; }
  .chat-header {
    padding:16px 24px; background:var(--surface); border-bottom:1px solid var(--border);
    display:flex; align-items:center; gap:12px; flex-shrink:0;
  }
  .chat-header-name { font-family:'Syne',sans-serif; font-weight:700; font-size:1rem; }
  .chat-header-status { font-size:.75rem; color:var(--c4); }
  .messages-container {
    flex:1; overflow-y:auto; padding:24px; display:flex; flex-direction:column; gap:12px;
    background: radial-gradient(ellipse at 0% 100%,#ff3cac08,transparent 50%),
                radial-gradient(ellipse at 100% 0%,#2b86c508,transparent 50%), var(--bg);
  }
  .messages-container::-webkit-scrollbar { width:4px; }
  .messages-container::-webkit-scrollbar-thumb { background:var(--border); border-radius:4px; }
  .msg { display:flex; flex-direction:column; max-width:65%; animation:fadeUp .2s ease; }
  @keyframes fadeUp { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
  .msg.sent   { align-self:flex-end;  align-items:flex-end; }
  .msg.received { align-self:flex-start; align-items:flex-start; }
  .msg-bubble { padding:10px 16px; border-radius:18px; font-size:.9rem; line-height:1.5; word-break:break-word; }
  .msg.sent .msg-bubble {
    background:linear-gradient(135deg,var(--c1),var(--c2)); border-bottom-right-radius:4px; color:#fff;
  }
  .msg.received .msg-bubble { background:var(--surface2); border:1px solid var(--border); border-bottom-left-radius:4px; }
  .msg-time { font-size:.7rem; color:var(--muted); margin-top:4px; padding:0 4px; }
  .chat-input-area {
    padding:16px 24px; background:var(--surface); border-top:1px solid var(--border);
    display:flex; gap:12px; align-items:flex-end; flex-shrink:0;
  }
  .msg-input {
    flex:1; padding:12px 16px; background:var(--surface2); border:1px solid var(--border);
    border-radius:12px; color:var(--text); font-family:'DM Sans',sans-serif; font-size:.9rem;
    outline:none; resize:none; max-height:120px; transition:border-color .2s; line-height:1.4;
  }
  .msg-input:focus { border-color:var(--c1); }
  .send-btn {
    width:44px; height:44px; border-radius:12px; border:none;
    background:linear-gradient(135deg,var(--c1),var(--c2)); color:#fff; cursor:pointer;
    display:flex; align-items:center; justify-content:center; transition:transform .1s,opacity .2s; flex-shrink:0;
  }
  .send-btn:hover { opacity:.9; transform:scale(1.05); }
  .send-btn:active { transform:scale(.97); }
  .send-btn svg { width:18px; height:18px; fill:none; stroke:#fff; stroke-width:2; }
  .spinner {
    width:20px; height:20px; border:2px solid var(--border); border-top-color:var(--c1);
    border-radius:50%; animation:spin .7s linear infinite; margin:20px auto;
  }
  @keyframes spin { to{transform:rotate(360deg)} }
  .config-banner {
    position:fixed; bottom:0; left:0; right:0; background:#1a1200;
    border-top:2px solid var(--c5); padding:12px 24px; font-size:.85rem;
    display:none; z-index:999; text-align:center;
  }
  .config-banner.show { display:block; }
  .config-banner strong { color:var(--c5); }
  .config-banner code { background:#2a2000; padding:2px 6px; border-radius:4px; font-size:.8rem; }

  /* back button in chat header (mobile only) */
  .back-btn {
    display:none; align-items:center; justify-content:center;
    width:36px; height:36px; border-radius:10px; border:1px solid var(--border);
    background:transparent; color:var(--text); cursor:pointer; flex-shrink:0;
    transition:all .2s;
  }
  .back-btn svg { width:18px; height:18px; fill:none; stroke:currentColor; stroke-width:2; }
  .back-btn:hover { border-color:var(--c1); color:var(--c1); }

  /* ── MOBILE ── */
  @media (max-width: 640px) {
    .auth-card { width:100%; margin:16px; padding:36px 24px; }

    .main-layout { position:relative; overflow:hidden; }

    /* sidebar fills full width, slides in/out */
    .sidebar {
      position:absolute; inset:0; width:100%; z-index:10;
      transform:translateX(0); transition:transform .3s ease;
    }
    /* when a chat is open, sidebar slides off left */
    .sidebar.hidden { transform:translateX(-100%); }

    /* chat area also full width */
    .chat-area {
      position:absolute; inset:0; width:100%; z-index:9;
      transform:translateX(100%); transition:transform .3s ease;
    }
    /* when chat is open, slide in from right */
    .chat-area.open { transform:translateX(0); }

    .back-btn { display:flex; }

    /* wider bubbles on small screens */
    .msg { max-width:85%; }

    /* slightly smaller input padding */
    .chat-input-area { padding:12px 14px; }
    .messages-container { padding:16px; }

    /* nav username hidden to save space */
    .nav-user span { display:none; }
  }
</style>
</head>
<body>

<!-- AUTH -->
<div id="auth-screen">
  <div class="auth-card">
    <div class="logo">Chaty</div>
    <p class="auth-subtitle">Colorful conversations, real connections.</p>
    <div class="tabs">
      <button class="tab-btn active" id="tab-login">Login</button>
      <button class="tab-btn" id="tab-signup">Sign Up</button>
    </div>
    <div id="login-form">
      <div class="input-group"><label>Email</label><input type="email" id="login-email" placeholder="you@example.com"></div>
      <div class="input-group"><label>Password</label><input type="password" id="login-pass" placeholder="••••••••"></div>
      <button class="auth-btn" id="login-btn">Login →</button>
    </div>
    <div id="signup-form" style="display:none">
      <div class="input-group"><label>Display Name</label><input type="text" id="signup-name" placeholder="Your name"></div>
      <div class="input-group"><label>Email</label><input type="email" id="signup-email" placeholder="you@example.com"></div>
      <div class="input-group"><label>Password</label><input type="password" id="signup-pass" placeholder="Min 6 characters"></div>
      <button class="auth-btn" id="signup-btn">Create Account →</button>
    </div>
    <div class="error-msg"   id="auth-error"></div>
    <div class="success-msg" id="auth-success"></div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <nav class="topnav">
    <div class="logo">Chaty</div>
    <div class="nav-user">
      <span id="nav-username"></span>
      <button class="logout-btn" id="logout-btn">Logout</button>
    </div>
  </nav>
  <div class="main-layout">
    <aside class="sidebar">
      <div class="sidebar-header">
        <h2>People</h2>
        <input class="search-box" type="text" placeholder="Search users…" id="user-search">
      </div>
      <div class="users-list" id="users-list"><div class="spinner"></div></div>
    </aside>
    <div class="chat-area">
      <div class="chat-placeholder" id="chat-placeholder">
        <div class="chat-placeholder-icon">💬</div>
        <p>Select someone to start chatting</p>
      </div>
      <div class="chat-view" id="chat-view">
        <div class="chat-header">
          <button class="back-btn" id="back-btn" aria-label="Back to people">
            <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
          </button>
          <div class="avatar" id="chat-hdr-av"></div>
          <div>
            <div class="chat-header-name"   id="chat-hdr-name"></div>
            <div class="chat-header-status">Active now</div>
          </div>
        </div>
        <div class="messages-container" id="msgs"></div>
        <div class="chat-input-area">
          <textarea class="msg-input" id="msg-input" rows="1" placeholder="Type a message…"></textarea>
          <button class="send-btn" id="send-btn">
            <svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
          </button>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="config-banner" id="cfg-banner">
  <strong>⚡ Action needed:</strong> Open <code>index.html</code> and set <code>SUPA_URL</code> and <code>SUPA_KEY</code>
  near the bottom of the file to your values from <strong>Supabase → Settings → API</strong>.
</div>

<script>
(function () {
  'use strict';

  /* ====================================================
     ▼▼  PASTE YOUR VALUES HERE  ▼▼
  ==================================================== */
  var SUPA_URL = 'https://iacrtcghdzjyageyhpdc.supabase.co/';
  var SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlhY3J0Y2doZHpqeWFnZXlocGRjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzNzM2MzcsImV4cCI6MjA4Nzk0OTYzN30.ukFKi7ewopCOIzyKO8qR7yggdbF1lNFiDJY_782P0Io';
  /* ====================================================
     ▲▲  PASTE YOUR VALUES HERE  ▲▲
  ==================================================== */

  var sbc;            // supabase client (named differently from window.supabase)
  var me = null;
  var chatWith = null;
  var allUsers = [];
  var rtChan = null;

  var GRAD = [
    'linear-gradient(135deg,#ff3cac,#784ba0)',
    'linear-gradient(135deg,#2b86c5,#06d6a0)',
    'linear-gradient(135deg,#ffd60a,#ff6b6b)',
    'linear-gradient(135deg,#06d6a0,#2b86c5)',
    'linear-gradient(135deg,#ff6b6b,#ff3cac)',
    'linear-gradient(135deg,#784ba0,#2b86c5)'
  ];

  function avatarGrad(id) {
    var h = 0;
    for (var i = 0; i < id.length; i++) h = ((h << 5) - h) + id.charCodeAt(i);
    return GRAD[Math.abs(h) % GRAD.length];
  }

  function ge(id) { return document.getElementById(id); }

  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  /* ── Boot ───────────────────────────────── */
  window.addEventListener('load', function () {
    if (SUPA_URL === 'YOUR_SUPABASE_URL' || SUPA_KEY === 'YOUR_SUPABASE_ANON_KEY') {
      ge('cfg-banner').classList.add('show');
      return;
    }
    try {
      // window.supabase is the CDN lib; we store our client in sbc to avoid name clash
      sbc = window.supabase.createClient(SUPA_URL, SUPA_KEY);
    } catch (e) {
      ge('cfg-banner').classList.add('show');
      return;
    }
    wireUI();
    bootSession();
  });

  /* ── UI wiring ──────────────────────────── */
  function wireUI() {
    ge('tab-login').addEventListener('click',  function(){ switchTab('login');  });
    ge('tab-signup').addEventListener('click', function(){ switchTab('signup'); });
    ge('login-btn').addEventListener('click',  doLogin);
    ge('signup-btn').addEventListener('click', doSignup);
    ge('logout-btn').addEventListener('click', doLogout);

    ge('login-pass').addEventListener('keydown', function(e){ if(e.key==='Enter') doLogin(); });
    ge('signup-pass').addEventListener('keydown', function(e){ if(e.key==='Enter') doSignup(); });

    ge('user-search').addEventListener('input', function(){
      var q = this.value.toLowerCase();
      renderUsers(allUsers.filter(function(u){
        return u.display_name.toLowerCase().includes(q) || (u.email||'').toLowerCase().includes(q);
      }));
    });

    ge('send-btn').addEventListener('click', sendMsg);
    ge('msg-input').addEventListener('keydown', function(e){
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMsg(); }
    });
    ge('msg-input').addEventListener('input', function(){
      this.style.height = 'auto';
      this.style.height = Math.min(this.scrollHeight, 120) + 'px';
    });
    ge('back-btn').addEventListener('click', goBackToList);
  }

  function isMobile() { return window.innerWidth <= 640; }

  function showChatMobile() {
    if (!isMobile()) return;
    ge('sidebar').classList.add('hidden');
    ge('chat-area').classList.add('open');
  }

  function goBackToList() {
    ge('sidebar').classList.remove('hidden');
    ge('chat-area').classList.remove('open');
  }

  /* ── Session ────────────────────────────── */
  async function bootSession() {
    var r = await sbc.auth.getSession();
    if (r.data && r.data.session) { me = r.data.session.user; await enterApp(); }
    sbc.auth.onAuthStateChange(function(evt, session){
      if (session) { me = session.user; enterApp(); }
      else          { me = null; showAuthScreen(); }
    });
  }

  /* ── Tab switch ─────────────────────────── */
  function switchTab(tab) {
    ge('tab-login').classList.toggle('active',  tab==='login');
    ge('tab-signup').classList.toggle('active', tab==='signup');
    ge('login-form').style.display  = tab==='login'  ? 'block' : 'none';
    ge('signup-form').style.display = tab==='signup' ? 'block' : 'none';
    clearFeedback();
  }

  /* ── Auth actions ───────────────────────── */
  async function doLogin() {
    var email = ge('login-email').value.trim();
    var pass  = ge('login-pass').value;
    if (!email || !pass) return setErr('Fill in all fields.');
    clearFeedback();
    var r = await sbc.auth.signInWithPassword({ email:email, password:pass });
    if (r.error) setErr(r.error.message);
  }

  async function doSignup() {
    var name  = ge('signup-name').value.trim();
    var email = ge('signup-email').value.trim();
    var pass  = ge('signup-pass').value;
    if (!name||!email||!pass) return setErr('Fill in all fields.');
    if (pass.length < 6)      return setErr('Password needs at least 6 characters.');
    clearFeedback();
    var r = await sbc.auth.signUp({ email:email, password:pass, options:{ data:{ display_name:name } } });
    if (r.error) return setErr(r.error.message);
    if (r.data && r.data.user) {
      await sbc.from('profiles').upsert({ id:r.data.user.id, display_name:name, email:email });
      if (!r.data.session) setOk('Account created! Check your email to confirm, then log in.');
    }
  }

  async function doLogout() {
    if (rtChan) { sbc.removeChannel(rtChan); rtChan = null; }
    await sbc.auth.signOut();
  }

  function setErr(msg) { ge('auth-error').textContent=msg;  ge('auth-error').style.display='block'; }
  function setOk(msg)  { ge('auth-success').textContent=msg; ge('auth-success').style.display='block'; }
  function clearFeedback() {
    ge('auth-error').style.display='none';
    ge('auth-success').style.display='none';
  }

  /* ── Screen helpers ─────────────────────── */
  function showAuthScreen() {
    ge('auth-screen').style.display = 'flex';
    ge('app').classList.remove('visible');
  }

  async function enterApp() {
    ge('auth-screen').style.display = 'none';
    ge('app').classList.add('visible');
    var meta = me.user_metadata || {};
    var name = meta.display_name || me.email.split('@')[0];
    await sbc.from('profiles').upsert({ id:me.id, display_name:name, email:me.email });
    ge('nav-username').textContent = name;
    chatWith = null;
    ge('chat-placeholder').style.display = 'flex';
    ge('chat-view').classList.remove('active');
    ge('sidebar').classList.remove('hidden');
    ge('chat-area').classList.remove('open');
    loadUsers();
  }

  /* ── Users ──────────────────────────────── */
  async function loadUsers() {
    ge('users-list').innerHTML = '<div class="spinner"></div>';
    var r = await sbc.from('profiles').select('*').neq('id', me.id).order('display_name');
    if (r.error) {
      ge('users-list').innerHTML = '<p style="padding:16px;color:var(--muted);font-size:.85rem">Could not load users.<br>Check Supabase tables & RLS.</p>';
      return;
    }
    allUsers = r.data || [];
    renderUsers(allUsers);
  }

  function renderUsers(list) {
    var el = ge('users-list');
    if (!list.length) { el.innerHTML = '<p style="padding:16px;color:var(--muted);font-size:.85rem">No users found.</p>'; return; }
    el.innerHTML = list.map(function(u){
      var act = chatWith===u.id ? 'active' : '';
      return '<div class="user-item '+act+'" data-uid="'+u.id+'" data-name="'+esc(u.display_name)+'">'
        +'<div class="avatar" style="background:'+avatarGrad(u.id)+'">'+u.display_name[0].toUpperCase()+'</div>'
        +'<div class="user-info"><div class="user-name">'+esc(u.display_name)+'</div>'
        +'<div class="user-email">'+esc(u.email||'')+'</div></div>'
        +'<button class="chat-btn-small">Chat</button></div>';
    }).join('');
    el.querySelectorAll('.user-item').forEach(function(row){
      row.addEventListener('click', function(){ openChat(row.dataset.uid, row.dataset.name); });
    });
  }

  /* ── Chat ───────────────────────────────── */
  async function openChat(uid, uname) {
    document.querySelectorAll('.user-item').forEach(function(r){ r.classList.remove('active'); });
    var row = document.querySelector('[data-uid="'+uid+'"]');
    if (row) row.classList.add('active');

    chatWith = uid;
    ge('chat-placeholder').style.display = 'none';
    ge('chat-view').classList.add('active');
    ge('chat-hdr-name').textContent = uname;
    var av = ge('chat-hdr-av');
    av.textContent = uname[0].toUpperCase();
    av.style.background = avatarGrad(uid);

    showChatMobile();

    ge('msgs').innerHTML = '<div class="spinner"></div>';
    await loadMessages();

    if (rtChan) { sbc.removeChannel(rtChan); rtChan = null; }
    rtChan = sbc.channel('chat_' + [me.id, uid].sort().join('_'))
      .on('postgres_changes', { event:'INSERT', schema:'public', table:'messages' }, function(p){
        var m = p.new;
        if ((m.sender_id===me.id && m.receiver_id===chatWith) ||
            (m.sender_id===chatWith && m.receiver_id===me.id)) {
          // skip messages we already appended optimistically
          if (m.sender_id !== me.id) appendMsg(m, true);
        }
      })
      .subscribe();
  }

  async function loadMessages() {
    var r = await sbc.from('messages')
      .select('*')
      .or('and(sender_id.eq.'+me.id+',receiver_id.eq.'+chatWith+'),and(sender_id.eq.'+chatWith+',receiver_id.eq.'+me.id+')')
      .order('created_at', { ascending:true });
    var c = ge('msgs');
    c.innerHTML = '';
    (r.data||[]).forEach(function(m){ appendMsg(m, false); });
    c.scrollTop = c.scrollHeight;
  }

  function appendMsg(msg, scroll) {
    var c = ge('msgs');
    var sent = msg.sender_id === me.id;
    var time = new Date(msg.created_at).toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' });
    var div = document.createElement('div');
    div.className = 'msg ' + (sent ? 'sent' : 'received');
    div.innerHTML = '<div class="msg-bubble">'+esc(msg.content)+'</div><div class="msg-time">'+time+'</div>';
    c.appendChild(div);
    if (scroll !== false) c.scrollTop = c.scrollHeight;
  }

  async function sendMsg() {
    var input = ge('msg-input');
    var text  = input.value.trim();
    if (!text || !chatWith) return;
    input.value = '';
    input.style.height = '';
    var msg = { sender_id:me.id, receiver_id:chatWith, content:text };
    appendMsg(Object.assign({}, msg, { created_at: new Date().toISOString() }), true);
    await sbc.from('messages').insert(msg);
  }

}());
</script>
