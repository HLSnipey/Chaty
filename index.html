<html lang="en">
<head>

const app=initializeApp({apiKey:"AIzaSyD3y9wwCpc8VZVZb4F1LeKpGcrju348Epo",authDomain:"chaty-3e854.firebaseapp.com",projectId:"chaty-3e854",storageBucket:"chaty-3e854.firebasestorage.app",messagingSenderId:"184662030881",appId:"1:184662030881:web:56fc9a890e018272774160"});
const auth=getAuth(app),db=getFirestore(app);
window.__FB={auth,db,createUserWithEmailAndPassword,signInWithEmailAndPassword,signOut,onAuthStateChanged,updateProfile,collection,doc,setDoc,getDoc,getDocs,addDoc,query,orderBy,onSnapshot,updateDoc,arrayUnion,arrayRemove,serverTimestamp,where,limit,deleteDoc,increment};

<style>
/* ═══ TOKENS ═══ */
:root{
  --peach:#F4A07A;--peach-lt:#FDE8D8;--cream:#FDF6EE;
  --terra:#C96A42;--terra-dk:#9E4A28;--sand:#E8D5BE;
  --brown:#7A5C48;--ink:#2A1A0E;--white:#FFFCF8;
  --green:#4CAF80;--red:#E05C5C;
  --r:18px;--r-sm:10px;--r-full:999px;
  --shadow:0 4px 24px rgba(42,26,14,.08);
  --shadow-lg:0 12px 40px rgba(42,26,14,.13);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--ink);height:100dvh;overflow:hidden;}
input,textarea,button{font-family:inherit;}
button{cursor:pointer;border:none;background:none;}
a{color:inherit;text-decoration:none;}
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--sand);border-radius:99px;}

/* ═══ UTILS ═══ */
.hidden{display:none!important;}
.serif{font-family:'Fraunces',serif;}
.tag{display:inline-block;background:var(--peach-lt);color:var(--terra-dk);font-size:.72rem;font-weight:500;padding:.25rem .75rem;border-radius:var(--r-full);}

/* ════════════════════════════════════
   AUTH SCREEN
════════════════════════════════════ */
#auth-screen{
  display:flex;align-items:center;justify-content:center;
  min-height:100dvh;background:var(--cream);
  background-image:radial-gradient(ellipse 70% 50% at 80% 20%,#FDE8D8 0%,transparent 70%),
                   radial-gradient(ellipse 50% 50% at 10% 80%,#F4A07A22 0%,transparent 60%);
}
.auth-wrap{width:100%;max-width:420px;padding:1.5rem;}
.auth-logo{
  display:flex;align-items:center;gap:.6rem;
  font-family:'Fraunces',serif;font-size:2rem;font-weight:500;color:var(--terra);
  justify-content:center;margin-bottom:.4rem;
}
.auth-logo svg{width:36px;height:36px;}
.auth-tagline{text-align:center;font-size:.9rem;color:var(--brown);margin-bottom:2rem;}
.auth-card{
  background:var(--white);border:1.5px solid var(--sand);
  border-radius:24px;padding:2rem;box-shadow:var(--shadow-lg);
}
.auth-tabs{display:flex;gap:.5rem;margin-bottom:1.8rem;background:var(--cream);border-radius:var(--r-full);padding:.3rem;}
.auth-tab{
  flex:1;padding:.55rem;border-radius:var(--r-full);font-size:.88rem;font-weight:500;
  color:var(--brown);transition:all .2s;text-align:center;
}
.auth-tab.active{background:var(--white);color:var(--terra);box-shadow:0 2px 8px rgba(0,0,0,.08);}
.auth-form{display:flex;flex-direction:column;gap:.9rem;}
.auth-form input{
  background:var(--cream);border:1.5px solid var(--sand);border-radius:var(--r);
  padding:.75rem 1rem;font-size:.92rem;outline:none;transition:border-color .2s;color:var(--ink);
}
.auth-form input:focus{border-color:var(--peach);}
.auth-form input::placeholder{color:var(--brown);opacity:.6;}
.btn-primary{
  background:var(--terra);color:#fff;border-radius:var(--r-full);
  padding:.75rem 1.5rem;font-size:.92rem;font-weight:500;
  transition:background .2s,transform .15s,box-shadow .2s;
  box-shadow:0 4px 16px rgba(201,106,66,.25);
}
.btn-primary:hover{background:var(--terra-dk);transform:translateY(-1px);box-shadow:0 6px 20px rgba(201,106,66,.35);}
#a-err{color:var(--red);font-size:.83rem;text-align:center;min-height:1.2em;}
#a-ok{color:var(--green);font-size:.83rem;text-align:center;}

/* ════════════════════════════════════
   APP SHELL
════════════════════════════════════ */
#app{display:none;flex-direction:column;height:100dvh;}
#app.visible{display:flex;}

/* ═══ TOP NAV ═══ */
.topnav{
  display:flex;align-items:center;gap:1rem;
  padding:.75rem 1.5rem;background:var(--white);
  border-bottom:1.5px solid var(--sand);flex-shrink:0;
  box-shadow:0 2px 12px rgba(42,26,14,.06);z-index:50;position:relative;
}
.nav-logo{
  font-family:'Fraunces',serif;font-size:1.4rem;font-weight:500;color:var(--terra);
  display:flex;align-items:center;gap:.4rem;flex-shrink:0;
}
.nav-logo svg{width:24px;height:24px;}
.nav-tabs{display:flex;gap:.3rem;flex:1;justify-content:center;}
.ntab{
  display:flex;align-items:center;gap:.4rem;padding:.5rem 1rem;
  border-radius:var(--r-full);font-size:.85rem;font-weight:500;color:var(--brown);
  transition:all .2s;position:relative;
}
.ntab:hover{color:var(--terra);background:var(--peach-lt);}
.ntab.active{background:var(--terra);color:#fff;}
.ntab .tab-icon{font-size:1rem;}
.tab-label{font-size:.82rem;}
.badge{
  position:absolute;top:2px;right:2px;
  background:var(--red);color:#fff;font-size:.62rem;font-weight:700;
  border-radius:var(--r-full);padding:.1rem .38rem;min-width:16px;text-align:center;
  border:2px solid var(--white);
}
.nav-right{display:flex;align-items:center;gap:.75rem;flex-shrink:0;}
#nav-av-wrap{position:relative;cursor:pointer;}
#nav-av{
  width:38px;height:38px;border-radius:50%;
  background:var(--peach-lt);border:2px solid var(--sand);
  display:flex;align-items:center;justify-content:center;
  font-weight:600;font-size:.9rem;color:var(--terra-dk);overflow:hidden;
}
#nav-av img{width:100%;height:100%;object-fit:cover;}
#nav-av-upload{
  position:absolute;bottom:-2px;right:-2px;
  background:var(--terra);color:#fff;border-radius:50%;
  width:18px;height:18px;font-size:.65rem;display:flex;align-items:center;justify-content:center;
  border:2px solid var(--white);
}
#av-file-input{display:none;}
#notif-btn{
  position:relative;padding:.45rem;border-radius:var(--r-full);
  color:var(--brown);transition:all .2s;font-size:1.1rem;
}
#notif-btn:hover{background:var(--peach-lt);color:var(--terra);}
#notif-badge{
  position:absolute;top:0;right:0;
  background:var(--red);color:#fff;font-size:.6rem;font-weight:700;
  border-radius:var(--r-full);padding:.1rem .35rem;min-width:15px;text-align:center;
  border:2px solid var(--white);
}
#notif-panel{
  position:absolute;top:calc(100% + 8px);right:1rem;width:320px;
  background:var(--white);border:1.5px solid var(--sand);border-radius:var(--r);
  box-shadow:var(--shadow-lg);z-index:200;overflow:hidden;
}
.notif-panel-head{
  display:flex;align-items:center;justify-content:space-between;
  padding:.9rem 1.1rem;border-bottom:1px solid var(--sand);
  font-size:.85rem;font-weight:500;color:var(--ink);
}
#mark-all-read{font-size:.78rem;color:var(--terra);background:none;border:none;cursor:pointer;}
#notif-list{max-height:340px;overflow-y:auto;}
.notif-item{
  display:flex;gap:.75rem;align-items:flex-start;
  padding:.85rem 1.1rem;border-bottom:1px solid var(--cream);
  cursor:pointer;transition:background .15s;font-size:.83rem;
}
.notif-item:hover{background:var(--cream);}
.notif-item.unread{border-left:3px solid var(--terra);background:var(--peach-lt);}
.notif-icon{font-size:1.2rem;flex-shrink:0;margin-top:.1rem;}
.notif-body{flex:1;}
.notif-body strong{color:var(--ink);}
.notif-body p{color:var(--brown);margin-top:.15rem;font-size:.78rem;}
.notif-body .notif-time{color:var(--sand);font-size:.72rem;margin-top:.2rem;}
#btn-logout{
  padding:.45rem .9rem;border-radius:var(--r-full);
  font-size:.8rem;color:var(--brown);border:1.5px solid var(--sand);
  transition:all .2s;
}
#btn-logout:hover{border-color:var(--red);color:var(--red);}

/* ═══ MAIN CONTENT ═══ */
.main{flex:1;overflow:hidden;display:flex;flex-direction:column;}
.page{display:none;flex:1;overflow-y:auto;overflow-x:hidden;}
.page.active{display:flex;flex-direction:column;}

/* ════════════════════════════════════
   FEED PAGE
════════════════════════════════════ */
#page-feed{padding:1.5rem;gap:1.2rem;max-width:680px;width:100%;margin:0 auto;align-self:flex-start;width:100%;}
#page-feed{display:none;}
#page-feed.active{display:flex;}

/* Notif permission banner */
#notif-perm-banner{
  background:linear-gradient(135deg,var(--peach-lt),var(--cream));
  border:1.5px solid var(--peach);border-radius:var(--r);
  padding:1rem 1.2rem;display:flex;align-items:center;justify-content:space-between;gap:1rem;
}
#notif-perm-banner p{font-size:.85rem;color:var(--brown);}
#notif-perm-banner button{
  background:var(--terra);color:#fff;border-radius:var(--r-full);
  padding:.4rem 1rem;font-size:.8rem;font-weight:500;flex-shrink:0;
}

/* Stories bar */
.stories-bar{
  overflow-x:auto;white-space:nowrap;padding:.25rem 0;
  scrollbar-width:none;-ms-overflow-style:none;
}
.stories-bar::-webkit-scrollbar{display:none;}
#stories-row{display:inline-flex;gap:.85rem;align-items:flex-start;}
.story-bubble{
  display:inline-flex;flex-direction:column;align-items:center;gap:.4rem;
  cursor:pointer;min-width:62px;
}
.story-ring{
  width:58px;height:58px;border-radius:50%;padding:2.5px;
  background:linear-gradient(135deg,var(--terra),var(--peach));
}
.story-ring.seen{background:var(--sand);}
.story-ring-inner{
  width:100%;height:100%;border-radius:50%;overflow:hidden;
  background:var(--peach-lt);border:2.5px solid var(--white);
  display:flex;align-items:center;justify-content:center;
  font-size:1.4rem;
}
.story-ring-inner img{width:100%;height:100%;object-fit:cover;}
.story-av{
  width:100%;height:100%;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-weight:600;font-size:1rem;color:var(--terra-dk);
}
.story-add-btn .story-ring-inner{font-size:1.5rem;color:var(--terra);}
.story-name{font-size:.68rem;color:var(--brown);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:60px;text-align:center;}

/* Create Post */
.create-post{
  background:var(--white);border:1.5px solid var(--sand);border-radius:var(--r);
  padding:1.2rem;display:flex;flex-direction:column;gap:.9rem;
  box-shadow:var(--shadow);
}
.cp-top{display:flex;gap:.75rem;align-items:flex-start;}
#cp-av{
  width:40px;height:40px;border-radius:50%;flex-shrink:0;
  background:var(--peach-lt);display:flex;align-items:center;justify-content:center;
  font-weight:600;font-size:.9rem;color:var(--terra-dk);overflow:hidden;border:2px solid var(--sand);
}
#cp-av img{width:100%;height:100%;object-fit:cover;}
#cp-ta{
  flex:1;border:none;outline:none;resize:none;
  font-size:.93rem;color:var(--ink);background:transparent;
  min-height:60px;line-height:1.6;
}
#cp-ta::placeholder{color:var(--brown);opacity:.55;}
.cp-actions{display:flex;align-items:center;gap:.6rem;border-top:1px solid var(--cream);padding-top:.9rem;}
.cp-media-btn{
  display:flex;align-items:center;gap:.35rem;padding:.4rem .8rem;
  border-radius:var(--r-full);border:1.5px solid var(--sand);
  font-size:.78rem;color:var(--brown);transition:all .2s;
}
.cp-media-btn:hover{border-color:var(--peach);color:var(--terra);}
#cp-submit{
  margin-left:auto;background:var(--terra);color:#fff;
  border-radius:var(--r-full);padding:.48rem 1.3rem;font-size:.85rem;font-weight:500;
  transition:all .2s;box-shadow:0 3px 12px rgba(201,106,66,.22);
}
#cp-submit:hover{background:var(--terra-dk);transform:translateY(-1px);}
#cp-preview{border-radius:var(--r-sm);overflow:hidden;}
#cp-preview img,#cp-preview video{max-width:100%;max-height:200px;border-radius:var(--r-sm);}
.cp-progress-wrap{background:var(--cream);border-radius:var(--r-full);height:6px;overflow:hidden;}
#cp-progress{height:100%;background:linear-gradient(90deg,var(--peach),var(--terra));border-radius:var(--r-full);width:0;transition:width .2s;}

/* Post card */
.post-card{
  background:var(--white);border:1.5px solid var(--sand);border-radius:var(--r);
  padding:1.2rem;box-shadow:var(--shadow);
  animation:slideIn .3s ease both;
}
@keyframes slideIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.post-header{display:flex;align-items:center;gap:.75rem;margin-bottom:.9rem;}
.post-av{
  width:42px;height:42px;border-radius:50%;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-weight:600;font-size:.95rem;color:#fff;overflow:hidden;
  border:2px solid var(--sand);
}
.post-av img{width:100%;height:100%;object-fit:cover;}
.post-meta{flex:1;}
.post-name{font-weight:500;font-size:.9rem;color:var(--ink);}
.post-time{font-size:.75rem;color:var(--brown);margin-top:.1rem;}
.post-menu-btn{
  padding:.3rem .5rem;border-radius:var(--r-sm);color:var(--brown);
  font-size:1.1rem;transition:all .2s;opacity:0;
}
.post-card:hover .post-menu-btn{opacity:1;}
.post-card:hover .post-menu-btn:hover{background:var(--cream);color:var(--terra);}
.post-text{font-size:.92rem;line-height:1.65;color:var(--ink);margin-bottom:.9rem;white-space:pre-wrap;}
.post-media{margin-bottom:.9rem;}
.post-media img{max-width:100%;border-radius:var(--r-sm);cursor:pointer;transition:opacity .2s;}
.post-media img:hover{opacity:.92;}
.post-media video{max-width:100%;border-radius:var(--r-sm);}
.post-media a{
  display:inline-flex;align-items:center;gap:.5rem;
  padding:.6rem 1rem;background:var(--cream);border:1.5px solid var(--sand);
  border-radius:var(--r-sm);font-size:.83rem;color:var(--brown);
  transition:all .2s;
}
.post-media a:hover{border-color:var(--peach);color:var(--terra);}
.reactions-bar{display:flex;gap:.4rem;flex-wrap:wrap;margin-bottom:.9rem;}
.react-btn{
  display:flex;align-items:center;gap:.3rem;padding:.3rem .6rem;
  border-radius:var(--r-full);border:1.5px solid var(--sand);
  font-size:.82rem;color:var(--brown);transition:all .18s;position:relative;
  cursor:pointer;background:var(--white);
}
.react-btn:hover{border-color:var(--peach);background:var(--peach-lt);}
.react-btn.reacted{border-color:var(--terra);background:var(--peach-lt);color:var(--terra-dk);}
.react-btn .react-count{font-size:.75rem;font-weight:500;}
.react-tooltip{
  position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);
  background:var(--ink);color:#fff;font-size:.72rem;border-radius:6px;
  padding:.3rem .6rem;white-space:nowrap;pointer-events:none;opacity:0;
  transition:opacity .15s;z-index:20;
}
.react-btn:hover .react-tooltip{opacity:1;}
.post-footer{display:flex;align-items:center;gap:1rem;border-top:1px solid var(--cream);padding-top:.85rem;}
.comment-toggle-btn{
  display:flex;align-items:center;gap:.4rem;font-size:.82rem;color:var(--brown);
  padding:.3rem .7rem;border-radius:var(--r-full);border:1.5px solid var(--sand);
  transition:all .2s;
}
.comment-toggle-btn:hover{border-color:var(--peach);color:var(--terra);}

/* Comments */
.comments-section{margin-top:.9rem;border-top:1px solid var(--cream);padding-top:.9rem;display:flex;flex-direction:column;gap:.7rem;}
.comment-item{display:flex;gap:.6rem;align-items:flex-start;}
.comment-av{
  width:30px;height:30px;border-radius:50%;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-size:.7rem;font-weight:600;color:#fff;
}
.comment-bubble{background:var(--cream);border-radius:0 var(--r-sm) var(--r-sm) var(--r-sm);padding:.5rem .8rem;flex:1;}
.comment-author{font-size:.77rem;font-weight:500;color:var(--ink);margin-bottom:.15rem;}
.comment-text{font-size:.85rem;color:var(--ink);line-height:1.55;}
.comment-input-wrap{display:flex;gap:.6rem;align-items:center;margin-top:.4rem;}
.comment-input{
  flex:1;border:1.5px solid var(--sand);border-radius:var(--r-full);
  padding:.45rem .9rem;font-size:.85rem;outline:none;color:var(--ink);
  background:var(--cream);transition:border-color .2s;
}
.comment-input:focus{border-color:var(--peach);}
.comment-send-btn{
  background:var(--terra);color:#fff;border-radius:var(--r-full);
  padding:.42rem .9rem;font-size:.8rem;font-weight:500;
}

/* ════════════════════════════════════
   PEOPLE PAGE
════════════════════════════════════ */
#page-people{padding:1.5rem;gap:1.2rem;max-width:900px;width:100%;margin:0 auto;align-self:flex-start;}
#page-people{display:none;}
#page-people.active{display:flex;}
#people-search{
  width:100%;padding:.7rem 1.1rem;border:1.5px solid var(--sand);border-radius:var(--r-full);
  font-size:.9rem;outline:none;color:var(--ink);background:var(--white);transition:border-color .2s;
}
#people-search:focus{border-color:var(--peach);}
#people-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:1rem;}
.person-card{
  background:var(--white);border:1.5px solid var(--sand);border-radius:var(--r);
  padding:1.4rem;display:flex;flex-direction:column;align-items:center;text-align:center;
  gap:.7rem;box-shadow:var(--shadow);transition:all .2s;position:relative;
}
.person-card:hover{transform:translateY(-3px);box-shadow:var(--shadow-lg);}
.person-av{
  width:60px;height:60px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-weight:600;font-size:1.2rem;color:#fff;overflow:hidden;
  border:3px solid var(--white);box-shadow:0 0 0 2px var(--sand);
  position:relative;
}
.person-av img{width:100%;height:100%;object-fit:cover;}
.presence-dot{
  position:absolute;bottom:2px;right:2px;
  width:13px;height:13px;border-radius:50%;
  border:2.5px solid var(--white);
}
.presence-dot.online{background:var(--green);}
.presence-dot.offline{background:var(--sand);}
.person-name{font-weight:500;font-size:.93rem;color:var(--ink);}
.person-email{font-size:.78rem;color:var(--brown);}
.msg-btn{
  background:var(--terra);color:#fff;border-radius:var(--r-full);
  padding:.45rem 1.2rem;font-size:.82rem;font-weight:500;
  width:100%;transition:all .2s;
}
.msg-btn:hover{background:var(--terra-dk);}

/* ════════════════════════════════════
   CHAT PAGE
════════════════════════════════════ */
#page-chat{display:none;flex-direction:row!important;overflow:hidden;padding:0;}
#page-chat.active{display:flex;}

/* Sidebar */
#chat-sidebar{
  width:280px;flex-shrink:0;border-right:1.5px solid var(--sand);
  display:flex;flex-direction:column;background:var(--white);
  transition:transform .3s ease;
}
#cs-search{
  margin:.9rem;padding:.6rem 1rem;border:1.5px solid var(--sand);border-radius:var(--r-full);
  font-size:.85rem;outline:none;color:var(--ink);background:var(--cream);
  transition:border-color .2s;
}
#cs-search:focus{border-color:var(--peach);}
.cs-section-label{
  font-size:.72rem;font-weight:500;letter-spacing:.08em;text-transform:uppercase;
  color:var(--brown);opacity:.6;padding:.4rem 1rem .2rem;
}
#new-group-btn{
  margin:.3rem .7rem .5rem;padding:.5rem .9rem;border-radius:var(--r-full);
  border:1.5px dashed var(--sand);font-size:.8rem;color:var(--brown);
  display:flex;align-items:center;gap:.4rem;transition:all .2s;
}
#new-group-btn:hover{border-color:var(--peach);color:var(--terra);}
#cs-list{flex:1;overflow-y:auto;padding-bottom:1rem;}
.cs-row{
  display:flex;align-items:center;gap:.75rem;padding:.7rem 1rem;
  cursor:pointer;transition:background .15s;position:relative;
}
.cs-row:hover{background:var(--cream);}
.cs-row.active{background:var(--peach-lt);}
.cs-av{
  width:42px;height:42px;border-radius:50%;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-weight:600;font-size:.9rem;color:#fff;overflow:hidden;
  position:relative;border:2px solid var(--sand);
}
.cs-av img{width:100%;height:100%;object-fit:cover;}
.cs-av .presence-dot{bottom:0;right:0;width:11px;height:11px;}
.cs-info{flex:1;min-width:0;}
.cs-name{font-size:.88rem;font-weight:500;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.cs-sub{font-size:.75rem;color:var(--brown);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.cs-unread{
  background:var(--terra);color:#fff;border-radius:var(--r-full);
  font-size:.65rem;font-weight:700;padding:.15rem .45rem;min-width:18px;text-align:center;
}

/* Chat main */
#chat-main{flex:1;display:flex;flex-direction:column;overflow:hidden;}
#chat-empty{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:1rem;color:var(--brown);font-size:.9rem;padding:2rem;text-align:center;
}
#chat-empty svg{width:60px;height:60px;opacity:.25;}
#chat-active{display:none;flex:1;flex-direction:column;overflow:hidden;}
#chat-active.visible{display:flex;}

.chat-head-bar{
  display:flex;align-items:center;gap:.75rem;padding:.9rem 1.2rem;
  background:var(--white);border-bottom:1.5px solid var(--sand);flex-shrink:0;
}
#ch-back-btn{
  display:none;padding:.3rem;color:var(--brown);font-size:1.2rem;margin-right:.2rem;
}
#ch-av{
  width:40px;height:40px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-weight:600;font-size:.9rem;color:#fff;overflow:hidden;flex-shrink:0;
}
#ch-av img{width:100%;height:100%;object-fit:cover;}
.ch-info{flex:1;}
#ch-name{font-weight:500;font-size:.93rem;color:var(--ink);}
.ch-presence{display:flex;align-items:center;gap:.35rem;margin-top:.15rem;}
#ch-online-dot{width:8px;height:8px;border-radius:50%;background:var(--sand);}
#ch-online-dot.online{background:var(--green);animation:pulse .2s ease infinite alternate;}
@keyframes pulse{from{opacity:.7}to{opacity:1}}
#ch-online-text{font-size:.75rem;color:var(--brown);}
.call-btns{display:flex;gap:.5rem;}
.call-btn{
  width:36px;height:36px;border-radius:50%;border:1.5px solid var(--sand);
  display:flex;align-items:center;justify-content:center;color:var(--brown);
  font-size:.95rem;transition:all .2s;
}
.call-btn:hover{border-color:var(--terra);color:var(--terra);background:var(--peach-lt);}

/* Messages area */
#msgs-area{flex:1;overflow-y:auto;padding:1rem;display:flex;flex-direction:column;gap:.6rem;}
.msg-row{display:flex;align-items:flex-end;gap:.5rem;}
.msg-row.mine{flex-direction:row-reverse;}
.msg-row-av{
  width:28px;height:28px;border-radius:50%;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-size:.65rem;font-weight:600;color:#fff;overflow:hidden;
}
.msg-row-av img{width:100%;height:100%;object-fit:cover;}
.msg-wrap{display:flex;flex-direction:column;max-width:65%;gap:.25rem;}
.msg-row.mine .msg-wrap{align-items:flex-end;}
.msg-sender{font-size:.7rem;color:var(--brown);padding:0 .5rem;}
.msg-bubble{
  padding:.65rem .95rem;border-radius:18px 18px 18px 4px;
  font-size:.88rem;line-height:1.55;color:var(--ink);
  background:var(--white);border:1.5px solid var(--sand);
  position:relative;word-break:break-word;
}
.msg-row.mine .msg-bubble{
  border-radius:18px 18px 4px 18px;
  background:linear-gradient(135deg,var(--terra),var(--peach));
  color:#fff;border:none;
}
.msg-bubble img{max-width:200px;border-radius:var(--r-sm);cursor:pointer;}
.msg-bubble video,.msg-bubble audio{max-width:100%;border-radius:var(--r-sm);}
.msg-bubble a{color:inherit;text-decoration:underline;opacity:.85;}
.msg-meta{font-size:.68rem;color:var(--brown);padding:0 .5rem;}
.msg-react-strip{display:flex;flex-wrap:wrap;gap:.3rem;margin-top:.2rem;padding:0 .5rem;}
.msg-react{
  display:flex;align-items:center;gap:.25rem;
  padding:.18rem .5rem;border-radius:var(--r-full);
  background:var(--cream);border:1.5px solid var(--sand);
  font-size:.75rem;cursor:pointer;transition:all .15s;
}
.msg-react:hover{border-color:var(--peach);}
.msg-react.reacted{border-color:var(--terra);background:var(--peach-lt);}
.msg-menu-btn{
  opacity:0;padding:.2rem .35rem;border-radius:var(--r-sm);
  color:var(--brown);font-size:.95rem;transition:all .15s;flex-shrink:0;
}
.msg-row:hover .msg-menu-btn{opacity:1;}
.msg-row.mine .msg-menu-btn:hover,.msg-row .msg-menu-btn:hover{background:var(--cream);color:var(--terra);}

/* Emoji picker for messages */
.emoji-picker-pop{
  position:fixed;background:var(--white);border:1.5px solid var(--sand);
  border-radius:var(--r);padding:.5rem;display:flex;gap:.3rem;flex-wrap:wrap;
  box-shadow:var(--shadow-lg);z-index:300;max-width:220px;
}
.emoji-pick-btn{
  width:34px;height:34px;border-radius:8px;font-size:1.1rem;
  transition:background .15s;display:flex;align-items:center;justify-content:center;
}
.emoji-pick-btn:hover{background:var(--cream);}

/* Upload preview strip */
#cup{
  padding:.7rem 1rem;border-top:1px solid var(--cream);
  display:flex;align-items:center;gap:.75rem;
}
#cup-thumb{max-height:60px;max-width:80px;border-radius:var(--r-sm);object-fit:cover;}
#cup-name{font-size:.8rem;color:var(--brown);flex:1;}
#cup-remove{color:var(--red);font-size:1rem;padding:.2rem;}
#cup-prog-wrap{width:100%;height:4px;background:var(--cream);border-radius:var(--r-full);}
#cup-prog{height:100%;background:linear-gradient(90deg,var(--peach),var(--terra));border-radius:var(--r-full);width:0;transition:width .2s;}

/* Chat input bar */
.chat-input-bar{
  display:flex;align-items:center;gap:.5rem;padding:.8rem 1rem;
  background:var(--white);border-top:1.5px solid var(--sand);flex-shrink:0;
}
#chat-attach-btn,#chat-mic-btn{
  width:36px;height:36px;border-radius:50%;border:1.5px solid var(--sand);
  display:flex;align-items:center;justify-content:center;color:var(--brown);
  font-size:1rem;transition:all .2s;flex-shrink:0;
}
#chat-attach-btn:hover,#chat-mic-btn:hover{border-color:var(--peach);color:var(--terra);}
#chat-mic-btn.recording{background:var(--red);border-color:var(--red);color:#fff;animation:recPulse 1s infinite;}
@keyframes recPulse{0%,100%{box-shadow:0 0 0 0 rgba(224,92,92,.5)}50%{box-shadow:0 0 0 6px rgba(224,92,92,0)}}
#chat-ta{
  flex:1;border:1.5px solid var(--sand);border-radius:var(--r);
  padding:.55rem .9rem;font-size:.9rem;outline:none;color:var(--ink);
  resize:none;min-height:40px;max-height:100px;background:var(--cream);
  transition:border-color .2s;line-height:1.5;
}
#chat-ta:focus{border-color:var(--peach);}
#chat-send-btn{
  width:38px;height:38px;border-radius:50%;background:var(--terra);color:#fff;
  display:flex;align-items:center;justify-content:center;font-size:1.1rem;
  flex-shrink:0;transition:all .2s;box-shadow:0 3px 10px rgba(201,106,66,.3);
}
#chat-send-btn:hover{background:var(--terra-dk);transform:scale(1.05);}
#chat-file-input{display:none;}

/* ════════════════════════════════════
   MODALS & OVERLAYS
════════════════════════════════════ */

/* Group modal */
#group-modal{
  position:fixed;inset:0;background:rgba(42,26,14,.45);
  display:none;align-items:center;justify-content:center;z-index:400;
  backdrop-filter:blur(3px);
}
#group-modal.open{display:flex;}
.modal-card{
  background:var(--white);border-radius:24px;padding:2rem;width:100%;max-width:420px;
  max-height:80dvh;display:flex;flex-direction:column;gap:1.2rem;
  box-shadow:var(--shadow-lg);animation:modalIn .25s ease both;
}
@keyframes modalIn{from{opacity:0;transform:scale(.94)}to{opacity:1;transform:scale(1)}}
.modal-title{font-family:'Fraunces',serif;font-size:1.3rem;font-weight:500;color:var(--ink);}
.modal-input{
  width:100%;padding:.65rem 1rem;border:1.5px solid var(--sand);border-radius:var(--r);
  font-size:.9rem;outline:none;color:var(--ink);transition:border-color .2s;
}
.modal-input:focus{border-color:var(--peach);}
#gm-members-list{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:.5rem;}
.gm-member-row{
  display:flex;align-items:center;gap:.75rem;padding:.6rem .75rem;
  border-radius:var(--r-sm);cursor:pointer;transition:background .15s;
}
.gm-member-row:hover{background:var(--cream);}
.gm-member-row input[type=checkbox]{accent-color:var(--terra);width:16px;height:16px;}
.gm-av{
  width:34px;height:34px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:.78rem;font-weight:600;color:#fff;flex-shrink:0;
}
.gm-name{font-size:.88rem;color:var(--ink);}
.modal-actions{display:flex;gap:.75rem;}
.btn-ghost-modal{
  flex:1;padding:.65rem;border-radius:var(--r-full);
  border:1.5px solid var(--sand);font-size:.88rem;color:var(--brown);transition:all .2s;
}
.btn-ghost-modal:hover{border-color:var(--red);color:var(--red);}

/* Call overlay */
#call-overlay{
  position:fixed;inset:0;background:linear-gradient(135deg,var(--ink),#3d2010);
  display:none;align-items:center;justify-content:center;flex-direction:column;
  z-index:500;gap:1.5rem;
}
#call-overlay.open{display:flex;}
#call-peer-av{
  width:90px;height:90px;border-radius:50%;border:3px solid var(--peach);
  display:flex;align-items:center;justify-content:center;
  font-size:2rem;font-weight:600;color:var(--peach-lt);overflow:hidden;
  background:var(--terra-dk);
}
#call-peer-av img{width:100%;height:100%;object-fit:cover;}
#call-peer-name{color:#fff;font-family:'Fraunces',serif;font-size:1.6rem;}
#call-status{color:var(--sand);font-size:.9rem;}
#call-videos{display:flex;gap:1rem;align-items:center;}
#remote-video{width:320px;height:240px;border-radius:var(--r);object-fit:cover;background:#000;}
#local-video{width:100px;height:80px;border-radius:var(--r-sm);object-fit:cover;background:#222;}
.call-actions{display:flex;gap:1.2rem;margin-top:.5rem;}
.call-action-btn{
  width:56px;height:56px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:1.3rem;transition:all .2s;
}
#call-hangup{background:var(--red);color:#fff;}
#call-hangup:hover{background:#c04444;}
#call-accept{background:var(--green);color:#fff;}
#call-accept:hover{background:#3a9065;}
#call-mute,#call-cam-toggle{background:rgba(255,255,255,.15);color:#fff;}
#call-mute:hover,#call-cam-toggle:hover{background:rgba(255,255,255,.25);}

/* Lightbox */
#lightbox{
  position:fixed;inset:0;background:rgba(42,26,14,.88);
  display:none;align-items:center;justify-content:center;z-index:600;
  cursor:pointer;
}
#lightbox.on{display:flex;}
#lb-img{max-width:92vw;max-height:92dvh;border-radius:var(--r);object-fit:contain;}
#lb-close{
  position:fixed;top:1.5rem;right:1.5rem;
  background:rgba(255,255,255,.15);color:#fff;
  width:38px;height:38px;border-radius:50%;font-size:1.2rem;
  display:flex;align-items:center;justify-content:center;
}

/* Error modal */
#err-modal{
  position:fixed;inset:0;background:rgba(42,26,14,.5);
  display:none;align-items:center;justify-content:center;z-index:700;
}
#err-modal.open{display:flex;}
.err-card{
  background:var(--white);border-radius:var(--r);padding:2rem;max-width:360px;width:90%;
  box-shadow:var(--shadow-lg);text-align:center;display:flex;flex-direction:column;gap:1rem;
}
#err-modal-title{font-family:'Fraunces',serif;font-size:1.2rem;color:var(--ink);}
#err-modal-msg{font-size:.88rem;color:var(--brown);line-height:1.6;}
#err-modal-ok{background:var(--terra);color:#fff;border-radius:var(--r-full);padding:.65rem 2rem;font-size:.9rem;font-weight:500;}

/* Toast */
#notif-toast{
  position:fixed;bottom:1.5rem;right:1.5rem;
  background:var(--ink);color:#fff;border-radius:var(--r);
  padding:1rem 1.2rem;display:none;align-items:flex-start;gap:.85rem;
  max-width:320px;box-shadow:0 8px 28px rgba(0,0,0,.25);z-index:650;
  animation:toastIn .3s ease both;
}
#notif-toast.show{display:flex;}
@keyframes toastIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
#notif-toast-icon{font-size:1.4rem;flex-shrink:0;}
.notif-toast-body{flex:1;}
#notif-toast-title{font-size:.85rem;font-weight:600;}
#notif-toast-msg{font-size:.78rem;opacity:.75;margin-top:.2rem;}
#notif-toast-close{color:rgba(255,255,255,.5);font-size:.9rem;cursor:pointer;margin-top:.1rem;}

/* Overflow menu */
.overflow-menu{
  position:fixed;background:var(--white);border:1.5px solid var(--sand);
  border-radius:var(--r-sm);box-shadow:var(--shadow-lg);z-index:800;
  min-width:140px;overflow:hidden;
}
.overflow-item{
  display:flex;align-items:center;gap:.6rem;padding:.7rem 1rem;
  font-size:.85rem;color:var(--ink);cursor:pointer;transition:background .15s;
}
.overflow-item:hover{background:var(--cream);}
.overflow-item.danger{color:var(--red);}
.overflow-item.danger:hover{background:#fff0f0;}

/* Story viewer */
#story-viewer{
  position:fixed;inset:0;background:#000;z-index:600;
  display:none;flex-direction:column;
}
#story-viewer.open{display:flex;}
#sv-progress-bar{display:flex;gap:4px;padding:.9rem 1rem .5rem;}
.sv-seg{flex:1;height:3px;background:rgba(255,255,255,.3);border-radius:2px;overflow:hidden;}
.sv-seg-fill{height:100%;background:#fff;width:0;}
#sv-media-wrap{flex:1;display:flex;align-items:center;justify-content:center;position:relative;}
#sv-img,#sv-vid{max-width:100%;max-height:100%;object-fit:contain;}
#sv-nav-prev,#sv-nav-next{position:absolute;top:0;height:100%;width:40%;cursor:pointer;}
#sv-nav-prev{left:0;}
#sv-nav-next{right:0;}
#sv-top{
  position:absolute;top:.8rem;left:1rem;right:3rem;
  display:flex;align-items:center;gap:.6rem;z-index:10;
}
#sv-av{width:36px;height:36px;border-radius:50%;border:2px solid #fff;overflow:hidden;background:var(--terra-dk);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:600;}
#sv-av img{width:100%;height:100%;object-fit:cover;}
#sv-uname{color:#fff;font-size:.88rem;font-weight:500;}
#sv-time{color:rgba(255,255,255,.7);font-size:.75rem;}
#sv-close{position:absolute;top:.9rem;right:1rem;color:#fff;font-size:1.3rem;z-index:10;padding:.3rem;}
#sv-text{
  position:absolute;bottom:2rem;left:1rem;right:1rem;
  color:#fff;font-size:.92rem;text-align:center;text-shadow:0 2px 8px rgba(0,0,0,.5);
}

/* Story create modal */
#story-create-modal{
  position:fixed;inset:0;background:rgba(42,26,14,.5);
  display:none;align-items:center;justify-content:center;z-index:700;
}
#story-create-modal.open{display:flex;}
#scm-card{
  background:var(--white);border-radius:24px;padding:2rem;width:100%;max-width:380px;
  display:flex;flex-direction:column;gap:1.1rem;box-shadow:var(--shadow-lg);
}
#scm-preview{
  border-radius:var(--r);overflow:hidden;background:var(--cream);
  border:2px dashed var(--sand);min-height:180px;
  display:flex;align-items:center;justify-content:center;cursor:pointer;
}
#scm-prev-img,#scm-prev-vid{max-width:100%;max-height:220px;border-radius:var(--r);}
#scm-placeholder{text-align:center;color:var(--brown);font-size:.88rem;padding:2rem;}
#scm-file-input{display:none;}
#scm-caption{
  width:100%;padding:.65rem 1rem;border:1.5px solid var(--sand);border-radius:var(--r);
  font-size:.9rem;outline:none;color:var(--ink);resize:none;
  transition:border-color .2s;
}
#scm-caption:focus{border-color:var(--peach);}
.scm-actions{display:flex;gap:.75rem;}
#scm-post{flex:1;background:var(--terra);color:#fff;border-radius:var(--r-full);padding:.65rem;font-size:.88rem;font-weight:500;}
#scm-cancel{flex:1;border:1.5px solid var(--sand);color:var(--brown);border-radius:var(--r-full);padding:.65rem;font-size:.88rem;}

/* Config warning */
#cfg-bar{
  position:fixed;bottom:0;left:0;right:0;background:var(--red);color:#fff;
  text-align:center;padding:.7rem;font-size:.85rem;z-index:900;
}

/* ════════════════════════════════════
   MOBILE (<=640px)
════════════════════════════════════ */
@media(max-width:640px){
  .tab-label{display:none;}
  .topnav{padding:.6rem 1rem;}
  #btn-logout span{display:none;}
  #people-grid{grid-template-columns:repeat(2,1fr);}
  #chat-sidebar{position:absolute;inset:0;width:100%;z-index:10;transform:translateX(0);}
  #chat-sidebar.slide-out{transform:translateX(-100%);}
  #ch-back-btn{display:block;}
  #chat-main{width:100%;}
  .msg-wrap{max-width:86%;}
  #notif-panel{right:.5rem;width:calc(100vw - 1rem);}
  #notif-toast{left:1rem;right:1rem;bottom:1rem;max-width:none;}
  .msg-menu-btn{opacity:1;}
  .post-menu-btn{opacity:1;}
}
</style>
</head>
<body>

<!-- ═══ AUTH SCREEN ═══ -->
<div id="auth-screen">
  <div class="auth-wrap">
    <div class="auth-logo">
      <svg viewBox="0 0 28 28" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round">
        <circle cx="14" cy="14" r="3.5"/>
        <ellipse cx="14" cy="6" rx="2.5" ry="3.5" transform="rotate(0 14 14)"/>
        <ellipse cx="14" cy="6" rx="2.5" ry="3.5" transform="rotate(45 14 14)"/>
        <ellipse cx="14" cy="6" rx="2.5" ry="3.5" transform="rotate(90 14 14)"/>
        <ellipse cx="14" cy="6" rx="2.5" ry="3.5" transform="rotate(135 14 14)"/>
        <ellipse cx="14" cy="6" rx="2.5" ry="3.5" transform="rotate(180 14 14)"/>
        <ellipse cx="14" cy="6" rx="2.5" ry="3.5" transform="rotate(225 14 14)"/>
        <ellipse cx="14" cy="6" rx="2.5" ry="3.5" transform="rotate(270 14 14)"/>
        <ellipse cx="14" cy="6" rx="2.5" ry="3.5" transform="rotate(315 14 14)"/>
      </svg>
      Chaty
    </div>
    <p class="auth-tagline">Your warm little corner of the internet ✦</p>
    <div class="auth-card">
      <div class="auth-tabs">
        <div class="auth-tab active" id="tab-in" onclick="authTab('in')">Log in</div>
        <div class="auth-tab" id="tab-up" onclick="authTab('up')">Sign up</div>
      </div>
      <div class="auth-form" id="form-in">
        <input type="email" id="in-email" placeholder="Email address"/>
        <input type="password" id="in-pass" placeholder="Password"/>
        <button class="btn-primary" onclick="doLogin()">Log in →</button>
      </div>
      <div class="auth-form hidden" id="form-up">
        <input type="text" id="up-name" placeholder="Your name"/>
        <input type="email" id="up-email" placeholder="Email address"/>
        <input type="password" id="up-pass" placeholder="Password (min 6 chars)"/>
        <button class="btn-primary" onclick="doSignup()">Create account →</button>
      </div>
      <div id="a-err"></div>
      <div id="a-ok" class="hidden"></div>
    </div>
  </div>
</div>

<!-- ═══ APP ═══ -->
<div id="app">
  <!-- Top Nav -->
  <nav class="topnav">
    <div class="nav-logo">
      <svg viewBox="0 0 28 28" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" width="22" height="22">
        <circle cx="14" cy="14" r="3.5"/>
        <ellipse cx="14" cy="6" rx="2.5" ry="3.5" transform="rotate(0 14 14)"/>
        <ellipse cx="14" cy="6" rx="2.5" ry="3.5" transform="rotate(90 14 14)"/>
        <ellipse cx="14" cy="6" rx="2.5" ry="3.5" transform="rotate(180 14 14)"/>
        <ellipse cx="14" cy="6" rx="2.5" ry="3.5" transform="rotate(270 14 14)"/>
      </svg>
      Chaty
    </div>
    <div class="nav-tabs">
      <button class="ntab" id="ntab-feed" onclick="switchPage('feed')">
        <span class="tab-icon">🌸</span><span class="tab-label">Feed</span>
        <span class="badge hidden" id="badge-feed"></span>
      </button>
      <button class="ntab" id="ntab-people" onclick="switchPage('people')">

<!-- ═══════════════════ APP LOGIC ═══════════════════ -->
<script>
(function(){
// ─── Constants ─────────────────────────────────
var CLOUDINARY_CLOUD_NAME='diev2dlno';
var CLOUDINARY_UPLOAD_PRESET='chaty_uploads';
var ADMIN_UIDS=['UzX7q42S6ZTmSImkCE3eyDPycZQ2'];
var GRADS=[
  'linear-gradient(135deg,#F4A07A,#C96A42)',
  'linear-gradient(135deg,#7A9EF4,#4A6AC9)',
  'linear-gradient(135deg,#7AF4B2,#42C98E)',
  'linear-gradient(135deg,#F4D97A,#C9A642)',
  'linear-gradient(135deg,#D97AF4,#9C42C9)',
  'linear-gradient(135deg,#F47A7A,#C94242)',
  'linear-gradient(135deg,#7ADCF4,#42A8C9)',
  'linear-gradient(135deg,#F4A07A,#9E4A28)'
];

// ─── State ─────────────────────────────────────
var FB,me,myName,myGrad,myAvatarUrl='';
var allUsers=[];
var chatWith=null,chatWithName='',chatIsGroup=false,chatUnsubFn=null;
var postsUnsub=null;
var unreadCounts={},totalUnread=0,unreadUnsubs={};
var chatFilePending=null,mediaRecorder=null,audioChunks=[];
var feedLoaded=false,newPostCount=0;
var pc=null,localStream=null,callRoomId=null;
var currentPeerId=null,currentPeerName=null;
var callIsVideo=false,isCaller=false,callUnsub=null,isMuted=false,isCamOff=false;
var presenceInterval=null,currentPresenceUnsub=null,userPresenceMap={};
var storiesUnsub=null,storyCurrentList=[],storyCurrentIdx=0,storyTimer=null;
var scmFile=null;
var notifList=[],notifUnsub=null,notifFirstLoad=true;
var toastTimeout=null;
var selectedMembers=[];
var knownPostIds=new Set();
var knownNotifIds=new Set();

// ─── Utils ─────────────────────────────────────
function g(id){return document.getElementById(id);}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function grad(uid){var h=0;for(var i=0;i<uid.length;i++){h=(h<<5)-h+uid.charCodeAt(i);h|=0;}return GRADS[Math.abs(h)%GRADS.length];}
function mob(){return window.innerWidth<=640;}
function timeAgo(ts){
  if(!ts)return'';
  var d=ts.toDate?ts.toDate():new Date(ts);
  var s=Math.floor((Date.now()-d)/1000);
  if(s<60)return'just now';
  if(s<3600)return Math.floor(s/60)+'m ago';
  if(s<86400)return Math.floor(s/3600)+'h ago';
  return Math.floor(s/86400)+'d ago';
}
function showErrorModal(title,msg){g('err-modal-title').textContent=title;g('err-modal-msg').textContent=msg;g('err-modal').classList.add('open');}
function setBadge(el,n){if(!el)return;if(n>0){el.textContent=n>99?'99+':n;el.classList.remove('hidden');}else{el.classList.add('hidden');}}
function openLightbox(src){g('lb-img').src=src;g('lightbox').classList.add('on');}
function closeLightbox(){g('lightbox').classList.remove('on');}
function avatarHTML(name,uid,avatarUrl,size){
  var s=size||40;
  if(avatarUrl){return '<img src="'+esc(avatarUrl)+'" style="width:'+s+'px;height:'+s+'px;border-radius:50%;object-fit:cover;"/>';}
  var g2=grad(uid||name||'?');
  return '<div style="width:'+s+'px;height:'+s+'px;border-radius:50%;background:'+g2+';display:flex;align-items:center;justify-content:center;font-weight:600;color:#fff;font-size:'+(s*0.38)+'px;">'+esc((name||'?')[0].toUpperCase())+'</div>';
}
function setAvEl(el,name,uid,avatarUrl){if(!el)return;el.innerHTML=avatarHTML(name,uid,avatarUrl);}

// ─── Upload ─────────────────────────────────────
function uploadFile(file,onProgress){
  return new Promise(function(resolve,reject){
    var fd=new FormData();
    fd.append('file',file);
    fd.append('upload_preset',CLOUDINARY_UPLOAD_PRESET);
    var xhr=new XMLHttpRequest();
    xhr.open('POST','https://api.cloudinary.com/v1_1/'+CLOUDINARY_CLOUD_NAME+'/auto/upload');
    if(onProgress)xhr.upload.addEventListener('progress',function(e){if(e.lengthComputable)onProgress(e.loaded/e.total);});
    xhr.onload=function(){
      var r=JSON.parse(xhr.responseText);
      if(r.secure_url)resolve({url:r.secure_url,resourceType:r.resource_type,format:r.format,originalFilename:r.original_filename});
      else reject(new Error('Upload failed'));
    };
    xhr.onerror=function(){reject(new Error('Upload error'));};
    xhr.send(fd);
  });
}

// ─── Overflow Menu ─────────────────────────────
function showOverflowMenu(anchor,items){
  var old=document.querySelector('.overflow-menu');if(old)old.remove();
  var menu=document.createElement('div');menu.className='overflow-menu';
  items.forEach(function(item){
    var el=document.createElement('div');
    el.className='overflow-item'+(item.danger?' danger':'');
    el.textContent=item.label;
    function act(e){e.preventDefault();e.stopPropagation();menu.remove();item.action();}
    el.addEventListener('click',act);el.addEventListener('touchend',act);
    menu.appendChild(el);
  });
  var r=anchor.getBoundingClientRect();
  menu.style.top=(r.bottom+4)+'px';
  var left=r.left;
  if(left+160>window.innerWidth)left=window.innerWidth-164;
  menu.style.left=left+'px';
  document.body.appendChild(menu);
  setTimeout(function(){
    function dismiss(e){if(!menu.contains(e.target)){menu.remove();document.removeEventListener('click',dismiss);document.removeEventListener('touchend',dismiss);}}
    document.addEventListener('click',dismiss);document.addEventListener('touchend',dismiss);
  },0);
}

// ─── Auth ──────────────────────────────────────
function authTab(t){
  g('tab-in').classList.toggle('active',t==='in');
  g('tab-up').classList.toggle('active',t==='up');
  g('form-in').classList.toggle('hidden',t!=='in');
  g('form-up').classList.toggle('hidden',t!=='up');
  g('a-err').textContent='';
}
window.authTab=authTab;

function doLogin(){
  var email=g('in-email').value.trim(),pass=g('in-pass').value;
  g('a-err').textContent='';
  FB.signInWithEmailAndPassword(FB.auth,email,pass).catch(function(e){g('a-err').textContent=e.message;});
}
window.doLogin=doLogin;

function doSignup(){
  var name=g('up-name').value.trim(),email=g('up-email').value.trim(),pass=g('up-pass').value;
  if(!name){g('a-err').textContent='Please enter your name.';return;}
  if(pass.length<6){g('a-err').textContent='Password must be at least 6 characters.';return;}
  g('a-err').textContent='';
  FB.createUserWithEmailAndPassword(FB.auth,email,pass).then(function(uc){
    return FB.updateProfile(uc.user,{displayName:name}).then(function(){
      return FB.setDoc(FB.doc(FB.db,'users',uc.user.uid),{name:name,email:email,uid:uc.user.uid,createdAt:FB.serverTimestamp()});
    });
  }).catch(function(e){g('a-err').textContent=e.message;});
}
window.doSignup=doSignup;

function doLogout(){
  cleanup();
  FB.signOut(FB.auth);
}
window.doLogout=doLogout;

function cleanup(){
  if(postsUnsub)postsUnsub();
  if(chatUnsubFn)chatUnsubFn();
  if(storiesUnsub)storiesUnsub();
  if(notifUnsub)notifUnsub();
  Object.values(unreadUnsubs).forEach(function(f){f();});
  if(presenceInterval)clearInterval(presenceInterval);
  if(currentPresenceUnsub)currentPresenceUnsub();
  if(callUnsub)callUnsub();
  if(localStream)localStream.getTracks().forEach(function(t){t.stop();});
  if(pc)pc.close();
  if(me){FB.setDoc(FB.doc(FB.db,'presence',me.uid),{online:false},{merge:true});}
}

// ─── App Entry ─────────────────────────────────
function showAuth(){g('auth-screen').style.display='flex';g('app').classList.remove('visible');}
function enterApp(){
  g('auth-screen').style.display='none';
  g('app').classList.add('visible');
  FB.getDoc(FB.doc(FB.db,'users',me.uid)).then(function(snap){
    if(snap.exists()){myAvatarUrl=snap.data().avatarUrl||'';}
    myName=me.displayName||'User';
    myGrad=grad(me.uid);
    renderNavAvatar();
    setAvEl(g('cp-av'),myName,me.uid,myAvatarUrl);
    loadAllUsers();
    loadGroupsAtBoot();
    listenIncomingCalls();
    startPresenceHeartbeat();
    initNotifications();
    loadStories();
    switchPage('feed');
    if(Notification.permission==='default')g('notif-perm-banner').classList.remove('hidden');
  });
}
function renderNavAvatar(){
  if(myAvatarUrl){g('nav-av').innerHTML='<img src="'+esc(myAvatarUrl)+'" style="width:100%;height:100%;object-fit:cover;border-radius:50%;"/>';}
  else{g('nav-av').innerHTML='<div style="font-weight:600;font-size:.9rem;color:var(--terra-dk);">'+esc(myName[0].toUpperCase())+'</div>';}
}

// ─── Page Switching ─────────────────────────────
function switchPage(page){
  ['feed','people','chat'].forEach(function(p){
    g('page-'+p).classList.toggle('active',p===page);
    g('ntab-'+p).classList.toggle('active',p===page);
  });
  if(page==='feed'){
    newPostCount=0;setBadge(g('badge-feed'),0);
    if(!feedLoaded){feedLoaded=true;loadFeed();}
  }
  if(page==='people')renderPeople();
  if(page==='chat')renderChatSidebar();
  closeNotifPanel();
}
window.switchPage=switchPage;

// ─── Avatar Upload ──────────────────────────────
g('av-file-input').addEventListener('change',function(){
  var file=this.files[0];if(!file)return;
  uploadFile(file,null).then(function(res){
    myAvatarUrl=res.url;
    renderNavAvatar();
    setAvEl(g('cp-av'),myName,me.uid,myAvatarUrl);
    FB.updateDoc(FB.doc(FB.db,'users',me.uid),{avatarUrl:res.url});
  }).catch(function(){showErrorModal('Upload Failed','Could not upload avatar.');});
});

// ─── Presence ──────────────────────────────────
function startPresenceHeartbeat(){
  function beat(){FB.setDoc(FB.doc(FB.db,'presence',me.uid),{online:true,lastSeen:FB.serverTimestamp(),uid:me.uid},{merge:true});}
  beat();presenceInterval=setInterval(beat,30000);
  window.addEventListener('beforeunload',function(){FB.setDoc(FB.doc(FB.db,'presence',me.uid),{online:false},{merge:true});});
}
function listenPresence(uid,cb){
  return FB.onSnapshot(FB.doc(FB.db,'presence',uid),function(snap){
    if(!snap.exists()){cb(false);return;}
    var d=snap.data();
    var online=d.online===true&&d.lastSeen&&(Date.now()-d.lastSeen.toDate().getTime()<90000);
    userPresenceMap[uid]=online;cb(online);
  });
}

// ─── Load All Users ─────────────────────────────
function loadAllUsers(){
  FB.onSnapshot(FB.collection(FB.db,'users'),function(snap){
    allUsers=[];
    snap.forEach(function(d){if(d.id!==me.uid)allUsers.push(Object.assign({id:d.id},d.data()));});
    renderChatSidebar();renderPeople();
    // Start unread listeners for all DM rooms
    allUsers.forEach(function(u){
      var roomId=[me.uid,u.id].sort().join('_');
      if(!unreadUnsubs[roomId])listenUnreadForRoom(roomId);
    });
  });
}

// ─── People Page ────────────────────────────────
function renderPeople(){
  var search=(g('people-search').value||'').toLowerCase();
  var grid=g('people-grid');grid.innerHTML='';
  allUsers.filter(function(u){return !search||(u.name||'').toLowerCase().includes(search)||(u.email||'').toLowerCase().includes(search);})
  .forEach(function(u){
    var online=userPresenceMap[u.id]||false;
    var card=document.createElement('div');card.className='person-card';
    card.innerHTML='<div class="person-av" style="background:'+grad(u.id)+'">'+
      (u.avatarUrl?'<img src="'+esc(u.avatarUrl)+'"/>':'<span>'+esc((u.name||'?')[0].toUpperCase())+'</span>')+
      '<div class="presence-dot '+(online?'online':'offline')+'"></div></div>'+
      '<div class="person-name">'+esc(u.name||'User')+'</div>'+
      '<div class="person-email">'+esc(u.email||'')+'</div>'+
      '<button class="msg-btn">Message 💬</button>';
    card.querySelector('.msg-btn').onclick=function(){switchPage('chat');setTimeout(function(){openDM(u.id,u.name);},80);};
    grid.appendChild(card);
    listenPresence(u.id,function(online){
      var dot=card.querySelector('.presence-dot');
      if(dot){dot.className='presence-dot '+(online?'online':'offline');}
    });
  });
}
window.filterPeople=function(){renderPeople();};
window.renderPeople=renderPeople;

// ─── FEED ────────────────────────────────────────
var cpFilePending=null,cpFileType=null,cpFileName=null;

['cp-photo','cp-video','cp-file'].forEach(function(id){
  g(id).addEventListener('change',function(){
    var file=this.files[0];if(!file)return;
    cpFilePending=file;
    var prev=g('cp-preview');prev.classList.remove('hidden');prev.innerHTML='';
    if(file.type.startsWith('image/')){var img=document.createElement('img');img.src=URL.createObjectURL(file);prev.appendChild(img);}
    else if(file.type.startsWith('video/')){var vid=document.createElement('video');vid.src=URL.createObjectURL(file);vid.controls=true;prev.appendChild(vid);}
    else{prev.innerHTML='<div class="post-media"><a>📎 '+esc(file.name)+'</a></div>';}
  });
});
// Ctrl+Enter to post
g('cp-ta').addEventListener('keydown',function(e){if(e.ctrlKey&&e.key==='Enter')submitPost();});

function submitPost(){
  var text=g('cp-ta').value.trim();
  if(!text&&!cpFilePending)return;
  var wrap=g('cp-progress-wrap'),bar=g('cp-progress');
  function doWrite(mediaUrl,mediaType,fileName){
    FB.addDoc(FB.collection(FB.db,'posts'),{
      text:text,authorId:me.uid,authorName:myName,authorAvatar:myAvatarUrl,
      mediaUrl:mediaUrl||'',mediaType:mediaType||'',fileName:fileName||'',
      reactions:{},commentCount:0,createdAt:FB.serverTimestamp()
    }).then(function(){
      g('cp-ta').value='';cpFilePending=null;
      g('cp-preview').classList.add('hidden');g('cp-preview').innerHTML='';
      wrap.classList.add('hidden');bar.style.width='0';
    });
  }
  if(cpFilePending){
    wrap.classList.remove('hidden');
    uploadFile(cpFilePending,function(p){bar.style.width=(p*100)+'%';}).then(function(res){
      var mt=cpFilePending.type.startsWith('image/')?'image':cpFilePending.type.startsWith('video/')?'video':'file';
      doWrite(res.url,mt,cpFilePending.name);
    }).catch(function(){showErrorModal('Upload Failed','Could not upload file.');wrap.classList.add('hidden');});
  } else doWrite('','','');
}

function loadFeed(){
  var q=FB.query(FB.collection(FB.db,'posts'),FB.orderBy('createdAt','desc'),FB.limit(50));
  postsUnsub=FB.onSnapshot(q,function(snap){
    var list=g('posts-list');
    snap.docChanges().forEach(function(change){
      if(change.type==='added'){
        var post=Object.assign({id:change.doc.id},change.doc.data());
        if(knownPostIds.has(post.id))return;
        knownPostIds.add(post.id);
        if(feedLoaded&&document.getElementById('page-feed').classList.contains('active')){
          renderPostCard(post,true);
        } else if(feedLoaded){
          newPostCount++;setBadge(g('badge-feed'),newPostCount);
          renderPostCard(post,true);
        } else {
          renderPostCard(post,true);
        }
      }
      if(change.type==='modified'){
        var post2=Object.assign({id:change.doc.id},change.doc.data());
        var existing=document.getElementById('post-'+post2.id);
        if(existing){var newCard=buildPostCard(post2);existing.replaceWith(newCard);}
      }
      if(change.type==='removed'){
        var el=document.getElementById('post-'+change.doc.id);if(el)el.remove();
        knownPostIds.delete(change.doc.id);
      }
    });
  });
}

function renderPostCard(post,prepend){

var REACT_EMOJIS=['❤️','🔥','😂','😮','😢','👍'];

function buildPostCard(post){
  var card=document.createElement('div');
  card.className='post-card';card.id='post-'+post.id;

  // header
  var isAdmin=ADMIN_UIDS.includes(me.uid);
  var canDelete=isAdmin||post.authorId===me.uid;
  var headerHTML='<div class="post-header">'+
    '<div class="post-av" style="background:'+grad(post.authorId||'x')+'">'+
    (post.authorAvatar?'<img src="'+esc(post.authorAvatar)+'"/>':esc((post.authorName||'?')[0].toUpperCase()))+
    '</div><div class="post-meta"><div class="post-name">'+esc(post.authorName||'User')+'</div>'+
    '<div class="post-time">'+timeAgo(post.createdAt)+'</div></div>'+
    (canDelete?'<button class="post-menu-btn" data-pid="'+esc(post.id)+'">⋯</button>':'')+
    '</div>';

  // text
  var textHTML=post.text?'<div class="post-text">'+esc(post.text)+'</div>':'';

  // media
  var mediaHTML='';
  if(post.mediaUrl){
    if(post.mediaType==='image')mediaHTML='<div class="post-media"><img src="'+esc(post.mediaUrl)+'" onclick="openLightbox(\''+esc(post.mediaUrl)+'\')" loading="lazy"/></div>';
    else if(post.mediaType==='video')mediaHTML='<div class="post-media"><video src="'+esc(post.mediaUrl)+'" controls></video></div>';
    else mediaHTML='<div class="post-media"><a href="'+esc(post.mediaUrl)+'" target="_blank" download>📎 '+esc(post.fileName||'File')+'</a></div>';
  }

  // reactions
  var reactions=post.reactions||{};
  var reactHTML='<div class="reactions-bar">';
  REACT_EMOJIS.forEach(function(em){
    var uids=reactions[em]||[];
    var reacted=uids.includes(me.uid);
    var names=uids.map(function(uid){var u=allUsers.find(function(x){return x.id===uid;});return u?u.name:uid;}).join(', ');
    reactHTML+='<button class="react-btn'+(reacted?' reacted':'')+(uids.length===0?' react-zero':'')+'" data-em="'+em+'" data-pid="'+post.id+'" style="'+(uids.length===0?'opacity:.45':'')+'">'+
      em+(uids.length>0?'<span class="react-count">'+uids.length+'</span>':'')+
      (names?'<span class="react-tooltip">'+esc(names)+'</span>':'')+
      '</button>';
  });
  reactHTML+='</div>';

  var commentCount=post.commentCount||0;
  var footerHTML='<div class="post-footer">'+
    '<button class="comment-toggle-btn" data-pid="'+post.id+'">💬 '+(commentCount>0?commentCount+' comments':'Comment')+'</button>'+
    '</div>';

  card.innerHTML=headerHTML+textHTML+mediaHTML+reactHTML+footerHTML;

  // bind menu
  var menuBtn=card.querySelector('.post-menu-btn');
  if(menuBtn){
    menuBtn.onclick=function(e){e.stopPropagation();showOverflowMenu(menuBtn,[{label:'🗑️ Delete post',danger:true,action:function(){deletePost(post.id);}}]);};
  }

  // bind reactions
  card.querySelectorAll('.react-btn').forEach(function(btn){
    btn.onclick=function(){toggleReaction(post,btn.dataset.em);};
  });

  // bind comments
  card.querySelector('.comment-toggle-btn').onclick=function(){toggleComments(post.id,card);};

  return card;
}

function deletePost(pid){
  FB.deleteDoc(FB.doc(FB.db,'posts',pid));
}

function toggleReaction(post,em){
  var reactions=post.reactions||{};
  var uids=reactions[em]||[];
  var hasReacted=uids.includes(me.uid);
  var update={};
  update['reactions.'+em]=hasReacted?FB.arrayRemove(me.uid):FB.arrayUnion(me.uid);
  FB.updateDoc(FB.doc(FB.db,'posts',post.id),update);
  if(!hasReacted&&post.authorId!==me.uid){
    createNotification(post.authorId,me.uid,myName,'reaction','reacted '+em+' to your post');
  }
}

function toggleComments(pid,card){
  var existing=card.querySelector('.comments-section');
  if(existing){existing.remove();return;}
  var section=document.createElement('div');section.className='comments-section';
  section.innerHTML='<div class="comments-list"></div>'+
    '<div class="comment-input-wrap">'+
    '<input class="comment-input" placeholder="Write a comment..."/>'+
    '<button class="comment-send-btn">Send</button></div>';
  card.appendChild(section);
  var input=section.querySelector('.comment-input');
  var sendBtn=section.querySelector('.comment-send-btn');
  var clist=section.querySelector('.comments-list');

  // Load comments
  var q=FB.query(FB.collection(FB.db,'posts',pid,'comments'),FB.orderBy('createdAt','asc'));
  FB.getDocs(q).then(function(snap){
    snap.forEach(function(d){renderComment(d.data(),clist);});
  });

  function sendComment(){
    var text=input.value.trim();if(!text)return;
    input.value='';
    FB.addDoc(FB.collection(FB.db,'posts',pid,'comments'),{text:text,authorId:me.uid,authorName:myName,createdAt:FB.serverTimestamp()});
    FB.updateDoc(FB.doc(FB.db,'posts',pid),{commentCount:FB.increment(1)});
    renderComment({text:text,authorId:me.uid,authorName:myName},clist);

  sendBtn.onclick=sendComment;
  input.addEventListener('keydown',function(e){if(e.key==='Enter')sendComment();});
}

var MSG_EMOJIS=['❤️','🔥','😂','😮','😢','👍','🎉','💯'];

function listenMessages(roomId,isGroup){
  g('msgs-area').innerHTML='';
  var q=FB.query(FB.collection(FB.db,'chats',roomId,'messages'),FB.orderBy('createdAt','asc'));
  return FB.onSnapshot(q,function(snap){
    snap.docChanges().forEach(function(change){
      if(change.type==='added'){
        var msg=Object.assign({id:change.doc.id},change.doc.data());
        renderMsgBubble(msg,isGroup);
        autoScroll();
      }
      if(change.type==='modified'){
        var msg2=Object.assign({id:change.doc.id},change.doc.data());
        var existing=document.getElementById('msg-'+msg2.id);
        if(existing){var newBubble=buildMsgBubble(msg2,isGroup);existing.replaceWith(newBubble);}
      }
      if(change.type==='removed'){
        var el=document.getElementById('msg-'+change.doc.id);if(el)el.remove();
      }
    });
  });
}

function autoScroll(){
  var area=g('msgs-area');
  var nearBottom=area.scrollHeight-area.scrollTop-area.clientHeight<120;
  if(nearBottom)area.scrollTop=area.scrollHeight;
}

function renderMsgBubble(msg,isGroup){
  var area=g('msgs-area');
  var row=buildMsgBubble(msg,isGroup);
  area.appendChild(row);
}

function buildMsgBubble(msg,isGroup){
  var isMine=msg.from===me.uid;
  var sender=allUsers.find(function(u){return u.id===msg.from;})||{name:msg.senderName||msg.from,avatarUrl:''};
  var row=document.createElement('div');
  row.className='msg-row'+(isMine?' mine':'');
  row.id='msg-'+msg.id;

  var avHTML='';
  if(!isMine){avHTML='<div class="msg-row-av" style="background:'+grad(msg.from||'x')+'">'+
    (sender.avatarUrl?'<img src="'+esc(sender.avatarUrl)+'"/>':esc((sender.name||'?')[0].toUpperCase()))+
    '</div>';}

  var senderHTML=(isGroup&&!isMine)?'<div class="msg-sender">'+esc(msg.senderName||sender.name||'')+'</div>':'';

  // bubble content
  var content='';
  if(msg.type==='image')content='<img src="'+esc(msg.url)+'" loading="lazy" onclick="openLightbox(\''+esc(msg.url)+'\')"/>';
  else if(msg.type==='video')content='<video src="'+esc(msg.url)+'" controls></video>';
  else if(msg.type==='audio')content='🎙️ <audio src="'+esc(msg.url)+'" controls></audio>';
  else if(msg.type==='file')content='📎 <a href="'+esc(msg.url)+'" target="_blank" download>'+esc(msg.fileName||'File')+'</a>';
  else content=esc(msg.text||'');

  // reactions
  var reactions=msg.reactions||{};
  var reactStrip='';
  var reactKeys=Object.keys(reactions).filter(function(em){return reactions[em].length>0;});
  if(reactKeys.length){
    reactStrip='<div class="msg-react-strip">';
    reactKeys.forEach(function(em){
      var uids=reactions[em];
      var reacted=uids.includes(me.uid);
      var names=uids.map(function(uid){var u=allUsers.find(function(x){return x.id===uid;});return u?u.name:uid;}).join(', ');
      reactStrip+='<div class="msg-react'+(reacted?' reacted':'')+'" title="'+esc(names)+'" data-em="'+em+'">'+em+' '+uids.length+'</div>';
    });
    reactStrip+='</div>';
  }

  var isAdmin=ADMIN_UIDS.includes(me.uid);
  var canDelete=isAdmin||msg.from===me.uid;

  row.innerHTML=avHTML+
    '<div class="msg-wrap">'+senderHTML+
    '<div style="display:flex;align-items:center;gap:.25rem;'+(isMine?'flex-direction:row-reverse;':'')+'">'+
    '<div class="msg-bubble">'+content+'</div>'+
    (canDelete?'<button class="msg-menu-btn" data-mid="'+esc(msg.id)+'">⋯</button>':'')+
    '</div>'+
    reactStrip+
    '<div class="msg-meta">'+timeAgo(msg.createdAt)+'</div>'+
    '</div>';

  // bind menu
  var menuBtn=row.querySelector('.msg-menu-btn');
  if(menuBtn){menuBtn.onclick=function(e){e.stopPropagation();showOverflowMenu(menuBtn,[{label:'🗑️ Delete',danger:true,action:function(){deleteMessage(msg.id);}}]);};}

  // long press / right click for emoji
  var bubble=row.querySelector('.msg-bubble');
  var lpTimer=null;
  bubble.addEventListener('touchstart',function(){lpTimer=setTimeout(function(){showEmojiPicker(bubble,msg.id);},500);});
  bubble.addEventListener('touchend',function(){clearTimeout(lpTimer);});
  bubble.addEventListener('contextmenu',function(e){e.preventDefault();showEmojiPicker(bubble,msg.id);});

  // bind react strip
  row.querySelectorAll('.msg-react').forEach(function(el){
    el.onclick=function(){toggleMsgReaction(msg.id,el.dataset.em);};
  });

  return row;
}

function deleteMessage(mid){

  FB.deleteDoc(FB.doc(FB.db,'chats',chatWith,'messages',mid));
}

function showEmojiPicker(anchor,mid){
  var old=document.querySelector('.emoji-picker-pop');if(old)old.remove();
  var picker=document.createElement('div');picker.className='emoji-picker-pop';
  MSG_EMOJIS.forEach(function(em){
    var btn=document.createElement('button');btn.className='emoji-pick-btn';btn.textContent=em;
    btn.onclick=function(){toggleMsgReaction(mid,em);picker.remove();};
    picker.appendChild(btn);
  });
  var r=anchor.getBoundingClientRect();
  picker.style.top=(r.top-54)+'px';
  var left=r.left;if(left+228>window.innerWidth)left=window.innerWidth-232;
  picker.style.left=left+'px';
  document.body.appendChild(picker);
  setTimeout(function(){
    function dismiss(e){if(!picker.contains(e.target)){picker.remove();document.removeEventListener('click',dismiss);}}
    document.addEventListener('click',dismiss);
  },0);
}

function toggleMsgReaction(mid,em){
  if(!chatWith)return;
  var update={};
  update['reactions.'+em]=FB.arrayUnion(me.uid);
  FB.updateDoc(FB.doc(FB.db,'chats',chatWith,'messages',mid),update);

function sendMessage(){
  if(!chatWith)return;
  var text=g('chat-ta').value.trim();
  if(!text&&!chatFilePending)return;
  g('chat-ta').value='';g('chat-ta').style.height='';

  function doSend(url,type,fileName){
    var msgData={from:me.uid,text:text,type:type||'text',read:false,reactions:{},createdAt:FB.serverTimestamp()};
    if(url){msgData.url=url;msgData.fileName=fileName||'';}
    if(chatIsGroup)msgData.senderName=myName;
    FB.addDoc(FB.collection(FB.db,'chats',chatWith,'messages'),msgData);
    if(!chatIsGroup&&currentPeerId){
      createNotification(currentPeerId,me.uid,myName,'message',text.substring(0,60)||'Sent a file');
    }
    chatFilePending=null;g('cup').classList.add('hidden');g('cup-prog-wrap').classList.add('hidden');
    g('cup-prog').style.width='0';
  }

  if(chatFilePending){
    var file=chatFilePending;
    g('cup-prog-wrap').classList.remove('hidden');
    uploadFile(file,function(p){g('cup-prog').style.width=(p*100)+'%';}).then(function(res){
      var t=file.type.startsWith('image/')?'image':file.type.startsWith('video/')?'video':file.type.startsWith('audio/')?'audio':'file';
      doSend(res.url,t,file.name);
    }).catch(function(){showErrorModal('Upload Failed','Could not send file.');g('cup-prog-wrap').classList.add('hidden');});
  } else doSend('','text','');
}
