<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chaty 🌸</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,500;0,9..144,700;1,9..144,400&family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet">

import { getFirestore, collection, doc, setDoc, getDoc, getDocs, addDoc, query, orderBy, onSnapshot, updateDoc, arrayUnion, arrayRemove, serverTimestamp, where, limit, deleteDoc, increment } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const app = initializeApp({
  apiKey: "AIzaSyD3y9wwCpc8VZVZb4F1LeKpGcrju348Epo",
  authDomain: "chaty-3e854.firebaseapp.com",
  projectId: "chaty-3e854",
  storageBucket: "chaty-3e854.firebasestorage.app",
  messagingSenderId: "184662030881",
  appId: "1:184662030881:web:56fc9a890e018272774160"

window.__FB = {
  auth: getAuth(app), db: getFirestore(app),
  createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut,

</script>

<style>
:root {
  --peach: #ffb4a2;
  --rose: #ff8fa3;
  --blush: #ffd6e0;
  --cream: #fff8f0;
  --warm: #ffecd2;
  --terra: #e07a5f;
  --muted: #c1839a;
  --sage: #a8c5a0;
  --lavender: #d4b8e0;
  --text: #3d2b35;
  --text2: #7a5c6a;
  --text3: #b89aa8;
  --white: #ffffff;
  --shadow: rgba(224,122,95,0.18);
  --shadow2: rgba(61,43,53,0.10);
  --radius: 28px;
  --radius-sm: 16px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  overflow: hidden;
  font-family: 'Nunito', sans-serif;
  background: var(--cream);
  color: var(--text);
}

/* Animated blob background */
body::before {
  content: '';
  position: fixed; inset: 0; z-index: 0;
  background:
    radial-gradient(ellipse 60% 50% at 15% 20%, #ffd6e055 0%, transparent 70%),
    radial-gradient(ellipse 50% 60% at 85% 80%, #d4b8e044 0%, transparent 70%),
    radial-gradient(ellipse 40% 40% at 70% 20%, #a8c5a033 0%, transparent 70%),
    var(--cream);
  pointer-events: none;
}

/* =================== SCROLLBAR =================== */
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--blush); border-radius: 10px; }

/* =================== AUTH SCREEN =================== */
#auth-screen {
  position: fixed; inset: 0; z-index: 100;
  display: flex; align-items: center; justify-content: center;
  padding: 20px;
}
.auth-bg-blob {
  position: absolute; inset: 0; overflow: hidden; pointer-events: none;
}
.auth-bg-blob span {
  position: absolute; border-radius: 50%;
  filter: blur(60px); opacity: 0.5;
}
.auth-bg-blob span:nth-child(1) { width: 400px; height: 400px; background: #ffd6e0; top: -100px; left: -100px; animation: blobFloat 8s ease-in-out infinite; }
.auth-bg-blob span:nth-child(2) { width: 300px; height: 300px; background: #d4b8e0; bottom: -80px; right: -80px; animation: blobFloat 10s ease-in-out infinite reverse; }
.auth-bg-blob span:nth-child(3) { width: 200px; height: 200px; background: #a8c5a0; top: 50%; left: 60%; animation: blobFloat 7s ease-in-out infinite 2s; }

@keyframes blobFloat {
  0%,100% { transform: translate(0,0) scale(1); }
  33% { transform: translate(20px,-30px) scale(1.05); }
  66% { transform: translate(-15px,15px) scale(0.97); }
}

.auth-wrap {
  position: relative; z-index: 1;
  background: rgba(255,255,255,0.72);
  backdrop-filter: blur(20px);
  border: 1.5px solid rgba(255,180,162,0.3);
  border-radius: 36px;
  padding: 40px 36px;
  width: 100%; max-width: 420px;
  box-shadow: 0 20px 60px var(--shadow), 0 4px 20px var(--shadow2);
}
.auth-logo {
  font-family: 'Fraunces', serif;
  font-size: 2.4rem;
  font-weight: 700;
  color: var(--terra);
  text-align: center;
  margin-bottom: 4px;
  letter-spacing: -1px;
}
.auth-logo span { color: var(--muted); }
.auth-tagline {
  text-align: center;
  font-size: 0.85rem;
  color: var(--text3);
  margin-bottom: 24px;
  font-style: italic;
}
.auth-tabs {
  display: flex; gap: 6px;
  background: var(--warm);
  border-radius: 20px;
  padding: 4px;
  margin-bottom: 24px;
}
.auth-tab {
  flex: 1; border: none; background: transparent;
  padding: 9px; border-radius: 16px;
  font-family: 'Nunito', sans-serif;
  font-size: 0.88rem; font-weight: 700;
  color: var(--text3); cursor: pointer;
  transition: all 0.25s;
}
.auth-tab.active {
  background: var(--white);
  color: var(--terra);
  box-shadow: 0 2px 12px var(--shadow);
}
.auth-form { display: flex; flex-direction: column; gap: 12px; }
.auth-input {
  border: 1.5px solid var(--blush);
  background: rgba(255,255,255,0.8);
  border-radius: 18px;
  padding: 13px 18px;
  font-family: 'Nunito', sans-serif;
  font-size: 0.92rem;
  color: var(--text);
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
}
.auth-input:focus { border-color: var(--terra); box-shadow: 0 0 0 3px rgba(224,122,95,0.12); }
.auth-input::placeholder { color: var(--text3); }
.auth-btn {
  background: linear-gradient(135deg, var(--terra), var(--rose));
  color: white; border: none;
  border-radius: 18px;
  padding: 14px;
  font-family: 'Nunito', sans-serif;
  font-size: 0.95rem; font-weight: 800;
  cursor: pointer;
  box-shadow: 0 6px 20px rgba(224,122,95,0.35);
  transition: transform 0.2s, box-shadow 0.2s;
  margin-top: 4px;
}
.auth-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 28px rgba(224,122,95,0.4); }
.auth-btn:active { transform: translateY(0); }
#a-err { color: #e05c5c; font-size: 0.8rem; text-align: center; min-height: 18px; }
#a-ok { color: var(--sage); font-size: 0.8rem; text-align: center; min-height: 18px; }

/* =================== APP SHELL =================== */
#app { position: fixed; inset: 0; z-index: 1; display: flex; flex-direction: column; }

/* =================== TOP NAV =================== */
.topnav {
  display: flex; align-items: center;
  padding: 10px 18px;
  background: rgba(255,255,255,0.82);
  backdrop-filter: blur(16px);
  border-bottom: 1.5px solid rgba(255,180,162,0.2);
  gap: 10px;
  flex-shrink: 0;
  position: relative; z-index: 50;
}
.nav-logo {
  font-family: 'Fraunces', serif;
  font-size: 1.5rem; font-weight: 700;
  color: var(--terra);
  letter-spacing: -0.5px;
  flex-shrink: 0;
}
.nav-logo span { color: var(--muted); }
.nav-tabs { display: flex; gap: 4px; flex: 1; justify-content: center; }
.nav-tab {
  position: relative;
  display: flex; align-items: center; gap: 5px;
  padding: 8px 16px;
  border: none; background: transparent;
  border-radius: 20px;
  font-family: 'Nunito', sans-serif;
  font-size: 0.82rem; font-weight: 700;
  color: var(--text3); cursor: pointer;
  transition: all 0.22s;
}
.nav-tab.active { background: var(--blush); color: var(--terra); }
.nav-tab .tab-icon { font-size: 1rem; }
.nav-badge {
  position: absolute; top: 2px; right: 2px;
  background: var(--terra); color: white;
  font-size: 0.6rem; font-weight: 800;
  min-width: 16px; height: 16px;
  border-radius: 8px; padding: 0 4px;
  display: none; align-items: center; justify-content: center;
}
.nav-badge.show { display: flex; }
.nav-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
#nav-av-wrap {
  position: relative; width: 36px; height: 36px; cursor: pointer;
}
#nav-av {
  width: 36px; height: 36px; border-radius: 50%;
  background: linear-gradient(135deg, var(--peach), var(--rose));
  display: flex; align-items: center; justify-content: center;
  font-weight: 800; font-size: 0.85rem; color: white;
  background-size: cover; background-position: center;
  border: 2.5px solid var(--white);
  box-shadow: 0 2px 10px var(--shadow);
  overflow: hidden;
}
#nav-av-upload {
  position: absolute; bottom: -2px; right: -2px;
  width: 16px; height: 16px;
  background: var(--terra); color: white;
  border-radius: 50%; font-size: 0.55rem;
  display: flex; align-items: center; justify-content: center;
  border: 1.5px solid white; cursor: pointer;
}
#av-file-input { display: none; }

/* Notif bell */
#notif-btn {
  position: relative;
  width: 36px; height: 36px;
  border: none; background: var(--warm);
  border-radius: 50%; cursor: pointer;
  font-size: 1rem;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.2s;
}
#notif-btn:hover { background: var(--blush); }
#notif-badge {
  position: absolute; top: -2px; right: -2px;
  background: var(--terra); color: white;
  font-size: 0.55rem; font-weight: 800;
  min-width: 16px; height: 16px;
  border-radius: 8px; padding: 0 3px;
  display: none; align-items: center; justify-content: center;
}
#notif-badge.show { display: flex; }

#notif-panel {
  position: absolute; top: 52px; right: 60px;
  width: 320px; max-height: 400px;
  background: rgba(255,255,255,0.95);
  backdrop-filter: blur(20px);
  border: 1.5px solid var(--blush);
  border-radius: var(--radius-sm);
  box-shadow: 0 12px 40px var(--shadow2);
  z-index: 200; display: none; flex-direction: column;
  overflow: hidden;
}
#notif-panel.open { display: flex; }
.notif-panel-head {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 16px;
  border-bottom: 1px solid var(--blush);
  font-weight: 800; font-size: 0.9rem;
}
.notif-mark-all {
  font-size: 0.75rem; color: var(--terra);
  cursor: pointer; font-weight: 700;
  background: none; border: none;
}
#notif-list { overflow-y: auto; flex: 1; }
.notif-item {
  display: flex; align-items: flex-start; gap: 10px;
  padding: 10px 16px; cursor: pointer;
  transition: background 0.15s;
  border-left: 3px solid transparent;
}
.notif-item:hover { background: var(--warm); }
.notif-item.unread { background: #fff5f0; border-left-color: var(--terra); }
.notif-icon { font-size: 1.2rem; flex-shrink: 0; }
.notif-body { flex: 1; min-width: 0; }
.notif-body strong { font-size: 0.82rem; font-weight: 700; }
.notif-body p { font-size: 0.78rem; color: var(--text2); margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.notif-time { font-size: 0.7rem; color: var(--text3); flex-shrink: 0; }

#btn-logout {
  width: 36px; height: 36px;
  border: none; background: var(--warm);
  border-radius: 50%; cursor: pointer; font-size: 0.9rem;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.2s; color: var(--text2);
}
#btn-logout:hover { background: #ffd6d6; color: #e05c5c; }

/* =================== MAIN AREA =================== */
.main { flex: 1; overflow: hidden; position: relative; }
.page { position: absolute; inset: 0; overflow-y: auto; display: none; padding: 20px; }
.page.active { display: block; }

/* =================== PERMISSION BANNER =================== */
#notif-perm-banner {
  background: linear-gradient(135deg, var(--warm), var(--blush));
  border-radius: var(--radius-sm);
  padding: 12px 16px;
  display: flex; align-items: center; gap: 12px;
  margin-bottom: 16px; font-size: 0.84rem;
}
#notif-perm-banner button {
  margin-left: auto; padding: 6px 14px;
  background: var(--terra); color: white;
  border: none; border-radius: 12px;
  font-family: 'Nunito', sans-serif; font-weight: 700; font-size: 0.8rem;
  cursor: pointer;
}

/* =================== STORIES =================== */
.stories-bar {
  margin-bottom: 20px;
  overflow-x: auto; padding-bottom: 4px;
}
#stories-row { display: flex; gap: 12px; padding: 4px 2px; min-width: max-content; }
.story-bubble {
  display: flex; flex-direction: column; align-items: center;
  gap: 5px; cursor: pointer;
}
.story-ring {
  width: 58px; height: 58px; border-radius: 50%;
  padding: 3px;
  background: linear-gradient(135deg, var(--terra), var(--lavender), var(--sage));
  box-shadow: 0 4px 12px var(--shadow);
  transition: transform 0.2s;
}
.story-ring:hover { transform: scale(1.07); }
.story-ring.seen { background: #e0e0e0; }
.story-av {
  width: 100%; height: 100%; border-radius: 50%;
  background: linear-gradient(135deg, var(--peach), var(--rose));
  display: flex; align-items: center; justify-content: center;
  font-weight: 800; color: white; font-size: 1rem;
  background-size: cover; background-position: center;
  border: 2.5px solid white; overflow: hidden;
}
.story-ring.add-story { background: var(--warm); box-shadow: none; border: 2px dashed var(--peach); }
.story-ring.add-story .story-av { background: transparent; color: var(--terra); font-size: 1.4rem; }
.story-name { font-size: 0.68rem; color: var(--text2); font-weight: 600; max-width: 58px; text-align: center; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

/* =================== CREATE POST =================== */
.create-post {
  background: rgba(255,255,255,0.82);
  backdrop-filter: blur(12px);
  border: 1.5px solid rgba(255,180,162,0.25);
  border-radius: var(--radius);
  padding: 16px;
  margin-bottom: 20px;
  box-shadow: 0 4px 20px var(--shadow2);
}
.cp-top { display: flex; align-items: flex-start; gap: 12px; }
#cp-av {
  width: 40px; height: 40px; border-radius: 50%; flex-shrink: 0;
  background: linear-gradient(135deg, var(--peach), var(--rose));
  display: flex; align-items: center; justify-content: center;
  font-weight: 800; color: white; font-size: 0.9rem;
  background-size: cover; background-position: center;
  overflow: hidden;
}
#cp-ta {
  flex: 1; border: none; background: var(--warm);
  border-radius: 20px; padding: 12px 16px;
  font-family: 'Nunito', sans-serif; font-size: 0.9rem;
  color: var(--text); outline: none; resize: none;
  min-height: 44px; max-height: 120px;
  transition: background 0.2s;
}
#cp-ta:focus { background: var(--blush); }
#cp-ta::placeholder { color: var(--text3); }
.cp-actions {
  display: flex; align-items: center; gap: 8px; margin-top: 10px; padding-left: 52px;
}
.cp-att-btn {
  display: flex; align-items: center; gap: 4px;
  padding: 6px 12px; border: 1.5px solid var(--blush);
  background: transparent; border-radius: 14px;
  font-family: 'Nunito', sans-serif; font-size: 0.78rem; font-weight: 700;
  color: var(--text2); cursor: pointer; transition: all 0.2s;
}
.cp-att-btn:hover { background: var(--blush); border-color: var(--peach); color: var(--terra); }
#cp-submit {
  margin-left: auto;
  background: linear-gradient(135deg, var(--terra), var(--rose));
  color: white; border: none; border-radius: 14px;
  padding: 8px 20px;
  font-family: 'Nunito', sans-serif; font-size: 0.85rem; font-weight: 800;
  cursor: pointer; box-shadow: 0 4px 12px var(--shadow);
  transition: transform 0.2s, box-shadow 0.2s;
}
#cp-submit:hover { transform: translateY(-1px); box-shadow: 0 6px 16px var(--shadow); }
#cp-preview {
  display: none; margin-top: 10px; padding-left: 52px;
  position: relative;
}
#cp-preview img, #cp-preview video {
  max-height: 180px; max-width: 100%;
  border-radius: var(--radius-sm); object-fit: cover;
}
#cp-preview .rm-btn {
  position: absolute; top: 4px; left: 56px;
  background: rgba(0,0,0,0.5); color: white;
  border: none; border-radius: 50%; width: 22px; height: 22px;
  font-size: 0.7rem; cursor: pointer; display: flex; align-items: center; justify-content: center;
}
#cp-progress {
  height: 4px; background: var(--blush); border-radius: 2px;
  margin-top: 8px; display: none; overflow: hidden;
}
#cp-progress-bar { height: 100%; background: linear-gradient(90deg, var(--terra), var(--rose)); width: 0%; transition: width 0.2s; border-radius: 2px; }

/* =================== POST CARD =================== */
.post-card {
  background: rgba(255,255,255,0.82);
  backdrop-filter: blur(12px);
  border: 1.5px solid rgba(255,180,162,0.2);
  border-radius: var(--radius);
  padding: 18px;
  margin-bottom: 16px;
  box-shadow: 0 4px 20px var(--shadow2);
  animation: fadeUp 0.3s ease;
}
@keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
.post-head { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
.post-av {
  width: 38px; height: 38px; border-radius: 50%;
  background: linear-gradient(135deg, var(--peach), var(--rose));
  display: flex; align-items: center; justify-content: center;
  font-weight: 800; color: white; font-size: 0.85rem;
  background-size: cover; background-position: center; overflow: hidden; flex-shrink: 0;
}
.post-meta { flex: 1; }
.post-author { font-weight: 800; font-size: 0.88rem; }
.post-time { font-size: 0.72rem; color: var(--text3); }
.post-menu-btn {
  background: none; border: none; cursor: pointer;
  color: var(--text3); font-size: 1.1rem; padding: 4px 8px;
  border-radius: 8px; transition: background 0.15s;
}
.post-menu-btn:hover { background: var(--warm); }
.post-text { font-size: 0.9rem; line-height: 1.6; margin-bottom: 10px; white-space: pre-wrap; word-break: break-word; }
.post-media { margin-bottom: 12px; }
.post-media img, .post-media video {
  width: 100%; max-height: 320px; object-fit: cover;
  border-radius: var(--radius-sm); cursor: pointer;
}
.post-file-link {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 8px 14px; background: var(--warm);
  border-radius: 12px; color: var(--text2);
  text-decoration: none; font-size: 0.8rem; font-weight: 700;
}
.reactions-bar { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px; }
.react-btn {
  display: flex; align-items: center; gap: 4px;
  padding: 5px 10px; border: 1.5px solid var(--blush);
  background: transparent; border-radius: 20px;
  font-size: 0.8rem; cursor: pointer; transition: all 0.15s;
  font-family: 'Nunito', sans-serif; color: var(--text2);
  position: relative;
}
.react-btn:hover { background: var(--blush); }
.react-btn.active { background: var(--blush); border-color: var(--peach); color: var(--terra); font-weight: 700; }
.react-btn .react-count { font-size: 0.75rem; font-weight: 700; }
.react-tooltip {
  display: none; position: absolute; bottom: calc(100% + 6px); left: 50%;
  transform: translateX(-50%);
  background: rgba(61,43,53,0.9); color: white;
  font-size: 0.68rem; padding: 4px 8px; border-radius: 8px;
  white-space: nowrap; pointer-events: none; z-index: 100;
}
.react-btn:hover .react-tooltip { display: block; }
.post-footer { display: flex; align-items: center; gap: 8px; }
.comment-toggle-btn {
  background: none; border: none; cursor: pointer;
  color: var(--text3); font-size: 0.8rem; font-weight: 700;
  padding: 5px 10px; border-radius: 12px; transition: all 0.15s;
  display: flex; align-items: center; gap: 4px;
}
.comment-toggle-btn:hover { background: var(--warm); color: var(--text2); }
.comments-section { margin-top: 12px; border-top: 1px solid var(--blush); padding-top: 12px; }
.comment-item { display: flex; gap: 8px; margin-bottom: 10px; }
.comment-av {
  width: 28px; height: 28px; border-radius: 50%; flex-shrink: 0;
  background: linear-gradient(135deg, var(--peach), var(--rose));
  display: flex; align-items: center; justify-content: center;
  font-weight: 800; color: white; font-size: 0.65rem;
  background-size: cover; background-position: center; overflow: hidden;
}
.comment-body { background: var(--warm); border-radius: 14px; padding: 8px 12px; flex: 1; }
.comment-author { font-size: 0.75rem; font-weight: 800; }
.comment-text { font-size: 0.82rem; }
.comment-input-row { display: flex; gap: 8px; align-items: center; margin-top: 8px; }
.comment-input {
  flex: 1; border: 1.5px solid var(--blush);
  background: var(--warm); border-radius: 18px;
  padding: 9px 14px; font-family: 'Nunito', sans-serif;
  font-size: 0.82rem; color: var(--text); outline: none;
  transition: border-color 0.2s;
}
.comment-input:focus { border-color: var(--terra); }
.comment-send {
  background: linear-gradient(135deg, var(--terra), var(--rose));
  color: white; border: none; border-radius: 50%;
  width: 32px; height: 32px; cursor: pointer; font-size: 0.9rem;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}

/* =================== PEOPLE PAGE =================== */
#people-search {
  width: 100%; border: 1.5px solid var(--blush);
  background: rgba(255,255,255,0.8);
  border-radius: 20px; padding: 12px 18px;

}
#people-search:focus { border-color: var(--terra); }
#people-grid {

}
.person-card {

.person-av {

  background: linear-gradient(135deg, var(--peach), var(--rose));

  background-size: cover; background-position: center; overflow: hidden;

}

}
.presence-dot.online { background: #4caf82; animation: pulse 2s infinite; }
@keyframes pulse { 0%,100% { box-shadow: 0 0 0 0 rgba(76,175,130,0.5); } 50% { box-shadow: 0 0 0 5px rgba(76,175,130,0); } }
.person-name { font-weight: 800; font-size: 0.88rem; margin-bottom: 2px; }
.person-email { font-size: 0.72rem; color: var(--text3); margin-bottom: 12px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.msg-btn {
  background: linear-gradient(135deg, var(--terra), var(--rose));
  color: white; border: none; border-radius: 14px;
  padding: 8px 18px; font-family: 'Nunito', sans-serif;
  font-size: 0.8rem; font-weight: 700; cursor: pointer;

}
.msg-btn:hover { transform: scale(1.05); }

/* =================== CHAT PAGE =================== */
#page-chat {
  padding: 0; overflow: hidden; display: none;
}
#page-chat.active { display: flex; }
#chat-sidebar {
  width: 280px; flex-shrink: 0;
  display: flex; flex-direction: column;
  border-right: 1.5px solid rgba(255,180,162,0.2);

  backdrop-filter: blur(12px);

}
#cs-top {
  padding: 14px 12px;
  border-bottom: 1px solid var(--blush);
  display: flex; gap: 8px; align-items: center;
}
#cs-search {
  flex: 1; border: 1.5px solid var(--blush);
  background: var(--warm); border-radius: 16px;
  padding: 9px 14px; font-family: 'Nunito', sans-serif;
  font-size: 0.82rem; color: var(--text); outline: none;
  transition: border-color 0.2s;
}
#cs-search:focus { border-color: var(--terra); }
#new-group-btn {
  background: linear-gradient(135deg, var(--terra), var(--rose));
  color: white; border: none; border-radius: 12px;
  width: 32px; height: 32px; font-size: 1rem; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; box-shadow: 0 3px 10px var(--shadow);
}
#cs-list { flex: 1; overflow-y: auto; padding: 8px; }
.cs-section-label {
  font-size: 0.7rem; font-weight: 800; letter-spacing: 1.5px;
  text-transform: uppercase; color: var(--text3);
  padding: 8px 8px 4px;
}
.cs-item {
  display: flex; align-items: center; gap: 10px;
  padding: 10px; border-radius: 18px; cursor: pointer;
  transition: background 0.15s; margin-bottom: 2px;
}
.cs-item:hover { background: var(--warm); }
.cs-item.active { background: var(--blush); }
.cs-av {
  width: 38px; height: 38px; border-radius: 50%; flex-shrink: 0;
  background: linear-gradient(135deg, var(--peach), var(--rose));
  display: flex; align-items: center; justify-content: center;
  font-weight: 800; color: white; font-size: 0.85rem;
  background-size: cover; background-position: center; overflow: hidden;
  position: relative;
}
.cs-info { flex: 1; min-width: 0; }
.cs-name { font-weight: 700; font-size: 0.84rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.cs-sub { font-size: 0.72rem; color: var(--text3); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.cs-badge {
  background: var(--terra); color: white;
  font-size: 0.65rem; font-weight: 800;
  min-width: 18px; height: 18px;
  border-radius: 9px; padding: 0 5px;
  display: none; align-items: center; justify-content: center; flex-shrink: 0;
}
.cs-badge.show { display: flex; }

/* CHAT MAIN */
#chat-main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
#chat-empty {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 12px; color: var(--text3);
}
#chat-empty .empty-blob {
  width: 90px; height: 90px;
  background: linear-gradient(135deg, var(--blush), var(--lavender));
  border-radius: 60% 40% 70% 30% / 50% 60% 40% 70%;
  animation: blobMorph 6s ease-in-out infinite;
  display: flex; align-items: center; justify-content: center;
  font-size: 2rem;
}
@keyframes blobMorph {
  0%,100% { border-radius: 60% 40% 70% 30% / 50% 60% 40% 70%; }
  33% { border-radius: 40% 60% 30% 70% / 60% 40% 70% 30%; }
  66% { border-radius: 70% 30% 50% 50% / 30% 70% 30% 70%; }
}
#chat-empty p { font-size: 0.9rem; font-weight: 600; }
#chat-active { display: none; flex: 1; flex-direction: column; overflow: hidden; }
#chat-active.open { display: flex; }

.chat-head-bar {
  padding: 12px 16px;
  border-bottom: 1.5px solid rgba(255,180,162,0.2);
  background: rgba(255,255,255,0.8);
  backdrop-filter: blur(12px);
  display: flex; align-items: center; gap: 10px;
  flex-shrink: 0;
}
#ch-back {
  display: none; background: none; border: none;
  font-size: 1.2rem; cursor: pointer; color: var(--text2); padding: 4px;
}
#ch-av {
  width: 36px; height: 36px; border-radius: 50%;
  background: linear-gradient(135deg, var(--peach), var(--rose));
  display: flex; align-items: center; justify-content: center;
  font-weight: 800; color: white; font-size: 0.8rem;
  background-size: cover; background-position: center; overflow: hidden; flex-shrink: 0;
}
#ch-name { font-weight: 800; font-size: 0.9rem; flex: 1; }
.ch-status { display: flex; align-items: center; gap: 4px; font-size: 0.72rem; color: var(--text3); }
#ch-online-dot { width: 8px; height: 8px; border-radius: 50%; background: #ccc; flex-shrink: 0; }
#ch-online-dot.online { background: #4caf82; animation: pulse 2s infinite; }
.ch-call-btns { display: flex; gap: 6px; }
.call-btn {
  width: 34px; height: 34px;
  background: var(--warm); border: none; border-radius: 50%;
  cursor: pointer; font-size: 0.95rem; transition: background 0.2s;
  display: flex; align-items: center; justify-content: center;
}
.call-btn:hover { background: var(--blush); }

#msgs-area {
  flex: 1; overflow-y: auto; padding: 16px;
  display: flex; flex-direction: column; gap: 8px;
}
.msg-row { display: flex; align-items: flex-end; gap: 8px; max-width: 75%; }
.msg-row.own { align-self: flex-end; flex-direction: row-reverse; }
.msg-row.other { align-self: flex-start; }
.msg-av-small {
  width: 28px; height: 28px; border-radius: 50%; flex-shrink: 0;
  background: linear-gradient(135deg, var(--peach), var(--rose));
  display: flex; align-items: center; justify-content: center;
  font-weight: 800; color: white; font-size: 0.65rem;
  background-size: cover; background-position: center; overflow: hidden;
}
.msg-body { display: flex; flex-direction: column; gap: 3px; }
.msg-sender { font-size: 0.7rem; font-weight: 700; color: var(--muted); padding: 0 8px; }
.msg-bubble {
  padding: 10px 14px; border-radius: 20px;
  font-size: 0.87rem; line-height: 1.5; word-break: break-word;
  max-width: 340px; position: relative;
}
.msg-row.own .msg-bubble {
  background: linear-gradient(135deg, var(--terra), var(--rose));
  color: white;
  border-bottom-right-radius: 6px;
}
.msg-row.other .msg-bubble {
  background: rgba(255,255,255,0.9);
  color: var(--text);
  border: 1.5px solid var(--blush);
  border-bottom-left-radius: 6px;
}
.msg-bubble img { max-width: 220px; border-radius: 12px; display: block; cursor: pointer; }
.msg-bubble video, .msg-bubble audio { max-width: 220px; border-radius: 12px; display: block; }
.msg-file-link {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 6px 10px; background: rgba(255,255,255,0.2);
  border-radius: 10px; color: inherit; text-decoration: none;
  font-size: 0.78rem; font-weight: 700;
}
.msg-row.other .msg-file-link { background: var(--warm); color: var(--text2); }
.msg-reaction-strip { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 4px; }
.msg-react-pill {
  background: rgba(255,255,255,0.9); border: 1px solid var(--blush);
  border-radius: 10px; padding: 2px 7px;
  font-size: 0.75rem; cursor: pointer; display: flex; align-items: center; gap: 3px;
  position: relative;
}
.msg-react-pill .react-tooltip { font-size: 0.65rem; }
.msg-menu-btn {
  background: none; border: none; cursor: pointer;
  color: var(--text3); font-size: 0.8rem; padding: 2px 5px;
  border-radius: 6px; opacity: 0; transition: opacity 0.15s;
  align-self: center;
}
.msg-row:hover .msg-menu-btn { opacity: 1; }

/* emoji picker on msg */
.msg-emoji-picker {
  position: fixed; z-index: 300;
  background: rgba(255,255,255,0.95);
  backdrop-filter: blur(12px);
  border: 1.5px solid var(--blush);
  border-radius: 20px;
  padding: 10px;
  display: flex; gap: 6px;
  box-shadow: 0 8px 28px var(--shadow2);
}
.msg-emoji-btn {
  background: none; border: none; cursor: pointer;
  font-size: 1.3rem; padding: 4px 6px; border-radius: 10px;
  transition: background 0.15s; line-height: 1;
}
.msg-emoji-btn:hover { background: var(--warm); }

/* Chat upload preview */
#cup {
  display: none; padding: 10px 16px;
  background: var(--warm); border-top: 1px solid var(--blush);
  flex-shrink: 0;
}
#cup-inner { display: flex; align-items: center; gap: 10px; }
#cup-thumb { max-height: 50px; max-width: 80px; border-radius: 8px; object-fit: cover; }
#cup-name { font-size: 0.8rem; color: var(--text2); font-weight: 600; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
#cup-rm { background: none; border: none; cursor: pointer; color: var(--text3); font-size: 1rem; }

/* Chat input bar */
.chat-input-bar {
  padding: 10px 14px;
  background: rgba(255,255,255,0.8);
  backdrop-filter: blur(12px);
  border-top: 1.5px solid rgba(255,180,162,0.2);
  display: flex; align-items: flex-end; gap: 8px;
  flex-shrink: 0;
}
#chat-file-input { display: none; }
.cib-btn {
  width: 36px; height: 36px; border: none;
  background: var(--warm); border-radius: 50%;
  font-size: 1rem; cursor: pointer; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.2s;
}
.cib-btn:hover { background: var(--blush); }
.cib-btn.recording { background: #ffd6d6; animation: recPulse 1s infinite; }
@keyframes recPulse { 0%,100% { box-shadow: 0 0 0 0 rgba(224,92,92,0.4); } 50% { box-shadow: 0 0 0 8px rgba(224,92,92,0); } }
#chat-ta {
  flex: 1; border: 1.5px solid var(--blush);
  background: var(--warm); border-radius: 20px;
  padding: 10px 16px; font-family: 'Nunito', sans-serif;
  font-size: 0.87rem; color: var(--text); outline: none; resize: none;
  min-height: 40px; max-height: 100px; transition: border-color 0.2s;
}
#chat-ta:focus { border-color: var(--terra); }
#chat-send-btn {
  width: 38px; height: 38px;
  background: linear-gradient(135deg, var(--terra), var(--rose));
  color: white; border: none; border-radius: 50%;
  font-size: 1rem; cursor: pointer; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 3px 12px var(--shadow); transition: transform 0.2s;
}
#chat-send-btn:hover { transform: scale(1.1); }

/* =================== OVERLAYS / MODALS =================== */
.overlay {
  position: fixed; inset: 0; z-index: 500;
  background: rgba(61,43,53,0.5);
  backdrop-filter: blur(6px);
  display: none; align-items: center; justify-content: center; padding: 20px;
}
.overlay.open { display: flex; }
.modal-box {
  background: rgba(255,255,255,0.96);
  border-radius: var(--radius);
  padding: 28px;
  width: 100%; max-width: 420px;
  box-shadow: 0 20px 60px var(--shadow);
  max-height: 80vh; display: flex; flex-direction: column;
}
.modal-title {
  font-family: 'Fraunces', serif;
  font-size: 1.3rem; font-weight: 700;
  color: var(--terra); margin-bottom: 16px;
}
.modal-input {
  border: 1.5px solid var(--blush); background: var(--warm);
  border-radius: 16px; padding: 11px 16px;
  font-family: 'Nunito', sans-serif; font-size: 0.88rem;
  color: var(--text); outline: none; width: 100%; margin-bottom: 12px;
  transition: border-color 0.2s;
}
.modal-input:focus { border-color: var(--terra); }
.modal-user-list { overflow-y: auto; flex: 1; margin-bottom: 16px; }
.modal-user-item {
  display: flex; align-items: center; gap: 10px;
  padding: 8px; border-radius: 14px; cursor: pointer;
  transition: background 0.15s;
}
.modal-user-item:hover { background: var(--warm); }
.modal-user-item.selected { background: var(--blush); }
.modal-user-item input[type="checkbox"] { accent-color: var(--terra); }
.modal-btns { display: flex; gap: 10px; margin-top: 4px; }
.modal-btn {
  flex: 1; padding: 12px; border: none; border-radius: 16px;
  font-family: 'Nunito', sans-serif; font-size: 0.88rem; font-weight: 800;
  cursor: pointer; transition: all 0.2s;
}
.modal-btn.primary { background: linear-gradient(135deg, var(--terra), var(--rose)); color: white; box-shadow: 0 4px 14px var(--shadow); }
.modal-btn.secondary { background: var(--warm); color: var(--text2); }
.modal-btn:hover { transform: translateY(-1px); }

/* Lightbox */
#lightbox { background: rgba(0,0,0,0.88); cursor: pointer; }
#lightbox img { max-width: 95vw; max-height: 95vh; border-radius: var(--radius-sm); object-fit: contain; }
#lb-close {
  position: fixed; top: 16px; right: 16px;
  background: rgba(255,255,255,0.2); border: none; border-radius: 50%;
  width: 38px; height: 38px; color: white; font-size: 1.2rem; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
}

/* Error modal */
#err-modal-title { font-family: 'Fraunces', serif; font-size: 1.1rem; color: #e05c5c; margin-bottom: 8px; font-weight: 700; }
#err-modal-msg { font-size: 0.88rem; color: var(--text2); margin-bottom: 20px; line-height: 1.6; }

/* Notification toast */
#notif-toast {
  position: fixed; bottom: 24px; right: 24px; z-index: 900;
  background: rgba(255,255,255,0.96);
  backdrop-filter: blur(16px);
  border: 1.5px solid var(--blush);
  border-radius: 20px; padding: 14px 16px;
  display: none; align-items: center; gap: 12px;
  box-shadow: 0 8px 30px var(--shadow2);
  min-width: 280px; max-width: 360px;
  animation: toastSlide 0.3s ease;
}
@keyframes toastSlide { from { transform: translateX(30px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
#notif-toast.show { display: flex; }
#notif-toast-icon { font-size: 1.5rem; flex-shrink: 0; }
.toast-body { flex: 1; min-width: 0; }
#notif-toast-title { font-weight: 800; font-size: 0.85rem; }
#notif-toast-msg { font-size: 0.78rem; color: var(--text2); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
#notif-toast-close { background: none; border: none; cursor: pointer; color: var(--text3); font-size: 1rem; flex-shrink: 0; }

/* =================== CALL OVERLAY =================== */
#call-overlay {
  background: linear-gradient(135deg, #2d1a2a, #3d2035);
}
.call-inner {
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  width: 100%; height: 100%; gap: 16px;
  position: relative;
}
#call-remote-video, #call-local-video {
  border-radius: var(--radius); object-fit: cover;
}
#call-remote-video { width: 100%; max-width: 500px; max-height: 400px; display: none; }
#call-local-video {
  position: absolute; bottom: 80px; right: 20px;
  width: 120px; height: 90px; display: none; z-index: 10;
  box-shadow: 0 4px 16px rgba(0,0,0,0.4);
}
#call-peer-av {
  width: 80px; height: 80px; border-radius: 50%;
  background: linear-gradient(135deg, var(--peach), var(--rose));
  display: flex; align-items: center; justify-content: center;
  font-size: 2rem; font-weight: 800; color: white;
  background-size: cover; background-position: center; overflow: hidden;
  box-shadow: 0 0 0 8px rgba(255,180,162,0.2), 0 0 0 16px rgba(255,180,162,0.1);
}
#call-peer-name { color: white; font-size: 1.2rem; font-weight: 800; font-family: 'Fraunces', serif; }
#call-status { color: rgba(255,255,255,0.7); font-size: 0.85rem; }
.call-actions { display: flex; gap: 12px; margin-top: 8px; }
.call-action-btn {
  width: 52px; height: 52px; border-radius: 50%; border: none; cursor: pointer;
  font-size: 1.2rem; display: flex; align-items: center; justify-content: center;
  transition: transform 0.2s;
}
.call-action-btn:hover { transform: scale(1.1); }
#call-accept { background: #4caf82; color: white; }
#call-hangup { background: #e05c5c; color: white; }
#call-mute, #call-cam { background: rgba(255,255,255,0.15); color: white; }
#call-mute.active, #call-cam.active { background: rgba(255,92,92,0.4); }

/* =================== STORY VIEWER =================== */
#story-viewer {
  background: #000;
}
#sv-inner { width: 100%; height: 100%; max-width: 420px; margin: 0 auto; position: relative; overflow: hidden; }
#sv-progress-bar { display: flex; gap: 3px; position: absolute; top: 10px; left: 10px; right: 10px; z-index: 10; }
.sv-seg { flex: 1; height: 3px; background: rgba(255,255,255,0.35); border-radius: 2px; overflow: hidden; }
.sv-seg-fill { height: 100%; background: white; width: 0%; transition: width 0.1s linear; }
#sv-img, #sv-vid { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
#sv-vid { display: none; }
.sv-user-info { position: absolute; top: 26px; left: 12px; z-index: 10; display: flex; align-items: center; gap: 8px; }
#sv-av { width: 36px; height: 36px; border-radius: 50%; background: linear-gradient(135deg, var(--peach), var(--rose)); display: flex; align-items: center; justify-content: center; font-weight: 800; color: white; font-size: 0.85rem; background-size: cover; background-position: center; overflow: hidden; border: 2px solid white; }
#sv-uname { color: white; font-weight: 800; font-size: 0.85rem; text-shadow: 0 1px 4px rgba(0,0,0,0.5); }
#sv-time { color: rgba(255,255,255,0.7); font-size: 0.72rem; }
#sv-text { position: absolute; bottom: 60px; left: 0; right: 0; padding: 0 16px; color: white; font-size: 0.92rem; text-align: center; text-shadow: 0 2px 8px rgba(0,0,0,0.7); font-weight: 600; }
.sv-nav { position: absolute; top: 0; bottom: 0; width: 50%; z-index: 5; cursor: pointer; }
#sv-nav-prev { left: 0; }
#sv-nav-next { right: 0; }
#sv-close { position: absolute; top: 10px; right: 12px; z-index: 10; background: rgba(0,0,0,0.4); border: none; border-radius: 50%; width: 32px; height: 32px; color: white; font-size: 1rem; cursor: pointer; display: flex; align-items: center; justify-content: center; }

/* =================== STORY CREATE MODAL =================== */
#scm-preview {
  width: 100%; height: 200px; border-radius: var(--radius-sm);
  background: var(--warm); cursor: pointer;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 8px; color: var(--text3); font-size: 0.85rem; font-weight: 600;
  overflow: hidden; margin-bottom: 14px; position: relative;
  border: 2px dashed var(--peach); transition: background 0.2s;
}
#scm-preview:hover { background: var(--blush); }
#scm-prev-img, #scm-prev-vid { display: none; width: 100%; height: 100%; object-fit: cover; }
#scm-placeholder { display: flex; flex-direction: column; align-items: center; gap: 6px; }
#scm-placeholder span { font-size: 2rem; }
#scm-file-input { display: none; }
#scm-caption { width: 100%; margin-bottom: 12px; }

/* =================== OVERFLOW MENU =================== */
.overflow-menu {
  position: fixed; z-index: 600;
  background: rgba(255,255,255,0.96);
  backdrop-filter: blur(16px);
  border: 1.5px solid var(--blush);
  border-radius: 16px;
  box-shadow: 0 8px 28px var(--shadow2);
  overflow: hidden; min-width: 140px;
}
.overflow-item {
  display: flex; align-items: center; gap: 8px;
  padding: 10px 16px; cursor: pointer;
  font-size: 0.85rem; font-weight: 600;
  transition: background 0.15s; color: var(--text);
}
.overflow-item:hover { background: var(--warm); }
.overflow-item.danger { color: #e05c5c; }
.overflow-item.danger:hover { background: #fff0f0; }

/* =================== CFG BAR =================== */
#cfg-bar {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: #fff3cd; padding: 10px 20px; text-align: center;
  font-size: 0.82rem; color: #856404; z-index: 1000; display: none;

<div id="cfg-bar"></div>

<script>
(function() {
  'use strict';

  // ====== CONSTANTS ======
  var CLOUDINARY_CLOUD_NAME = 'diev2dlno';
  var CLOUDINARY_UPLOAD_PRESET = 'chaty_uploads';
  var ADMIN_UIDS = ['UzX7q42S6ZTmSImkCE3eyDPycZQ2'];
  var GRADIENTS = [
    'linear-gradient(135deg,#ffb4a2,#ff8fa3)',
    'linear-gradient(135deg,#d4b8e0,#a78bfa)',
    'linear-gradient(135deg,#a8c5a0,#4caf82)',
    'linear-gradient(135deg,#ffecd2,#fcb69f)',
    'linear-gradient(135deg,#84fab0,#8fd3f4)',
    'linear-gradient(135deg,#f093fb,#f5576c)',
    'linear-gradient(135deg,#4facfe,#00f2fe)',
    'linear-gradient(135deg,#43e97b,#38f9d7)'
  ];

  // ====== STATE ======
  var FB;
  var me, myName, myGrad, myAvatarUrl = '';
  var allUsers = [];
  var chatWith = null, chatWithName = '', chatIsGroup = false;
  var chatUnsubFn = null, postsUnsub = null;
  var unreadCounts = {}, totalUnread = 0, unreadUnsubs = {};
  var chatFilePending = null;
  var mediaRecorder = null, audioChunks = [], isRecording = false;
  var feedLoaded = false, newPostCount = 0;
  var pc = null, localStream = null, callRoomId = null;
  var currentPeerId = null, currentPeerName = '';
  var callIsVideo = false, isCaller = false, callUnsub = null;
  var isMuted = false, isCamOff = false;
  var presenceInterval = null, currentPresenceUnsub = null;
  var userPresenceMap = {};
  var storiesUnsub = null, storyCurrentList = [], storyCurrentIdx = 0, storyTimer = null;
  var scmFile = null;
  var notifList = [], notifUnsub = null, notifFirstLoad = true;
  var toastTimeout = null;
  var selectedMembers = [];
  var knownNotifIds = new Set();
  var seenCallees = {}, seenCandidates = {};
  var currentPage = 'feed';

  // ====== UTILS ======
  function g(id) { return document.getElementById(id); }
  function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
  function grad(uid) { var h=0; for(var i=0;i<(uid||'').length;i++) h=(h<<5)-h+uid.charCodeAt(i); return GRADIENTS[Math.abs(h)%GRADIENTS.length]; }
  function mob() { return window.innerWidth <= 640; }
  function timeAgo(ts) {
    if (!ts) return '';
    var d = ts.toDate ? ts.toDate() : new Date(ts);
    var s = Math.floor((Date.now()-d)/1000);
    if (s<60) return 'just now';
    if (s<3600) return Math.floor(s/60)+'m ago';
    if (s<86400) return Math.floor(s/3600)+'h ago';
    return Math.floor(s/86400)+'d ago';
  }
  function showErrorModal(title, msg) {
    g('err-modal-title').textContent = title;
    g('err-modal-msg').textContent = msg;
    openOverlay('err-modal');
  }
  function openOverlay(id) { g(id).classList.add('open'); }
  function closeOverlay(id) { g(id).classList.remove('open'); }
  function openLightbox(src) { g('lb-img').src = src; openOverlay('lightbox'); }
  function closeLightbox() { closeOverlay('lightbox'); }
  function setBadge(el, count) {
    if (!el) return;
    if (count > 0) { el.textContent = count > 99 ? '99+' : count; el.classList.add('show'); }
    else { el.classList.remove('show'); }
  }
  function setAvEl(el, avatarUrl, name, uid) {
    if (!el) return;
    if (avatarUrl) {
      el.style.backgroundImage = 'url('+avatarUrl+')';
      el.style.background = 'url('+avatarUrl+') center/cover';
      el.textContent = '';
    } else {
      el.style.background = grad(uid||name||'');
      el.textContent = (name||'?')[0].toUpperCase();
    }
  }

  // ====== FILE UPLOAD ======
  function uploadFile(file, onProgress) {
    return new Promise(function(resolve, reject) {
      var fd = new FormData();
      fd.append('file', file);
      fd.append('upload_preset', CLOUDINARY_UPLOAD_PRESET);
      var xhr = new XMLHttpRequest();
      xhr.open('POST', 'https://api.cloudinary.com/v1_1/'+CLOUDINARY_CLOUD_NAME+'/auto/upload');
      xhr.upload.onprogress = function(e) { if(e.lengthComputable && onProgress) onProgress(e.loaded/e.total); };
      xhr.onload = function() {
        try { var r = JSON.parse(xhr.responseText); if(r.secure_url) resolve({url: r.secure_url}); else reject(r); }
        catch(e) { reject(e); }
      };
      xhr.onerror = function() { reject(new Error('Upload failed')); };
      xhr.send(fd);
    });
  }

  // ====== OVERFLOW MENU ======
  var activeMenu = null;
  function showOverflowMenu(anchor, items) {
    if (activeMenu) { activeMenu.remove(); activeMenu = null; }
    var menu = document.createElement('div');
    menu.className = 'overflow-menu';
    items.forEach(function(item) {
      var el = document.createElement('div');
      el.className = 'overflow-item' + (item.danger ? ' danger' : '');
      el.textContent = item.label;
      function act(e) { e.preventDefault(); menu.remove(); activeMenu = null; item.action(); }
      el.addEventListener('click', act);
      el.addEventListener('touchend', act);
      menu.appendChild(el);
    });
    var r = anchor.getBoundingClientRect();
    menu.style.position = 'fixed';
    menu.style.top = (r.bottom + 4) + 'px';
    var left = r.left;
    if (left + 160 > window.innerWidth) left = window.innerWidth - 164;
    menu.style.left = left + 'px';
    document.body.appendChild(menu);
    activeMenu = menu;
    setTimeout(function() {
      function dismiss(e) {
        if (!menu.contains(e.target)) { menu.remove(); activeMenu = null; document.removeEventListener('click', dismiss); document.removeEventListener('touchend', dismiss); }
      }
      document.addEventListener('click', dismiss);
      document.addEventListener('touchend', dismiss);
    }, 0);
  }

  // ====== AUTH ======
  function showAuthTab(tab) {
    g('tab-in').classList.toggle('active', tab==='in');
    g('tab-up').classList.toggle('active', tab==='up');
    g('form-in').style.display = tab==='in' ? 'flex' : 'none';
    g('form-up').style.display = tab==='up' ? 'flex' : 'none';
    g('a-err').textContent = '';
  }
  window.showAuthTab = showAuthTab;

  function doLogin() {
    var email = g('in-email').value.trim(), pw = g('in-pw').value;
    if (!email||!pw) { g('a-err').textContent='Please fill all fields'; return; }
    FB.signInWithEmailAndPassword(FB.auth, email, pw).catch(function(e) { g('a-err').textContent = e.message; });
  }
  window.doLogin = doLogin;

  function doSignup() {
    var name=g('up-name').value.trim(), email=g('up-email').value.trim(), pw=g('up-pw').value;
    if(!name||!email||!pw) { g('a-err2').textContent='Please fill all fields'; return; }
    if(pw.length<6) { g('a-err2').textContent='Password must be at least 6 characters'; return; }
    FB.createUserWithEmailAndPassword(FB.auth, email, pw).then(function(uc) {
      return FB.updateProfile(uc.user, {displayName: name}).then(function() {
        return FB.setDoc(FB.doc(FB.db,'users',uc.user.uid), {name:name, email:email, uid:uc.user.uid, createdAt:FB.serverTimestamp()});
      });
    }).then(function() { g('a-ok').textContent='Account created! ✨'; g('a-err2').textContent=''; })
    .catch(function(e) { g('a-err2').textContent=e.message; });
  }
  window.doSignup = doSignup;

  function doLogout() {
    if(presenceInterval) clearInterval(presenceInterval);
    if(postsUnsub) postsUnsub();
    if(chatUnsubFn) chatUnsubFn();
    if(notifUnsub) notifUnsub();
    if(storiesUnsub) storiesUnsub();
    if(currentPresenceUnsub) currentPresenceUnsub();
    Object.values(unreadUnsubs).forEach(function(f){f();});
    if(me) FB.setDoc(FB.doc(FB.db,'presence',me.uid),{online:false,lastSeen:FB.serverTimestamp(),uid:me.uid},{merge:true});
    FB.signOut(FB.auth);
  }
  window.doLogout = doLogout;

  // ====== ENTER APP ======
  function enterApp() {
    FB.getDoc(FB.doc(FB.db,'users',me.uid)).then(function(snap) {
      if(snap.exists()) { var d=snap.data(); myAvatarUrl=d.avatarUrl||''; }
      myName = me.displayName || 'User';
      myGrad = grad(me.uid);
      g('auth-screen').style.display = 'none';
      g('app').style.display = 'flex';
      setAvEl(g('nav-av'), myAvatarUrl, myName, me.uid);
      setAvEl(g('cp-av'), myAvatarUrl, myName, me.uid);
      loadAllUsers();
      loadGroupsAtBoot();
      listenIncomingCalls();
      startPresenceHeartbeat();
      initNotifications();
      loadStories();
      switchPage('feed');
      if(Notification.permission==='default') g('notif-perm-banner').style.display='flex';
    });
  }

  // ====== PAGE SWITCHING ======
  function switchPage(page) {
    currentPage = page;
    ['feed','people','chat'].forEach(function(p) {
      g('page-'+p).classList.toggle('active', p===page);
      g('ntab-'+p).classList.toggle('active', p===page);
    });
    if(page==='feed') {
      newPostCount=0; setBadge(g('badge-feed'),0);
      if(!feedLoaded) { feedLoaded=true; loadFeed(); }
    }
    if(page==='chat' && mob()) {
      g('chat-sidebar').classList.remove('hidden');
    }
  }
  window.switchPage = switchPage;

  // ====== AVATAR UPLOAD ======
  g('av-file-input').addEventListener('change', function(e) {
    var file = e.target.files[0]; if(!file) return;
    uploadFile(file).then(function(r) {
      myAvatarUrl = r.url;
      FB.updateDoc(FB.doc(FB.db,'users',me.uid),{avatarUrl:r.url});
      setAvEl(g('nav-av'), r.url, myName, me.uid);
      setAvEl(g('cp-av'), r.url, myName, me.uid);
    }).catch(function(e) { showErrorModal('Upload Failed', e.message); });
  });

  // ====== ALL USERS ======
  function loadAllUsers() {
    FB.onSnapshot(FB.query(FB.collection(FB.db,'users')), function(snap) {
      allUsers = [];
      snap.forEach(function(d) {
        var u=d.data();
        if(u.uid!==me.uid) allUsers.push(u);
      });
      renderPeople();
      renderSidebarDMs();
    });
  }

  // ====== PRESENCE ======
  function startPresenceHeartbeat() {
    function beat() { if(me) FB.setDoc(FB.doc(FB.db,'presence',me.uid),{online:true,lastSeen:FB.serverTimestamp(),uid:me.uid},{merge:true}); }
    beat();
    presenceInterval = setInterval(beat, 30000);
    window.addEventListener('beforeunload', function() {
      if(me) FB.setDoc(FB.doc(FB.db,'presence',me.uid),{online:false,lastSeen:FB.serverTimestamp(),uid:me.uid},{merge:true});
    });
  }
  function listenPresence(uid, cb) {
    return FB.onSnapshot(FB.doc(FB.db,'presence',uid), function(snap) {
      if(!snap.exists()) { cb(false); return; }
      var d=snap.data(), online=d.online===true;
      if(online && d.lastSeen) {
        var age=(Date.now()-d.lastSeen.toDate().getTime())/1000;
        if(age>90) online=false;
      }
      userPresenceMap[uid]=online; cb(online);
    });
  }

  // ====== PEOPLE PAGE ======
  function renderPeople() {
    var html='', q=(g('people-search').value||'').toLowerCase();
    allUsers.forEach(function(u) {
      if(q && !u.name.toLowerCase().includes(q) && !u.email.toLowerCase().includes(q)) return;
      var av = u.avatarUrl
        ? '<div class="person-av" style="background:url('+esc(u.avatarUrl)+') center/cover no-repeat"><div class="presence-dot'+(userPresenceMap[u.uid]?' online':'')+'"></div></div>'
        : '<div class="person-av" style="background:'+grad(u.uid)+'">'+esc(u.name[0].toUpperCase())+'<div class="presence-dot'+(userPresenceMap[u.uid]?' online':'')+'"></div></div>';
      html += '<div class="person-card">'+av+'<div class="person-name">'+esc(u.name)+'</div><div class="person-email">'+esc(u.email)+'</div><button class="msg-btn" onclick="switchPage(\'chat\');setTimeout(function(){openDM(\''+esc(u.uid)+'\',\''+esc(u.name)+'\')},80)">Message 💬</button></div>';

  // ====== FEED ======
  var postMediaFile = null, postMediaType = null;

  g('cp-ta').addEventListener('keydown', function(e) { if(e.ctrlKey&&e.key==='Enter') submitPost(); });

  function submitPost() {
    var text=g('cp-ta').value.trim();
    if(!text && !postMediaFile) return;
    var submit=g('cp-submit'); submit.disabled=true;
    var prog=g('cp-progress'), bar=g('cp-progress-bar');
    function doWrite(mediaUrl, mediaType, fileName) {
      FB.addDoc(FB.collection(FB.db,'posts'),{
        text:text, authorId:me.uid, authorName:myName, authorAvatar:myAvatarUrl,
        mediaUrl:mediaUrl||'', mediaType:mediaType||'', fileName:fileName||'',
        reactions:{}, commentCount:0, createdAt:FB.serverTimestamp()
      }).then(function() {
        g('cp-ta').value=''; clearPostMedia(); submit.disabled=false;
        prog.style.display='none'; bar.style.width='0%';
      });
    }
    if(postMediaFile) {
      prog.style.display='block';
      uploadFile(postMediaFile, function(p){ bar.style.width=(p*100)+'%'; }).then(function(r) {
        doWrite(r.url, postMediaType, postMediaFile.name);
      }).catch(function(e){ showErrorModal('Upload Failed',e.message); submit.disabled=false; prog.style.display='none'; });
    } else { doWrite(); }
  }
  window.submitPost = submitPost;

  function loadFeed() {
    if(postsUnsub) postsUnsub();
    postsUnsub = FB.onSnapshot(FB.query(FB.collection(FB.db,'posts'), FB.orderBy('createdAt','desc'), FB.limit(50)), function(snap) {

  function renderPostCard(p) {
    var avStyle = p.authorAvatar ? 'background:url('+esc(p.authorAvatar)+') center/cover no-repeat' : 'background:'+grad(p.authorId);
    var avText = p.authorAvatar ? '' : esc((p.authorName||'?')[0].toUpperCase());
    var media='';
    if(p.mediaUrl) {
      if(p.mediaType==='image') media='<div class="post-media"><img src="'+esc(p.mediaUrl)+'" onclick="openLightbox(\''+esc(p.mediaUrl)+'\')" alt=""></div>';
      else if(p.mediaType==='video') media='<div class="post-media"><video src="'+esc(p.mediaUrl)+'" controls></video></div>';
      else media='<div class="post-media"><a class="post-file-link" href="'+esc(p.mediaUrl)+'" target="_blank" download="'+esc(p.fileName||'file')+'">📎 '+esc(p.fileName||'Download file')+'</a></div>';
    }
    var reactions=p.reactions||{};
    var reactionHtml=['❤️','🔥','😂','😮','😢','👍'].map(function(emoji) {
      var arr=reactions[emoji]||[];
      var isActive=arr.includes(me.uid);
      var count=arr.length;
      var names=arr.map(function(uid){ var u=allUsers.find(function(x){return x.uid===uid;}); return u?u.name:(uid===me.uid?myName:'?'); }).join(', ');
      return '<button class="react-btn'+(isActive?' active':'')+'" onclick="reactPost(\''+esc(p.id)+'\',\''+emoji+'\')">'+emoji+(count>0?'<span class="react-count"> '+count+'</span>':'')+'<span class="react-tooltip">'+esc(names||'React')+'</span></button>';
    }).join('');
    var canDelete = p.authorId===me.uid || ADMIN_UIDS.includes(me.uid);
    var menuBtn = canDelete ? '<button class="post-menu-btn" onclick="showPostMenu(event,\''+esc(p.id)+'\')">⋯</button>' : '';
    return '<div class="post-card" id="post-'+esc(p.id)+'">'
      +'<div class="post-head"><div class="post-av" style="'+avStyle+'">'+avText+'</div><div class="post-meta"><div class="post-author">'+esc(p.authorName)+'</div><div class="post-time">'+timeAgo(p.createdAt)+'</div></div>'+menuBtn+'</div>'
      +(p.text?'<div class="post-text">'+esc(p.text)+'</div>':'')
      +media
      +'<div class="reactions-bar">'+reactionHtml+'</div>'
      +'<div class="post-footer"><button class="comment-toggle-btn" onclick="toggleComments(\''+esc(p.id)+'\')">💬 '+(p.commentCount||0)+' comments</button></div>'
      +'<div class="comments-section" id="comments-'+esc(p.id)+'" style="display:none"></div>'
      +'</div>';
  }

  function reactPost(pid, emoji) {
    var ref = FB.doc(FB.db,'posts',pid);
    FB.getDoc(ref).then(function(snap) {
      if(!snap.exists()) return;
      var reactions=snap.data().reactions||{};
      var arr=reactions[emoji]||[];
      var update={};
      if(arr.includes(me.uid)) {
        update['reactions.'+emoji]=FB.arrayRemove(me.uid);
      } else {
        update['reactions.'+emoji]=FB.arrayUnion(me.uid);
        var authorId=snap.data().authorId;
        if(authorId!==me.uid) createNotification(authorId,'reaction','reacted '+emoji+' to your post');
      }
      FB.updateDoc(ref,update);
    });
  }
  window.reactPost = reactPost;

      });

  window.submitComment = function(pid) {

  // ====== STORIES ======
  function loadStories() {
    if(storiesUnsub) storiesUnsub();
    storiesUnsub = FB.onSnapshot(FB.query(FB.collection(FB.db,'stories'),FB.orderBy('createdAt','desc')), function(snap) {
      var stories=[]; var cutoff=Date.now()-86400000;
      snap.forEach(function(d){ var s=d.data(); s.id=d.id; var ts=s.createdAt&&s.createdAt.toDate?s.createdAt.toDate().getTime():0; if(ts>cutoff) stories.push(s); });
      renderStoriesBar(stories);
    });
  }
  function renderStoriesBar(stories) {
    var myStory=stories.find(function(s){return s.authorId===me.uid;});
    var seenIds=JSON.parse(localStorage.getItem('seenStories')||'[]');
    var html='<div class="story-bubble" onclick="openStoryCreate()"><div class="story-ring add-story"><div class="story-av">+</div></div><div class="story-name">Your story</div></div>';
    if(myStory) { html+=storyBubbleHtml(myStory, true); }
    stories.filter(function(s){return s.authorId!==me.uid;}).forEach(function(s){ html+=storyBubbleHtml(s, seenIds.includes(s.id)); });
    g('stories-row').innerHTML=html;
  }
  function storyBubbleHtml(s, seen) {
    var avStyle=s.authorAvatar?'background:url('+esc(s.authorAvatar)+') center/cover no-repeat':'background:'+esc(s.authorGrad||grad(s.authorId));
    var avText=s.authorAvatar?'':esc((s.authorName||'?')[0].toUpperCase());
    return '<div class="story-bubble" onclick="openStoryViewer(\''+esc(s.authorId)+'\')"><div class="story-ring'+(seen?' seen':'')+'"><div class="story-av" style="'+avStyle+'">'+avText+'</div></div><div class="story-name">'+esc(s.authorName)+'</div></div>';
  }
  function openStoryCreate() { openOverlay('story-create-modal'); scmFile=null; g('scm-prev-img').style.display='none'; g('scm-prev-vid').style.display='none'; g('scm-placeholder').style.display='flex'; g('scm-caption').value=''; }
  window.openStoryCreate = openStoryCreate;
  g('scm-file-input').addEventListener('change', function(e) {
    var file=e.target.files[0]; if(!file) return; scmFile=file;
    g('scm-placeholder').style.display='none';
    if(file.type.startsWith('image/')) { g('scm-prev-img').src=URL.createObjectURL(file); g('scm-prev-img').style.display='block'; g('scm-prev-vid').style.display='none'; }
    else { g('scm-prev-vid').src=URL.createObjectURL(file); g('scm-prev-vid').style.display='block'; g('scm-prev-img').style.display='none'; }
  });
  window.shareStory = function() {
    if(!scmFile) { showErrorModal('No media','Please pick a photo or video'); return; }
    uploadFile(scmFile).then(function(r) {
      return FB.addDoc(FB.collection(FB.db,'stories'),{
        authorId:me.uid, authorName:myName, authorGrad:myGrad, authorAvatar:myAvatarUrl,
        caption:g('scm-caption').value.trim(), mediaUrl:r.url,
        mediaType:scmFile.type.startsWith('image/')?'image':'video', createdAt:FB.serverTimestamp()
      });
    }).then(function() { closeOverlay('story-create-modal'); showToast({icon:'✨',fromName:'You',body:'Story shared! ✨'}); }).catch(function(e){showErrorModal('Failed',e.message);});
  };
  function openStoryViewer(authorId) {
    FB.getDocs(FB.query(FB.collection(FB.db,'stories'),FB.orderBy('createdAt','desc'))).then(function(snap) {
      var stories=[]; var cutoff=Date.now()-86400000;
      snap.forEach(function(d){ var s=d.data(); s.id=d.id; var ts=s.createdAt&&s.createdAt.toDate?s.createdAt.toDate().getTime():0; if(ts>cutoff&&s.authorId===authorId) stories.push(s); });
      if(!stories.length) return;
      storyCurrentList=stories; storyCurrentIdx=0;
      openOverlay('story-viewer'); renderStorySlide();
      // mark seen
      var seenIds=JSON.parse(localStorage.getItem('seenStories')||'[]');
      stories.forEach(function(s){if(!seenIds.includes(s.id))seenIds.push(s.id);});
      localStorage.setItem('seenStories',JSON.stringify(seenIds));
    });
  }
  window.openStoryViewer = openStoryViewer;
  function renderStorySlide() {
    var s=storyCurrentList[storyCurrentIdx]; if(!s) { closeStoryViewer(); return; }
    var bar=g('sv-progress-bar'); bar.innerHTML='';
    storyCurrentList.forEach(function(_,i) {
      var seg=document.createElement('div'); seg.className='sv-seg';
      var fill=document.createElement('div'); fill.className='sv-seg-fill'; seg.appendChild(fill); bar.appendChild(seg);
    });
    var avEl=g('sv-av'); setAvEl(avEl, s.authorAvatar, s.authorName, s.authorId);
    g('sv-uname').textContent=s.authorName; g('sv-time').textContent=timeAgo(s.createdAt);
    g('sv-text').textContent=s.caption||'';
    if(s.mediaType==='video') { g('sv-vid').src=s.mediaUrl; g('sv-vid').style.display='block'; g('sv-img').style.display='none'; }
    else { g('sv-img').src=s.mediaUrl; g('sv-img').style.display='block'; g('sv-vid').style.display='none'; }
    if(storyTimer) clearInterval(storyTimer);
    var dur=s.mediaType==='video'?15000:5000, start=Date.now();
    var fill=bar.children[storyCurrentIdx]&&bar.children[storyCurrentIdx].querySelector('.sv-seg-fill');
    storyTimer=setInterval(function() { var p=Math.min(1,(Date.now()-start)/dur); if(fill)fill.style.width=(p*100)+'%'; if(p>=1){clearInterval(storyTimer);svNav(1);} },60);
  }
  window.svNav = function(dir) {
    if(storyTimer) clearInterval(storyTimer);
    storyCurrentIdx+=dir;
    if(storyCurrentIdx<0) storyCurrentIdx=0;
    if(storyCurrentIdx>=storyCurrentList.length) { closeStoryViewer(); return; }
    renderStorySlide();
  };

  // ====== NOTIFICATIONS ======
  function initNotifications() {

      notifList=[]; snap.forEach(function(d){notifList.push({id:d.id,...d.data()});});

      notifList.forEach(function(n) {
        if(!knownNotifIds.has(n.id)&&!n.read) { knownNotifIds.add(n.id); showToast(n); fireBrowserNotif(n.fromName,n.body); }
      });
