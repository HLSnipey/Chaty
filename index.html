  window.openDM = openDM;

  function openGroup(gid, name, members) {
    currentPeerId=null; currentPeerName=name; chatIsGroup=true;
    chatWith=gid; chatWithName=name;
    openChatRoom(gid, name, null, true);
  }
  window.openGroup = openGroup;

  function openChatRoom(roomId, name, peerUid, isGroup) {
    chatWith=roomId; chatWithName=name;
    if(mob()) { g('chat-sidebar').classList.add('hidden'); }
    g('chat-empty').style.display='none';
    g('chat-active').classList.add('open');
    // header
    var u = peerUid && allUsers.find(function(x){return x.uid===peerUid;});
    setAvEl(g('ch-av'), u&&u.avatarUrl||'', name, peerUid||roomId);
    g('ch-name').textContent = name;
    if(peerUid) {
      if(currentPresenceUnsub) currentPresenceUnsub();
      currentPresenceUnsub = listenPresence(peerUid, function(online) {
        g('ch-online-dot').className=''; g('ch-online-dot').classList.toggle('online',online);
        g('ch-online-text').textContent=online?'Online':'Offline';
      });
      g('ch-online-dot').style.display=''; g('ch-online-text').style.display='';
    } else {
      g('ch-online-dot').style.display='none'; g('ch-online-text').style.display='none';
    }
    if(chatUnsubFn) chatUnsubFn();
    chatUnsubFn = FB.onSnapshot(FB.query(FB.collection(FB.db,'chats',roomId,'messages'),FB.orderBy('createdAt','asc')), function(snap) {
      var msgs=[]; snap.forEach(function(d){msgs.push({id:d.id,...d.data()});});
      renderMessages(msgs, isGroup);
    });
    markRoomRead(roomId);
    renderSidebarDMs();
    var badgeEl=g('badge-room-'+roomId); if(badgeEl) { badgeEl.textContent='0'; badgeEl.classList.remove('show'); }
  }

  function closeChatMobile() {
    g('chat-sidebar').classList.remove('hidden');
    g('chat-active').classList.remove('open');
    g('chat-empty').style.display='flex';
  }
  window.closeChatMobile = closeChatMobile;

  // ====== MESSAGES ======
  function renderMessages(msgs, isGroup) {
    var area=g('msgs-area'); var wasBottom=area.scrollHeight-area.scrollTop-area.clientHeight<60;
    area.innerHTML = msgs.map(function(m) { return renderMsgRow(m, isGroup); }).join('');
    if(wasBottom || msgs[msgs.length-1]&&msgs[msgs.length-1].from===me.uid) area.scrollTop=area.scrollHeight;
  }

  function renderMsgRow(m, isGroup) {
    var own=m.from===me.uid;
    var u=!own&&allUsers.find(function(x){return x.uid===m.from;});
    var avStyle=own?(myAvatarUrl?'background:url('+myAvatarUrl+') center/cover no-repeat':'background:'+myGrad):(u&&u.avatarUrl?'background:url('+esc(u.avatarUrl)+') center/cover no-repeat':'background:'+grad(m.from));
    var avText=own?(myAvatarUrl?'':myName[0].toUpperCase()):(u&&u.avatarUrl?'':(u?u.name[0].toUpperCase():'?'));
    var content='';
    if(m.type==='image') content='<img src="'+esc(m.url)+'" onclick="openLightbox(\''+esc(m.url)+'\')" alt="">';
    else if(m.type==='video') content='<video src="'+esc(m.url)+'" controls></video>';
    else if(m.type==='audio') content='<div style="display:flex;align-items:center;gap:6px">🎙️<audio src="'+esc(m.url)+'" controls></audio></div>';
    else if(m.type==='file') content='<a class="msg-file-link" href="'+esc(m.url)+'" target="_blank" download="'+esc(m.fileName||'file')+'">📎 '+esc(m.fileName||'Download')+'</a>';
    else content=esc(m.text||'');
    // reactions
    var reactions=m.reactions||{};
    var reactionStrip=Object.keys(reactions).filter(function(e){return reactions[e]&&reactions[e].length;}).map(function(e) {
      var arr=reactions[e];
      var names=arr.map(function(uid){ var u2=allUsers.find(function(x){return x.uid===uid;}); return u2?u2.name:(uid===me.uid?myName:'?'); }).join(', ');
      return '<span class="msg-react-pill" onclick="reactMsg(\''+esc(chatWith)+'\',\''+esc(m.id)+'\',\''+e+'\')">'+e+' '+arr.length+'<span class="react-tooltip">'+esc(names)+'</span></span>';
    }).join('');
    var canDel=m.from===me.uid||ADMIN_UIDS.includes(me.uid);
    var menuBtn=canDel?'<button class="msg-menu-btn" onclick="showMsgMenu(event,\''+esc(chatWith)+'\',\''+esc(m.id)+'\')">⋯</button>':'';
    var senderLabel=isGroup&&!own&&m.senderName?'<div class="msg-sender">'+esc(m.senderName)+'</div>':'';
    return '<div class="msg-row '+(own?'own':'other')+'" id="msg-'+esc(m.id)+'" oncontextmenu="showMsgEmojiPicker(event,\''+esc(chatWith)+'\',\''+esc(m.id)+'\')">'
      +(!own?'<div class="msg-av-small" style="'+avStyle+'">'+avText+'</div>':'')
      +'<div class="msg-body">'
        +senderLabel
        +'<div class="msg-bubble">'+content+'</div>'
        +(reactionStrip?'<div class="msg-reaction-strip">'+reactionStrip+'</div>':'')
      +'</div>'
      +menuBtn
      +(own?'<div class="msg-av-small" style="'+avStyle+'">'+avText+'</div>':'')
      +'</div>';
  }

  window.showMsgMenu = function(e, roomId, mid) {
    showOverflowMenu(e.currentTarget, [{label:'🗑️ Delete', danger:true, action:function(){ FB.deleteDoc(FB.doc(FB.db,'chats',roomId,'messages',mid)); }}]);
  };

  // long-press emoji picker
  var lpTimer=null;
  document.addEventListener('touchstart',function(e){
    var bubble=e.target.closest('.msg-bubble'); if(!bubble) return;
    var row=bubble.closest('.msg-row'); if(!row) return;
    var parts=row.id.replace('msg-','').split('');
    lpTimer=setTimeout(function(){ showMsgEmojiPickerFromEl(e.touches[0].clientX, e.touches[0].clientY, chatWith, row.id.replace('msg-','')); },500);
  },{passive:true});
  document.addEventListener('touchend',function(){if(lpTimer){clearTimeout(lpTimer);lpTimer=null;}});

  window.showMsgEmojiPicker = function(e, roomId, mid) { e.preventDefault(); showMsgEmojiPickerFromEl(e.clientX,e.clientY,roomId,mid); };
  function showMsgEmojiPickerFromEl(x,y,roomId,mid) {
    var old=document.querySelector('.msg-emoji-picker'); if(old) old.remove();
    var picker=document.createElement('div'); picker.className='msg-emoji-picker';
    ['❤️','🔥','😂','😮','😢','👍','🎉','💯'].forEach(function(e) {
      var btn=document.createElement('button'); btn.className='msg-emoji-btn'; btn.textContent=e;
      btn.onclick=function(){reactMsg(roomId,mid,e);picker.remove();};
      picker.appendChild(btn);
    });
    picker.style.top=Math.min(y,window.innerHeight-60)+'px'; picker.style.left=Math.min(x,window.innerWidth-300)+'px';
    document.body.appendChild(picker);
    setTimeout(function(){ document.addEventListener('click',function d(){picker.remove();document.removeEventListener('click',d);},{once:true}); },0);
  }
  window.reactMsg = function(roomId, mid, emoji) {
    var ref=FB.doc(FB.db,'chats',roomId,'messages',mid);
    FB.getDoc(ref).then(function(snap){ if(!snap.exists())return; var arr=(snap.data().reactions||{})[emoji]||[]; var upd={}; upd['reactions.'+emoji]=arr.includes(me.uid)?FB.arrayRemove(me.uid):FB.arrayUnion(me.uid); FB.updateDoc(ref,upd); });
  };

  // ====== SEND MESSAGE ======
  g('chat-ta').addEventListener('keydown', function(e) { if(e.key==='Enter'&&!e.shiftKey){ e.preventDefault(); sendChatMsg(); } });
  g('chat-ta').addEventListener('input', function() { this.style.height='auto'; this.style.height=Math.min(this.scrollHeight,100)+'px'; });
  g('chat-file-input').addEventListener('change', function(e) {
    var file=e.target.files[0]; if(!file||!chatWith) return;
    chatFilePending=file; g('cup').style.display='block';
    if(file.type.startsWith('image/')) { g('cup-thumb').src=URL.createObjectURL(file); g('cup-thumb').style.display='block'; }
    else g('cup-thumb').style.display='none';
    g('cup-name').textContent=file.name;
  });
  function clearChatFile() { chatFilePending=null; g('cup').style.display='none'; g('cup-thumb').src=''; g('chat-file-input').value=''; }
  window.clearChatFile = clearChatFile;

  function sendChatMsg() {
    if(!chatWith) return;
    var text=g('chat-ta').value.trim();
    if(!text&&!chatFilePending) return;
    var ta=g('chat-ta'); ta.value=''; ta.style.height='auto';
    if(chatFilePending) {
      var file=chatFilePending; clearChatFile();
      uploadFile(file).then(function(r) {
        var type=file.type.startsWith('image/')?'image':(file.type.startsWith('video/')?'video':'file');
        writeMsg({type:type,url:r.url,fileName:file.name,text:''});
      }).catch(function(e){showErrorModal('Upload Failed',e.message);});
    } else {
      writeMsg({type:'text',text:text});
    }
  }
  window.sendChatMsg = sendChatMsg;

  function writeMsg(data) {
    var msg=Object.assign({from:me.uid,read:false,reactions:{},createdAt:FB.serverTimestamp()},data);
    if(chatIsGroup) msg.senderName=myName;
    FB.addDoc(FB.collection(FB.db,'chats',chatWith,'messages'),msg);
    // Notification for DM
    if(!chatIsGroup&&currentPeerId) createNotification(currentPeerId,'message',(data.text||'').substring(0,60)||(data.type==='image'?'Sent an image':'Sent a file'));
  }

  // ====== UNREAD ======
  function listenUnreadForRoom(roomId) {
    if(unreadUnsubs[roomId]) return;
    unreadUnsubs[roomId] = FB.onSnapshot(FB.query(FB.collection(FB.db,'chats',roomId,'messages'),FB.where('read','==',false)), function(snap) {
      var count=0; snap.forEach(function(d){if(d.data().from!==me.uid)count++;});
      unreadCounts[roomId]=count; totalUnread=Object.values(unreadCounts).reduce(function(a,b){return a+b;},0);
      setBadge(g('badge-chat'),totalUnread);
      var el=g('badge-room-'+roomId); if(el){el.textContent=count;count>0?el.classList.add('show'):el.classList.remove('show');}
    });
  }
  function markRoomRead(roomId) {
    FB.getDocs(FB.query(FB.collection(FB.db,'chats',roomId,'messages'),FB.where('read','==',false))).then(function(snap) {
      snap.forEach(function(d){ if(d.data().from!==me.uid) FB.updateDoc(d.ref,{read:true}); });
    });
    unreadCounts[roomId]=0; totalUnread=Object.values(unreadCounts).reduce(function(a,b){return a+b;},0);
    setBadge(g('badge-chat'),totalUnread);
  }

  // ====== VOICE RECORDING ======
  function toggleVoiceRecording() {
    if(isRecording) { stopRecording(); } else { startRecording(); }
  }
  window.toggleVoiceRecording = toggleVoiceRecording;
  function startRecording() {
    navigator.mediaDevices.getUserMedia({audio:true}).then(function(stream) {
      audioChunks=[]; mediaRecorder=new MediaRecorder(stream);
      mediaRecorder.ondataavailable=function(e){audioChunks.push(e.data);};
      mediaRecorder.onstop=function() {
        var blob=new Blob(audioChunks,{type:'audio/webm'});
        uploadFile(blob).then(function(r){ writeMsg({type:'audio',url:r.url,text:''}); }).catch(function(e){showErrorModal('Upload Failed',e.message);});
        stream.getTracks().forEach(function(t){t.stop();});
      };
      mediaRecorder.start(); isRecording=true;
      g('chat-mic-btn').classList.add('recording'); g('chat-mic-btn').textContent='⏹';
    }).catch(function(e){showErrorModal('Microphone',e.message);});
  }
  function stopRecording() { if(mediaRecorder&&isRecording){mediaRecorder.stop();isRecording=false;g('chat-mic-btn').classList.remove('recording');g('chat-mic-btn').textContent='🎙️';} }

  // ====== CALLS ======
  var STUN={iceServers:[{urls:'stun:stun.l.google.com:19302'},{urls:'stun:stun1.l.google.com:19302'}]};
  function startCall(isVideo) {
    if(!currentPeerId) { showErrorModal('Calls','Calls are only available in direct messages'); return; }
    callIsVideo=isVideo; isCaller=true;
    callRoomId='call_'+[me.uid,currentPeerId].sort().join('_');
    seenCandidates={};
    navigator.mediaDevices.getUserMedia({audio:true,video:isVideo}).then(function(stream) {
      localStream=stream; setupCallOverlay(currentPeerName,false,isVideo);
      pc=new RTCPeerConnection(STUN);
      stream.getTracks().forEach(function(t){pc.addTrack(t,stream);});
      pc.onicecandidate=function(e){ if(e.candidate) FB.updateDoc(FB.doc(FB.db,'calls',callRoomId),{callerCandidates:FB.arrayUnion(JSON.stringify(e.candidate.toJSON()))}); };
      pc.ontrack=function(e){ g('call-remote-video').srcObject=e.streams[0]; };
      pc.createOffer().then(function(offer){ return pc.setLocalDescription(offer).then(function(){ return FB.setDoc(FB.doc(FB.db,'calls',callRoomId),{offer:{type:offer.type,sdp:offer.sdp},callerId:me.uid,callerName:myName,calleeId:currentPeerId,isVideo:isVideo,status:'ringing',callerCandidates:[],calleeCandidates:[],createdAt:FB.serverTimestamp()}); }); });
      callUnsub=FB.onSnapshot(FB.doc(FB.db,'calls',callRoomId),function(snap){ if(!snap.exists())return; var d=snap.data();
        if(d.status==='answered'&&d.answer&&!pc.remoteDescription){
          pc.setRemoteDescription(new RTCSessionDescription(d.answer)).then(function(){ g('call-status').textContent='Connected 🌸'; });
        }
        if(d.status==='ended') hangUp();
        (d.calleeCandidates||[]).forEach(function(c){ if(!seenCandidates[c]){seenCandidates[c]=true;try{pc.addIceCandidate(new RTCIceCandidate(JSON.parse(c)));}catch(e){}} });
      });
    }).catch(function(e){showErrorModal('Camera/Mic',e.message);});
  }
  window.startCall = startCall;

  function listenIncomingCalls() {
    FB.onSnapshot(FB.query(FB.collection(FB.db,'calls'),FB.where('calleeId','==',me.uid),FB.where('status','==','ringing')), function(snap) {
      snap.forEach(function(d) {
        var call=d.data(); call.id=d.id;
        var age=call.createdAt&&call.createdAt.toDate?(Date.now()-call.createdAt.toDate().getTime())/1000:999;
        if(age>60||pc) return;
        callRoomId=d.id; callIsVideo=call.isVideo; isCaller=false;
        setupCallOverlay(call.callerName,true,call.isVideo);
        showToast({icon:'📞',fromName:call.callerName,body:'is calling...'});
        fireBrowserNotif(call.callerName, 'is calling you...');
      });
    });
  }
  function acceptCall() {
    seenCallees={};
    navigator.mediaDevices.getUserMedia({audio:true,video:callIsVideo}).then(function(stream) {
      localStream=stream; g('call-accept').style.display='none';
      pc=new RTCPeerConnection(STUN);
      stream.getTracks().forEach(function(t){pc.addTrack(t,stream);});
      pc.onicecandidate=function(e){ if(e.candidate) FB.updateDoc(FB.doc(FB.db,'calls',callRoomId),{calleeCandidates:FB.arrayUnion(JSON.stringify(e.candidate.toJSON()))}); };
      pc.ontrack=function(e){ g('call-remote-video').srcObject=e.streams[0]; };
      FB.getDoc(FB.doc(FB.db,'calls',callRoomId)).then(function(snap) {
        var offer=snap.data().offer;
        pc.setRemoteDescription(new RTCSessionDescription(offer)).then(function(){ return pc.createAnswer(); }).then(function(answer){ return pc.setLocalDescription(answer).then(function(){ return FB.updateDoc(FB.doc(FB.db,'calls',callRoomId),{answer:{type:answer.type,sdp:answer.sdp},status:'answered'}); }); });
        callUnsub=FB.onSnapshot(FB.doc(FB.db,'calls',callRoomId),function(s){ if(!s.exists())return; var d=s.data();
          if(d.status==='ended') hangUp();
          (d.callerCandidates||[]).forEach(function(c){ if(!seenCallees[c]){seenCallees[c]=true;try{pc.addIceCandidate(new RTCIceCandidate(JSON.parse(c)));}catch(e){}} });
        });
        g('call-status').textContent='Connected 🌸';
      });
    }).catch(function(e){showErrorModal('Camera/Mic',e.message);});
  }
  window.acceptCall = acceptCall;

  function hangUp() {
    if(callRoomId) FB.updateDoc(FB.doc(FB.db,'calls',callRoomId),{status:'ended'}).catch(function(){});
    if(callUnsub){callUnsub();callUnsub=null;}
    if(pc){pc.close();pc=null;}
    if(localStream) localStream.getTracks().forEach(function(t){t.stop();}); localStream=null;
    closeOverlay('call-overlay');
    g('call-accept').style.display='none';
    g('call-remote-video').srcObject=null; g('call-local-video').srcObject=null;
    g('call-remote-video').style.display='none'; g('call-local-video').style.display='none';
  }
  window.hangUp = hangUp;

  function setupCallOverlay(peerName, incoming, isVideo) {
    var u=allUsers.find(function(x){return x.name===peerName||x.uid===currentPeerId;});
    setAvEl(g('call-peer-av'), u&&u.avatarUrl||'', peerName, u&&u.uid||'');
    g('call-peer-name').textContent=peerName;
    g('call-status').textContent=incoming?'Incoming call... 🌸':'Calling...';
    if(incoming) g('call-accept').style.display='flex'; else g('call-accept').style.display='none';
    if(isVideo){ g('call-cam').style.display='flex'; if(localStream){ g('call-local-video').srcObject=localStream; g('call-local-video').style.display='block'; } g('call-remote-video').style.display='block'; } else { g('call-cam').style.display='none'; }
    openOverlay('call-overlay');
  }
  window.toggleMute = function() { isMuted=!isMuted; if(localStream) localStream.getAudioTracks().forEach(function(t){t.enabled=!isMuted;}); g('call-mute').classList.toggle('active',isMuted); g('call-mute').textContent=isMuted?'🔇':'🎙️'; };
  window.toggleCam = function() { isCamOff=!isCamOff; if(localStream) localStream.getVideoTracks().forEach(function(t){t.enabled=!isCamOff;}); g('call-cam').classList.toggle('active',isCamOff); g('call-cam').textContent=isCamOff?'📵':'📹'; };

  // ====== WIRE ======
  function wire() {
    FB.onAuthStateChanged(FB.auth, function(user) {
      if(user) { me=user; enterApp(); }
      else { g('auth-screen').style.display='flex'; g('app').style.display='none'; me=null; allUsers=[]; }
    });
  }

  document.addEventListener('fb-ready', function() { FB=window.__FB; wire(); });
})();
</script>
