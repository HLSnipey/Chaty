<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Chaty</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800;900&family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged, updateProfile } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, collection, doc, setDoc, getDoc, getDocs, addDoc, query, orderBy, onSnapshot, updateDoc, arrayUnion, arrayRemove, serverTimestamp, where, limit, deleteDoc, increment } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey:            "AIzaSyD3y9wwCpc8VZVZb4F1LeKpGcrju348Epo",
  authDomain:        "chaty-3e854.firebaseapp.com",
  projectId:         "chaty-3e854",
  storageBucket:     "chaty-3e854.firebasestorage.app",
  messagingSenderId: "184662030881",
  appId:             "1:184662030881:web:56fc9a890e018272774160"
};

const app  = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db   = getFirestore(app);
window.__FB = { auth, db, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged, updateProfile, collection, doc, setDoc, getDoc, getDocs, addDoc, query, orderBy, onSnapshot, updateDoc, arrayUnion, arrayRemove, serverTimestamp, where, limit, deleteDoc, increment };
setTimeout(function(){ document.dispatchEvent(new Event('fb-ready')); }, 0);
</script>

<style>
/* ══ DESIGN TOKENS — Light & Colorful ═══════════════ */
:root {
  --pink:#ff3d8b; --orange:#ff7b3a; --yellow:#ffcc00;
  --cyan:#00c2d4; --green:#12d980; --purple:#8b5cf6; --red:#ff4757;
  --lime:#a8e063; --peach:#ffb347; --sky:#38bdf8;

  --bg:#f5f3ff;
  --s1:#ffffff;
  --s2:#f0edff;
  --s3:#e8e4ff;
  --border:#ddd9f5;
  --text:#1a1535;
  --muted:#8b85b0;
  --shadow:0 2px 16px rgba(100,80,200,.10);
  --shadow-lg:0 8px 40px rgba(100,80,200,.16);

  --grad-main:linear-gradient(135deg,var(--pink),var(--orange));
  --grad-cool:linear-gradient(135deg,var(--cyan),var(--purple));
  --grad-fire:linear-gradient(135deg,var(--red),var(--pink),var(--orange));
  --grad-green:linear-gradient(135deg,var(--green),var(--cyan));
  --grad-sunny:linear-gradient(135deg,var(--yellow),var(--orange));
  --grad-sky:linear-gradient(135deg,var(--sky),var(--cyan));
  --grad-lime:linear-gradient(135deg,var(--lime),var(--green));
}

*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--text)}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:var(--s2);border-radius:4px}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
.hidden{display:none!important}
.spin{width:22px;height:22px;border:2.5px solid var(--border);border-top-color:var(--pink);border-radius:50%;animation:rot .7s linear infinite;margin:24px auto}
@keyframes rot{to{transform:rotate(360deg)}}
.grad-text{background:var(--grad-fire);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}

/* ══ AUTH ════════════════════════════════════════════ */
#auth-screen{
  height:100%;display:flex;align-items:center;justify-content:center;padding:20px;
  background:
    radial-gradient(ellipse at 15% 20%,rgba(255,61,139,.18) 0%,transparent 55%),
    radial-gradient(ellipse at 85% 75%,rgba(56,189,248,.18) 0%,transparent 55%),
    radial-gradient(ellipse at 50% 50%,rgba(139,92,246,.10) 0%,transparent 60%),
    var(--bg);
}
.auth-wrap{width:100%;max-width:420px}
.auth-logo{
  font-family:'Syne',sans-serif;font-weight:900;font-size:3.2rem;
  background:var(--grad-fire);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  text-align:center;margin-bottom:4px;display:block;letter-spacing:-1px;
}
.auth-tagline{text-align:center;color:var(--muted);font-size:.85rem;margin-bottom:28px;font-weight:500}
.auth-card{
  background:var(--s1);border:1.5px solid var(--border);border-radius:28px;
  padding:32px 28px;position:relative;overflow:hidden;
  box-shadow:var(--shadow-lg);
}
.auth-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--grad-fire)}
.tabs{display:flex;gap:4px;background:var(--s2);border-radius:14px;padding:4px;margin-bottom:22px;border:1.5px solid var(--border)}
.tab-btn{
  flex:1;padding:9px;border:none;border-radius:11px;background:transparent;color:var(--muted);
  font-family:'Plus Jakarta Sans',sans-serif;font-size:.88rem;cursor:pointer;transition:all .2s;font-weight:500;
}
.tab-btn.active{background:var(--grad-main);color:#fff;font-weight:700;box-shadow:0 2px 12px rgba(255,61,139,.3)}
.field{margin-bottom:13px}
.field label{display:block;font-size:.72rem;color:var(--muted);margin-bottom:5px;text-transform:uppercase;letter-spacing:.06em;font-weight:600}
.field input{
  width:100%;padding:12px 15px;background:var(--s2);border:1.5px solid var(--border);border-radius:14px;
  color:var(--text);font-family:'Plus Jakarta Sans',sans-serif;font-size:.95rem;outline:none;
  transition:border-color .2s,box-shadow .2s;-webkit-appearance:none;
}
.field input:focus{border-color:var(--pink);box-shadow:0 0 0 3px rgba(255,61,139,.12)}
.auth-btn{
  width:100%;padding:14px;border:none;border-radius:14px;margin-top:6px;background:var(--grad-fire);
  color:#fff;font-family:'Syne',sans-serif;font-weight:800;font-size:1rem;cursor:pointer;
  transition:opacity .2s,transform .1s,box-shadow .2s;
  box-shadow:0 4px 18px rgba(255,61,139,.35);
}
.auth-btn:hover{opacity:.9;box-shadow:0 6px 24px rgba(255,61,139,.45)}
.auth-btn:active{transform:scale(.98)}
.a-err{color:var(--red);font-size:.8rem;margin-top:10px;display:none;font-weight:500}
.a-ok{color:var(--green);font-size:.8rem;margin-top:10px;display:none;font-weight:500}

/* ══ APP SHELL ═══════════════════════════════════════ */
#app{display:none;height:100%;flex-direction:column}
#app.on{display:flex}

/* TOP NAV */
.topnav{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 18px;background:var(--s1);
  border-bottom:1.5px solid var(--border);flex-shrink:0;z-index:100;gap:12px;
  box-shadow:0 2px 12px rgba(100,80,200,.07);
}
.nav-logo{font-family:'Syne',sans-serif;font-weight:900;font-size:1.5rem;letter-spacing:-0.5px}
.nav-tabs{display:flex;gap:3px;background:var(--s2);border-radius:14px;padding:4px;flex:1;max-width:320px;border:1.5px solid var(--border)}
.nav-tab{
  flex:1;padding:7px 8px;border:none;border-radius:11px;background:transparent;color:var(--muted);
  cursor:pointer;font-size:.78rem;font-family:'Plus Jakarta Sans',sans-serif;font-weight:500;
  transition:all .2s;display:flex;align-items:center;justify-content:center;gap:4px;
  white-space:nowrap;position:relative;
}
.nav-tab.active{background:var(--grad-main);color:#fff;font-weight:700;box-shadow:0 2px 10px rgba(255,61,139,.25)}
.nav-tab svg{width:13px;height:13px;fill:none;stroke:currentColor;stroke-width:2.2}

/* ── Badge — fully explicit style, no display:none toggle ── */
.nav-badge{
  position:absolute;top:-3px;right:-3px;
  min-width:18px;height:18px;border-radius:9px;
  background:var(--red);color:#fff;font-size:.6rem;font-weight:800;
  align-items:center;justify-content:center;padding:0 4px;line-height:1;
  border:2px solid var(--s1);
  /* Always rendered in DOM; visibility controlled by JS via style.display */
  display:none;
}

.nav-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
.nav-av{
  width:34px;height:34px;border-radius:12px;flex-shrink:0;display:flex;align-items:center;
  justify-content:center;font-family:'Syne',sans-serif;font-weight:800;font-size:.85rem;
  color:#fff;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.12);
}
.btn-out{
  padding:6px 13px;border:1.5px solid var(--border);border-radius:10px;background:var(--s2);
  color:var(--muted);cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;font-size:.75rem;
  font-weight:600;transition:all .2s;
}
.btn-out:hover{border-color:var(--pink);color:var(--pink);background:#fff5f8}

.main{flex:1;overflow:hidden;display:flex}

/* ══ FEED ════════════════════════════════════════════ */
#page-feed{flex:1;overflow-y:auto;padding:20px;flex-direction:column;align-items:center;gap:16px}
.feed-inner{width:100%;max-width:600px;display:flex;flex-direction:column;gap:16px}

.create-post{
  background:var(--s1);border:1.5px solid var(--border);border-radius:22px;
  padding:18px;position:relative;overflow:hidden;
  box-shadow:var(--shadow);
}
.create-post::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--grad-main)}
.cp-top{display:flex;gap:12px;align-items:flex-start}
.cp-av{
  width:40px;height:40px;border-radius:12px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-family:'Syne',sans-serif;font-weight:800;font-size:.9rem;color:#fff;
}
.cp-ta{
  flex:1;background:var(--s2);border:1.5px solid var(--border);border-radius:14px;
  padding:10px 14px;color:var(--text);font-family:'Plus Jakarta Sans',sans-serif;
  font-size:.9rem;outline:none;resize:none;min-height:60px;max-height:200px;
  transition:border-color .2s,box-shadow .2s;line-height:1.5;
}
.cp-ta:focus{border-color:var(--pink);box-shadow:0 0 0 3px rgba(255,61,139,.1)}
.cp-ta::placeholder{color:var(--muted)}
.cp-preview{margin-top:10px;display:none;position:relative}
.cp-preview img,.cp-preview video{width:100%;max-height:280px;object-fit:cover;border-radius:14px;display:block}
.cp-preview-rm{
  position:absolute;top:8px;right:8px;width:28px;height:28px;border-radius:50%;
  background:rgba(0,0,0,.55);border:none;color:#fff;cursor:pointer;font-size:.95rem;
  display:flex;align-items:center;justify-content:center;
}
.cp-progress{margin-top:10px;display:none}
.cp-progress-bar{height:4px;background:var(--s3);border-radius:4px;overflow:hidden}
.cp-progress-fill{height:100%;background:var(--grad-main);border-radius:4px;width:0%;transition:width .3s}
.cp-actions{display:flex;align-items:center;justify-content:space-between;margin-top:12px}
.cp-media-btns{display:flex;gap:5px;flex-wrap:wrap}
.cp-media-btn{
  display:flex;align-items:center;gap:4px;padding:6px 11px;border-radius:10px;
  border:1.5px solid var(--border);background:var(--s2);color:var(--muted);
  cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;font-size:.75rem;
  font-weight:500;transition:all .2s;
}
.cp-media-btn:hover{background:var(--s3);color:var(--text);border-color:var(--purple)}
.cp-media-btn svg{width:13px;height:13px;fill:none;stroke:currentColor;stroke-width:2}
.cp-submit{
  padding:8px 20px;border:none;border-radius:11px;background:var(--grad-main);color:#fff;
  font-family:'Syne',sans-serif;font-weight:800;font-size:.85rem;cursor:pointer;
  transition:opacity .2s,box-shadow .2s;box-shadow:0 3px 12px rgba(255,61,139,.3);
}
.cp-submit:hover{opacity:.88;box-shadow:0 4px 18px rgba(255,61,139,.4)}

/* post card */
.post-card{
  background:var(--s1);border:1.5px solid var(--border);border-radius:22px;
  overflow:hidden;animation:slideIn .25s ease;
  box-shadow:var(--shadow);
}
@keyframes slideIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.post-head{display:flex;align-items:center;gap:10px;padding:14px 16px 10px;position:relative}
.post-av{
  width:38px;height:38px;border-radius:12px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-family:'Syne',sans-serif;font-weight:800;font-size:.88rem;color:#fff;
}
.post-meta{flex:1;min-width:0}
.post-name{font-size:.88rem;font-weight:700;color:var(--text)}
.post-time{font-size:.7rem;color:var(--muted);font-weight:500}
.post-text{padding:0 16px 12px;font-size:.9rem;line-height:1.65;white-space:pre-wrap;word-break:break-word}
.post-media{width:100%}
.post-media img,.post-media video{width:100%;max-height:400px;object-fit:cover;display:block}
.post-reactions{
  display:flex;align-items:center;gap:5px;padding:10px 16px;
  border-top:1.5px solid var(--border);flex-wrap:wrap;background:var(--s2);
}
.react-btn{
  display:flex;align-items:center;gap:4px;padding:5px 10px;border-radius:20px;
  border:1.5px solid var(--border);background:var(--s1);cursor:pointer;font-size:.82rem;
  transition:all .15s;color:var(--muted);font-family:'Plus Jakarta Sans',sans-serif;
  font-weight:500;position:relative;
}
.react-btn:hover{background:var(--s2);transform:scale(1.08);border-color:var(--pink)}
.react-btn.reacted{background:linear-gradient(135deg,rgba(255,61,139,.12),rgba(255,123,58,.12));border-color:var(--pink);color:var(--text)}
.react-btn .cnt{font-size:.72rem;font-weight:700}
.react-tooltip{
  position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);
  background:var(--text);color:var(--bg);border-radius:10px;padding:5px 9px;
  font-size:.72rem;white-space:nowrap;pointer-events:none;opacity:0;transition:opacity .15s;
  z-index:200;min-width:60px;text-align:center;font-weight:500;
}
.react-btn:hover .react-tooltip{opacity:1}
.post-comment-toggle{
  margin-left:auto;padding:5px 11px;border-radius:20px;border:1.5px solid var(--border);
  background:var(--s1);color:var(--muted);cursor:pointer;font-size:.75rem;font-weight:500;
  font-family:'Plus Jakarta Sans',sans-serif;transition:all .15s;display:flex;align-items:center;gap:4px;
}
.post-comment-toggle svg{width:12px;height:12px;fill:none;stroke:currentColor;stroke-width:2.2}
.post-comment-toggle:hover{background:var(--s2);color:var(--text);border-color:var(--cyan)}
.post-comments{border-top:1.5px solid var(--border);padding:12px 16px;display:none;background:var(--s2)}
.post-comments.open{display:block}
.comment-list{display:flex;flex-direction:column;gap:8px;margin-bottom:10px;max-height:200px;overflow-y:auto}
.comment-item{display:flex;gap:8px;align-items:flex-start}
.comment-av{
  width:28px;height:28px;border-radius:9px;flex-shrink:0;display:flex;align-items:center;
  justify-content:center;font-family:'Syne',sans-serif;font-weight:800;font-size:.7rem;color:#fff;
}
.comment-body{flex:1;background:var(--s1);border:1.5px solid var(--border);border-radius:12px;padding:7px 11px}
.comment-author{font-size:.72rem;font-weight:700;color:var(--purple);margin-bottom:2px}
.comment-text{font-size:.82rem;line-height:1.45;color:var(--text)}
.comment-input-row{display:flex;gap:8px}
.comment-input{
  flex:1;padding:8px 13px;background:var(--s1);border:1.5px solid var(--border);border-radius:11px;
  color:var(--text);font-family:'Plus Jakarta Sans',sans-serif;font-size:.82rem;outline:none;
  transition:border-color .2s,box-shadow .2s;
}
.comment-input:focus{border-color:var(--cyan);box-shadow:0 0 0 3px rgba(0,194,212,.1)}
.comment-input::placeholder{color:var(--muted)}
.comment-send{
  padding:8px 15px;border:none;border-radius:11px;background:var(--grad-cool);color:#fff;
  cursor:pointer;font-size:.8rem;font-weight:700;transition:opacity .2s;
}
.comment-send:hover{opacity:.85}

/* ══ PEOPLE ══════════════════════════════════════════ */
#page-people{flex:1;overflow-y:auto;padding:20px;flex-direction:column;align-items:center}
.people-inner{width:100%;max-width:680px}
.people-search-wrap{margin-bottom:16px}
.people-search{
  width:100%;padding:12px 16px;background:var(--s1);border:1.5px solid var(--border);
  border-radius:16px;color:var(--text);font-family:'Plus Jakarta Sans',sans-serif;font-size:.9rem;
  outline:none;transition:border-color .2s,box-shadow .2s;box-shadow:var(--shadow);
}
.people-search:focus{border-color:var(--pink);box-shadow:0 0 0 3px rgba(255,61,139,.1)}
.people-search::placeholder{color:var(--muted)}
.people-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:14px}
.person-card{
  background:var(--s1);border:1.5px solid var(--border);border-radius:20px;padding:20px 14px;
  text-align:center;cursor:pointer;transition:all .22s;position:relative;overflow:hidden;
  box-shadow:var(--shadow);
}
.person-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;opacity:0;transition:opacity .2s}
.person-card:hover{border-color:var(--pink);transform:translateY(-3px);box-shadow:var(--shadow-lg)}
.person-card:hover::before{opacity:1;background:var(--grad-main)}
.person-av-lg{
  width:58px;height:58px;border-radius:18px;margin:0 auto 10px;display:flex;align-items:center;
  justify-content:center;font-family:'Syne',sans-serif;font-weight:900;font-size:1.3rem;color:#fff;
  box-shadow:0 4px 14px rgba(0,0,0,.12);
}
.person-name{font-size:.9rem;font-weight:700;margin-bottom:3px;color:var(--text)}
.person-email{font-size:.72rem;color:var(--muted);margin-bottom:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:500}
.person-chat-btn{
  width:100%;padding:7px;border:none;border-radius:10px;background:var(--grad-main);
  color:#fff;font-family:'Syne',sans-serif;font-weight:800;font-size:.78rem;cursor:pointer;
  transition:opacity .2s,box-shadow .2s;box-shadow:0 2px 10px rgba(255,61,139,.25);
}
.person-chat-btn:hover{opacity:.88;box-shadow:0 4px 15px rgba(255,61,139,.35)}

/* ══ CHAT ════════════════════════════════════════════ */
#page-chat{flex:1;overflow:hidden;position:relative}

/* sidebar */
.chat-sidebar{
  width:276px;flex-shrink:0;background:var(--s1);
  border-right:1.5px solid var(--border);display:flex;flex-direction:column;
}
.cs-head{padding:14px;border-bottom:1.5px solid var(--border);background:var(--s1)}
.cs-head-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.cs-head h3{font-family:'Syne',sans-serif;font-size:.95rem;font-weight:800;color:var(--text)}
.new-group-btn{
  padding:5px 11px;border:none;border-radius:9px;background:var(--grad-cool);
  color:#fff;font-size:.72rem;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;
  font-weight:700;transition:opacity .2s;box-shadow:0 2px 8px rgba(139,92,246,.3);
}
.new-group-btn:hover{opacity:.85}
.cs-search{
  width:100%;padding:8px 13px;background:var(--s2);border:1.5px solid var(--border);
  border-radius:11px;color:var(--text);font-family:'Plus Jakarta Sans',sans-serif;
  font-size:.82rem;outline:none;transition:border-color .2s,box-shadow .2s;
}
.cs-search:focus{border-color:var(--cyan);box-shadow:0 0 0 3px rgba(0,194,212,.1)}
.cs-search::placeholder{color:var(--muted)}
.cs-list{flex:1;overflow-y:auto;padding:8px}
.cs-section-label{
  font-size:.68rem;color:var(--muted);text-transform:uppercase;
  letter-spacing:.08em;padding:6px 8px 4px;font-weight:700;
}
.cs-row{
  display:flex;align-items:center;gap:10px;padding:10px 10px;border-radius:14px;
  cursor:pointer;transition:background .15s;border:1.5px solid transparent;position:relative;
}
.cs-row:hover{background:var(--s2)}
.cs-row.active{background:var(--s2);border-color:var(--border)}
.cs-av{
  width:38px;height:38px;border-radius:12px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-family:'Syne',sans-serif;font-weight:800;font-size:.88rem;color:#fff;
}
.cs-info{flex:1;min-width:0}
.cs-name{font-size:.86rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text)}
.cs-last{font-size:.7rem;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:500}
/* sidebar unread bubble */
.cs-unread{
  min-width:20px;height:20px;border-radius:10px;background:var(--grad-main);
  color:#fff;font-size:.62rem;font-weight:800;
  align-items:center;justify-content:center;padding:0 5px;flex-shrink:0;
  /* same JS trick: display:none by default, set to flex by JS */
  display:none;
  box-shadow:0 2px 8px rgba(255,61,139,.3);
}

/* chat main */
.chat-main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.chat-empty-state{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  color:var(--muted);
  background:
    radial-gradient(ellipse at 30% 40%,rgba(255,61,139,.06) 0%,transparent 55%),
    radial-gradient(ellipse at 70% 60%,rgba(56,189,248,.06) 0%,transparent 55%),
    var(--bg);
}
.chat-empty-state .big-icon{font-size:4.5rem;margin-bottom:14px;opacity:.35}
.chat-empty-state p{font-weight:600;color:var(--muted);font-size:.9rem}
.chat-active{display:none;flex-direction:column;flex:1;overflow:hidden}
.chat-active.on{display:flex}

/* chat header bar */
.chat-head-bar{
  display:flex;align-items:center;gap:10px;padding:11px 16px;
  background:var(--s1);border-bottom:1.5px solid var(--border);flex-shrink:0;
  box-shadow:0 2px 8px rgba(100,80,200,.06);
}
.chat-back-btn{
  display:none;width:32px;height:32px;border-radius:10px;border:1.5px solid var(--border);
  background:var(--s2);color:var(--text);cursor:pointer;align-items:center;justify-content:center;flex-shrink:0;
}
.chat-back-btn svg{width:15px;height:15px;fill:none;stroke:currentColor;stroke-width:2.5}
.chat-back-btn:hover{border-color:var(--pink);color:var(--pink);background:#fff5f8}
.chat-head-info{flex:1;min-width:0}
.chat-head-name{font-family:'Syne',sans-serif;font-weight:800;font-size:.93rem;color:var(--text)}
.chat-head-sub{font-size:.7rem;color:var(--green);font-weight:600}
.call-btns{display:flex;gap:6px;flex-shrink:0}
.call-btn{
  width:36px;height:36px;border-radius:11px;border:1.5px solid var(--border);background:var(--s2);
  color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;
}
.call-btn svg{width:15px;height:15px;fill:none;stroke:currentColor;stroke-width:2.2}
.call-btn:hover{background:var(--grad-green);border-color:transparent;color:#fff;box-shadow:0 3px 12px rgba(18,217,128,.3)}

/* messages */
.msgs-area{
  flex:1;overflow-y:auto;padding:18px;display:flex;flex-direction:column;gap:7px;
  background:
    radial-gradient(ellipse at 0% 100%,rgba(255,61,139,.05) 0%,transparent 45%),
    radial-gradient(ellipse at 100% 0%,rgba(56,189,248,.05) 0%,transparent 45%),
    var(--bg);
}
.msg-row{display:flex;flex-direction:column;max-width:70%;animation:msgPop .18s ease;position:relative}
@keyframes msgPop{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.msg-row.out{align-self:flex-end;align-items:flex-end}
.msg-row.in{align-self:flex-start;align-items:flex-start}
.msg-sender-name{font-size:.68rem;color:var(--purple);margin-bottom:3px;padding:0 4px;font-weight:700}
.msg-bubble-wrap{display:flex;align-items:flex-end;gap:4px;max-width:100%;position:relative}
.msg-row.out .msg-bubble-wrap{flex-direction:row-reverse}
.msg-bubble{
  padding:10px 14px;border-radius:18px;font-size:.87rem;line-height:1.55;
  word-break:break-word;max-width:100%;cursor:pointer;position:relative;
}
.msg-row.out .msg-bubble{
  background:var(--grad-main);border-bottom-right-radius:4px;color:#fff;
  box-shadow:0 3px 14px rgba(255,61,139,.25);
}
.msg-row.in .msg-bubble{
  background:var(--s1);border:1.5px solid var(--border);border-bottom-left-radius:4px;
  box-shadow:0 2px 10px rgba(100,80,200,.08);
}
.msg-img{max-width:220px;border-radius:14px;display:block;cursor:pointer;margin-bottom:2px}
.msg-file-link{color:var(--purple);text-decoration:underline;font-size:.82rem;font-weight:600}
.msg-audio{display:flex;align-items:center;gap:8px;padding:2px 0}
.msg-audio audio{height:32px;max-width:200px;border-radius:8px}
.msg-ts{font-size:.65rem;color:var(--muted);margin-top:3px;padding:0 4px;font-weight:500}
.msg-reactions{display:flex;flex-wrap:wrap;gap:3px;margin-top:3px}
.msg-react-btn{
  display:flex;align-items:center;gap:3px;padding:3px 8px;border-radius:12px;
  border:1.5px solid var(--border);background:var(--s1);cursor:pointer;font-size:.78rem;
  transition:all .15s;position:relative;font-weight:600;
}
.msg-react-btn:hover{border-color:var(--pink);transform:scale(1.06)}
.msg-react-btn.mine{border-color:var(--pink);background:linear-gradient(135deg,rgba(255,61,139,.1),rgba(255,123,58,.1))}
.msg-react-btn .react-tooltip{bottom:calc(100% + 4px);font-size:.68rem}
.msg-react-btn:hover .react-tooltip{opacity:1}
.react-picker{
  position:absolute;bottom:calc(100% + 6px);background:var(--s1);border:1.5px solid var(--border);
  border-radius:16px;padding:8px;display:flex;gap:5px;z-index:300;
  box-shadow:var(--shadow-lg);animation:popIn .15s ease;
}
@keyframes popIn{from{opacity:0;transform:scale(.85)}to{opacity:1;transform:scale(1)}}
.react-picker.out{right:0}
.react-picker.in{left:0}
.react-picker-btn{
  font-size:1.25rem;padding:4px;cursor:pointer;border:none;background:transparent;
  border-radius:8px;transition:transform .1s,background .15s;line-height:1;
}
.react-picker-btn:hover{transform:scale(1.3);background:var(--s2)}

/* upload preview */
.chat-upload-preview{
  padding:8px 16px;background:var(--s2);border-top:1.5px solid var(--border);
  display:none;align-items:center;gap:10px;
}
.chat-upload-preview.show{display:flex}
.cup-thumb{width:44px;height:44px;border-radius:10px;object-fit:cover}
.cup-name{flex:1;font-size:.78rem;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:600}
.cup-rm{background:none;border:none;color:var(--muted);cursor:pointer;font-size:1.1rem}
.cup-progress{width:100%;height:3px;background:var(--border);border-radius:3px;margin-top:4px}
.cup-progress-fill{height:100%;background:var(--grad-main);border-radius:3px;width:0%;transition:width .3s}

/* chat input bar */
.chat-input-bar{
  padding:10px 14px;background:var(--s1);border-top:1.5px solid var(--border);
  display:flex;gap:7px;align-items:flex-end;flex-shrink:0;
}
.chat-icon-btn{
  width:38px;height:38px;border-radius:12px;border:1.5px solid var(--border);background:var(--s2);
  color:var(--muted);cursor:pointer;flex-shrink:0;display:flex;align-items:center;
  justify-content:center;transition:all .2s;
}
.chat-icon-btn:hover{border-color:var(--pink);color:var(--pink);background:#fff5f8}
.chat-icon-btn svg{width:15px;height:15px;fill:none;stroke:currentColor;stroke-width:2}
.chat-icon-btn.recording{background:var(--red);border-color:var(--red);color:#fff;animation:pulse .8s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}
.chat-ta{
  flex:1;padding:10px 14px;background:var(--s2);border:1.5px solid var(--border);border-radius:14px;
  color:var(--text);font-family:'Plus Jakarta Sans',sans-serif;font-size:.88rem;outline:none;
  resize:none;max-height:100px;transition:border-color .2s,box-shadow .2s;line-height:1.4;
}
.chat-ta:focus{border-color:var(--pink);box-shadow:0 0 0 3px rgba(255,61,139,.1)}
.chat-ta::placeholder{color:var(--muted)}
.chat-send-btn{
  width:38px;height:38px;border-radius:12px;border:none;background:var(--grad-main);
  display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;
  transition:transform .1s,opacity .2s,box-shadow .2s;
  box-shadow:0 3px 12px rgba(255,61,139,.3);
}
.chat-send-btn:hover{opacity:.88;box-shadow:0 4px 16px rgba(255,61,139,.4)}
.chat-send-btn:active{transform:scale(.93)}
.chat-send-btn svg{width:15px;height:15px;fill:none;stroke:#fff;stroke-width:2.5}

/* ══ CREATE GROUP MODAL ════════════════════════════════ */
.modal-overlay{
  position:fixed;inset:0;background:rgba(26,21,53,.5);backdrop-filter:blur(4px);
  z-index:400;display:none;align-items:center;justify-content:center;padding:20px;
}
.modal-overlay.on{display:flex}
.modal-box{
  background:var(--s1);border:1.5px solid var(--border);border-radius:26px;
  padding:26px;width:100%;max-width:400px;position:relative;
  box-shadow:var(--shadow-lg);
}
.modal-box::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--grad-cool);border-radius:26px 26px 0 0}
.modal-title{font-family:'Syne',sans-serif;font-weight:800;font-size:1.12rem;margin-bottom:16px;color:var(--text)}
.modal-field{margin-bottom:14px}
.modal-field label{display:block;font-size:.72rem;color:var(--muted);margin-bottom:5px;text-transform:uppercase;letter-spacing:.06em;font-weight:700}
.modal-field input{
  width:100%;padding:11px 14px;background:var(--s2);border:1.5px solid var(--border);
  border-radius:12px;color:var(--text);font-family:'Plus Jakarta Sans',sans-serif;font-size:.9rem;
  outline:none;transition:border-color .2s,box-shadow .2s;
}
.modal-field input:focus{border-color:var(--cyan);box-shadow:0 0 0 3px rgba(0,194,212,.1)}
.member-list{display:flex;flex-direction:column;gap:6px;max-height:200px;overflow-y:auto;margin-bottom:14px}
.member-row{
  display:flex;align-items:center;gap:9px;padding:8px 11px;border-radius:12px;
  cursor:pointer;border:1.5px solid var(--border);transition:all .15s;background:var(--s2);
}
.member-row:hover{background:var(--s3);border-color:var(--purple)}
.member-row.selected{border-color:var(--cyan);background:rgba(0,194,212,.08)}
.member-check{
  width:20px;height:20px;border-radius:6px;border:1.5px solid var(--border);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;
}
.member-row.selected .member-check{background:var(--grad-cool);border-color:transparent;color:#fff;font-size:.75rem;box-shadow:0 2px 8px rgba(0,194,212,.3)}
.modal-actions{display:flex;gap:8px;justify-content:flex-end}
.modal-btn{
  padding:10px 20px;border:none;border-radius:12px;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;
  font-size:.85rem;font-weight:700;transition:opacity .2s,box-shadow .2s;
}
.modal-btn.cancel{background:var(--s2);color:var(--muted);border:1.5px solid var(--border)}
.modal-btn.cancel:hover{background:var(--s3)}
.modal-btn.create{background:var(--grad-cool);color:#fff;box-shadow:0 3px 12px rgba(139,92,246,.3)}
.modal-btn.create:hover{opacity:.88;box-shadow:0 4px 16px rgba(139,92,246,.4)}

/* ══ CALL OVERLAY ══════════════════════════════════════ */
#call-overlay{
  position:fixed;inset:0;z-index:500;
  background:rgba(245,243,255,.97);backdrop-filter:blur(16px);
  display:none;flex-direction:column;align-items:center;justify-content:center;gap:24px;
}
#call-overlay.on{display:flex}
.call-peer-av{
  width:96px;height:96px;border-radius:28px;display:flex;align-items:center;
  justify-content:center;font-family:'Syne',sans-serif;font-weight:900;font-size:2.4rem;color:#fff;
  margin-bottom:4px;box-shadow:0 8px 32px rgba(0,0,0,.18);
}
.call-peer-name{font-family:'Syne',sans-serif;font-weight:800;font-size:1.5rem;color:var(--text)}
.call-status{font-size:.9rem;color:var(--muted);font-weight:600}
.call-video-wrap{display:none;position:relative;width:min(360px,90vw);aspect-ratio:4/3;border-radius:20px;overflow:hidden;background:#000;box-shadow:var(--shadow-lg)}
.call-video-wrap.on{display:block}
#call-remote-video{width:100%;height:100%;object-fit:cover}
#call-local-video{position:absolute;bottom:10px;right:10px;width:90px;aspect-ratio:3/4;object-fit:cover;border-radius:10px;border:2px solid var(--border)}
.call-actions{display:flex;gap:16px}
.call-action-btn{
  width:60px;height:60px;border-radius:50%;border:none;cursor:pointer;display:flex;
  align-items:center;justify-content:center;transition:transform .1s,opacity .2s,box-shadow .2s;
}
.call-action-btn:active{transform:scale(.9)}
.call-action-btn svg{width:22px;height:22px;fill:none;stroke:#fff;stroke-width:2.2}
.call-action-btn.hangup{background:var(--red);box-shadow:0 4px 18px rgba(255,71,87,.4)}
.call-action-btn.accept{background:var(--green);box-shadow:0 4px 18px rgba(18,217,128,.4)}
.call-action-btn.toggle{background:var(--s3);border:1.5px solid var(--border)}
.call-action-btn.toggle.off{background:var(--s2)}
.call-action-btn.toggle svg{stroke:var(--text)}
.call-incoming-text{font-size:.85rem;color:var(--muted);font-weight:600}

/* ══ LIGHTBOX ════════════════════════════════════════ */
.lightbox{position:fixed;inset:0;background:rgba(26,21,53,.95);z-index:999;display:none;align-items:center;justify-content:center;padding:20px}
.lightbox.on{display:flex}
.lightbox img{max-width:100%;max-height:90vh;border-radius:16px;object-fit:contain}
.lightbox-close{
  position:absolute;top:16px;right:16px;width:38px;height:38px;border-radius:50%;
  background:rgba(255,255,255,.15);border:1.5px solid rgba(255,255,255,.2);color:#fff;
  font-size:1.2rem;cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:background .2s;
}
.lightbox-close:hover{background:rgba(255,255,255,.25)}

/* ══ CONFIG BANNER ════════════════════════════════════ */
.cfg-bar{position:fixed;bottom:0;left:0;right:0;z-index:999;background:#fff8f0;border-top:2px solid var(--orange);padding:10px 18px;font-size:.8rem;text-align:center;display:none}
.cfg-bar.on{display:block}
.cfg-bar strong{color:var(--orange)}
.cfg-bar code{background:#fff0e0;padding:1px 5px;border-radius:5px;font-size:.76rem}

/* ══ ERROR MODAL ════════════════════════════════════ */
.err-modal-overlay{position:fixed;inset:0;background:rgba(26,21,53,.5);backdrop-filter:blur(4px);z-index:700;display:none;align-items:center;justify-content:center;padding:20px}
.err-modal-overlay.on{display:flex}
.err-modal-box{
  background:var(--s1);border:1.5px solid rgba(255,71,87,.25);border-radius:26px;
  padding:32px 28px;width:100%;max-width:360px;position:relative;text-align:center;
  box-shadow:var(--shadow-lg);
}
.err-modal-box::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--grad-fire);border-radius:26px 26px 0 0}
.err-modal-icon{font-size:2.4rem;margin-bottom:10px}
.err-modal-title{font-family:'Syne',sans-serif;font-weight:800;font-size:1.08rem;margin-bottom:8px;color:var(--text)}
.err-modal-msg{font-size:.85rem;color:var(--muted);line-height:1.6;margin-bottom:24px;font-weight:500}
.err-modal-ok{
  padding:11px 34px;border:none;border-radius:12px;background:var(--grad-fire);color:#fff;
  font-family:'Syne',sans-serif;font-weight:800;font-size:.9rem;cursor:pointer;
  transition:opacity .2s;box-shadow:0 3px 14px rgba(255,71,87,.3);
}
.err-modal-ok:hover{opacity:.88}

/* ══ OVERFLOW MENU ════════════════════════════════════ */
.overflow-menu{
  position:absolute;background:var(--s1);border:1.5px solid var(--border);border-radius:14px;
  padding:5px;z-index:350;min-width:155px;
  box-shadow:var(--shadow-lg);animation:popIn .14s ease;
}
.overflow-menu-item{
  display:flex;align-items:center;gap:8px;padding:9px 13px;border-radius:10px;cursor:pointer;
  font-size:.83rem;color:var(--text);transition:background .12s;border:none;background:none;
  width:100%;text-align:left;font-family:'Plus Jakarta Sans',sans-serif;white-space:nowrap;font-weight:500;
}
.overflow-menu-item:hover{background:var(--s2)}
.overflow-menu-item.danger{color:var(--red)}
.post-menu-btn{
  background:none;border:none;color:var(--muted);cursor:pointer;font-size:1.15rem;
  padding:2px 8px;border-radius:8px;transition:all .15s;line-height:1;margin-left:auto;opacity:0;
}
.post-card:hover .post-menu-btn{opacity:1}
.post-menu-btn:hover{background:var(--s2);color:var(--text);opacity:1}
.msg-menu-btn{
  background:none;border:none;color:var(--muted);cursor:pointer;font-size:.85rem;
  padding:4px 5px;border-radius:7px;opacity:0;transition:opacity .15s;
  align-self:center;flex-shrink:0;line-height:1;
}
.msg-row:hover .msg-menu-btn{opacity:1}
.msg-menu-btn:hover{background:var(--s2);color:var(--text);opacity:1}

/* ══ MOBILE ══════════════════════════════════════════ */
@media(max-width:640px){
  .nav-tabs .nav-tab span{display:none}
  .nav-tabs{max-width:160px}
  #page-feed{padding:12px}
  .people-grid{grid-template-columns:repeat(2,1fr)}
  #page-chat{display:block}
  .chat-sidebar{position:absolute;inset:0;width:100%;z-index:2;transform:translateX(0);transition:transform .28s cubic-bezier(.4,0,.2,1)}
  .chat-sidebar.away{transform:translateX(-100%)}
  .chat-main{position:absolute;inset:0;width:100%;z-index:2;transform:translateX(100%);transition:transform .28s cubic-bezier(.4,0,.2,1)}
  .chat-main.here{transform:translateX(0)}
  .chat-back-btn{display:flex}
  .msg-row{max-width:85%}
  .msgs-area{padding:12px}
  .chat-input-bar{padding:8px 10px}
  .nav-name{display:none}
  .call-video-wrap{width:95vw}
  .post-menu-btn{opacity:1}
  .msg-menu-btn{opacity:1}
}
</style>
</head>
<body>

<!-- AUTH -->
<div id="auth-screen">
  <div class="auth-wrap">
    <span class="auth-logo">Chaty</span>
    <p class="auth-tagline">Posts · Chat · Groups · Calls — all free</p>
    <div class="auth-card">
      <div class="tabs">
        <button class="tab-btn active" id="tab-in">Login</button>
        <button class="tab-btn" id="tab-up">Sign Up</button>
      </div>
      <div id="form-in">
        <div class="field"><label>Email</label><input type="email" id="in-email" placeholder="you@example.com" autocomplete="email"></div>
        <div class="field"><label>Password</label><input type="password" id="in-pass" placeholder="••••••••" autocomplete="current-password"></div>
        <button class="auth-btn" id="btn-in">Login →</button>
      </div>
      <div id="form-up" style="display:none">
        <div class="field"><label>Name</label><input type="text" id="up-name" placeholder="Your display name" autocomplete="name"></div>
        <div class="field"><label>Email</label><input type="email" id="up-email" placeholder="you@example.com" autocomplete="email"></div>
        <div class="field"><label>Password</label><input type="password" id="up-pass" placeholder="Min 6 characters" autocomplete="new-password"></div>
        <button class="auth-btn" id="btn-up">Create Account →</button>
      </div>
      <div class="a-err" id="a-err"></div>
      <div class="a-ok" id="a-ok"></div>
    </div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <nav class="topnav">
    <span class="nav-logo grad-text">Chaty</span>
    <div class="nav-tabs">
      <button class="nav-tab active" id="ntab-feed" onclick="switchPage('feed')">
        <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
        <span>Feed</span>
        <span class="nav-badge" id="badge-feed"></span>
      </button>
      <button class="nav-tab" id="ntab-people" onclick="switchPage('people')">
        <svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        <span>People</span>
      </button>
      <button class="nav-tab" id="ntab-chat" onclick="switchPage('chat')">
        <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        <span>Chat</span>
        <span class="nav-badge" id="badge-chat"></span>
      </button>
    </div>
    <div class="nav-right">
      <div class="nav-av" id="nav-av"></div>
      <button class="btn-out" id="btn-logout">Logout</button>
    </div>
  </nav>

  <div class="main">
    <!-- FEED PAGE -->
    <div id="page-feed" style="display:none">
      <div class="feed-inner">
        <div class="create-post">
          <div class="cp-top">
            <div class="cp-av" id="cp-av"></div>
            <textarea class="cp-ta" id="cp-ta" placeholder="What's on your mind?" rows="2"></textarea>
          </div>
          <div class="cp-preview" id="cp-preview">
            <img id="cp-prev-img" style="display:none">
            <video id="cp-prev-vid" style="display:none" controls></video>
            <button class="cp-preview-rm" id="cp-prev-rm">✕</button>
          </div>
          <div class="cp-progress" id="cp-progress"><div class="cp-progress-bar"><div class="cp-progress-fill" id="cp-prog-fill"></div></div></div>
          <div class="cp-actions">
            <div class="cp-media-btns">

<script>
(function(){
'use strict';

/* ▼▼ CLOUDINARY CONFIG ▼▼ */
var CLOUDINARY_CLOUD_NAME   = 'diev2dlno';
var CLOUDINARY_UPLOAD_PRESET = 'chaty_uploads';
/* ▲▲ CLOUDINARY CONFIG ▲▲ */

var ADMIN_UIDS = ['UzX7q42S6ZTmSImkCE3eyDPycZQ2'];

var FB, me=null, myName='', myGrad='';
var allUsers=[], chatWith=null, chatWithName='', chatIsGroup=false;
var chatUnsubFn=null, postsUnsub=null;
var chatFilePending=null, mediaRecorder=null, audioChunks=[];
var unreadCounts={}, totalUnread=0, unreadUnsubs={};
var selectedMembers=[];
var feedLoaded=false, newPostCount=0;
/* WebRTC */
var pc=null, localStream=null, callRoomId=null, callIsVideo=false, isCaller=false, callUnsub=null;
var isMuted=false, isCamOff=false;

var GRADS=[
  'linear-gradient(135deg,#ff3d8b,#ff7b3a)',
  'linear-gradient(135deg,#00c2d4,#8b5cf6)',
  'linear-gradient(135deg,#ffcc00,#ff3d8b)',
  'linear-gradient(135deg,#12d980,#00c2d4)',
  'linear-gradient(135deg,#8b5cf6,#ff3d8b)',
  'linear-gradient(135deg,#ff7b3a,#ffcc00)',
  'linear-gradient(135deg,#ff4757,#ff3d8b)',
  'linear-gradient(135deg,#38bdf8,#12d980)'
];
var MSG_REACTIONS=['❤️','🔥','😂','😮','👍','🎉','😢','💯'];
var POST_REACTIONS=['❤️','🔥','😂','😮','👍','🎉'];

function g(id){return document.getElementById(id)}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function grad(uid){var h=0;for(var i=0;i<uid.length;i++)h=((h<<5)-h)+uid.charCodeAt(i);return GRADS[Math.abs(h)%GRADS.length]}
function mob(){return window.innerWidth<=640}
function timeAgo(ts){
  if(!ts)return'';
  var d=ts.toDate?ts.toDate():new Date(ts);
  var s=Math.floor((Date.now()-d)/1000);
  if(s<60)return'just now';if(s<3600)return Math.floor(s/60)+'m ago';
  if(s<86400)return Math.floor(s/3600)+'h ago';return Math.floor(s/86400)+'d ago';
}

function showErrorModal(title, msg){
  g('err-modal-title').textContent = title || 'Something went wrong';
  g('err-modal-msg').textContent   = msg   || 'An unexpected error occurred. Please try again.';
  g('err-modal').classList.add('on');
}

function showOverflowMenu(anchor, items, preferRight){
  document.querySelectorAll('.overflow-menu').forEach(function(m){m.remove()});
  var menu=document.createElement('div');menu.className='overflow-menu';
  items.forEach(function(item){
    var btn=document.createElement('button');
    btn.className='overflow-menu-item'+(item.cls?' '+item.cls:'');
    btn.textContent=item.label;
    btn.addEventListener('click',function(ev){ev.stopPropagation();menu.remove();item.action()});
    menu.appendChild(btn);
  });
  var wrap=anchor.offsetParent||anchor.parentElement;
  menu.style.top=(anchor.offsetTop+anchor.offsetHeight+4)+'px';
  if(preferRight){menu.style.right=(wrap.offsetWidth-anchor.offsetLeft-anchor.offsetWidth)+'px';}
  else{menu.style.left=anchor.offsetLeft+'px';}
  wrap.appendChild(menu);
  setTimeout(function(){
    document.addEventListener('click',function h(){menu.remove();document.removeEventListener('click',h)},{once:true});
  },0);
}

/* ── Boot ─────────────────────────────────────── */
document.addEventListener('fb-ready',function(){
  FB=window.__FB;
  if(!FB){g('cfg-bar').classList.add('on');return}
  wire();
  FB.onAuthStateChanged(FB.auth,function(user){
    if(user){me=user;myName=user.displayName||user.email.split('@')[0];myGrad=grad(user.uid);enterApp();}
    else{me=null;showAuth();}
  });
});

/* ── Wire UI ──────────────────────────────────── */
function wire(){
  g('tab-in').onclick=function(){switchTab('in')};
  g('tab-up').onclick=function(){switchTab('up')};
  g('btn-in').onclick=doLogin;g('btn-up').onclick=doSignup;
  g('in-pass').onkeydown=function(e){if(e.key==='Enter')doLogin()};
  g('up-pass').onkeydown=function(e){if(e.key==='Enter')doSignup()};
  g('btn-logout').onclick=doLogout;
  g('cp-img-btn').onclick=function(){g('cp-file-input').click()};
  g('cp-vid-btn').onclick=function(){g('cp-vid-input').click()};
  g('cp-file-btn').onclick=function(){g('cp-any-input').click()};
  g('cp-file-input').onchange=function(){onPostFileSelect(this.files[0])};
  g('cp-vid-input').onchange=function(){onPostFileSelect(this.files[0])};
  g('cp-any-input').onchange=function(){onPostFileSelect(this.files[0])};
  g('cp-prev-rm').onclick=clearPostFile;
  g('cp-submit').onclick=submitPost;
  g('cp-ta').onkeydown=function(e){if(e.key==='Enter'&&e.ctrlKey){e.preventDefault();submitPost()}};
  g('people-search').oninput=function(){
    var q=this.value.toLowerCase();
    renderPeople(allUsers.filter(function(u){return u.name.toLowerCase().includes(q)||(u.email||'').toLowerCase().includes(q)}));
  };
  g('cs-search').oninput=function(){
    var q=this.value.toLowerCase();
    renderChatList(allUsers.filter(function(u){return u.name.toLowerCase().includes(q)}));
  };
  g('chat-send-btn').onclick=sendChatMsg;
  g('chat-ta').onkeydown=function(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendChatMsg()}};
  g('chat-ta').oninput=function(){this.style.height='auto';this.style.height=Math.min(this.scrollHeight,100)+'px'};
  g('chat-attach-btn').onclick=function(){g('chat-file-input').click()};
  g('chat-file-input').onchange=function(){onChatFileSelect(this.files[0]);this.value=''};
  g('cup-rm').onclick=clearChatFile;
  g('chat-back').onclick=function(){g('chat-sidebar').classList.remove('away');g('chat-main').classList.remove('here')};
  g('chat-mic-btn').onclick=toggleVoiceRecording;
  g('new-group-btn').onclick=openGroupModal;
  g('group-cancel').onclick=closeGroupModal;
  g('group-create').onclick=createGroup;
  g('btn-voice-call').onclick=function(){startCall(false)};
  g('btn-video-call').onclick=function(){startCall(true)};
  g('btn-hangup').onclick=hangup;
  g('btn-accept').onclick=acceptCall;
  g('btn-mute').onclick=toggleMute;
  g('btn-cam').onclick=toggleCam;
  g('lb-close').onclick=function(){g('lightbox').classList.remove('on')};
  g('lightbox').onclick=function(e){if(e.target===this)this.classList.remove('on')};
  g('err-modal-ok').onclick=function(){g('err-modal').classList.remove('on')};
  g('err-modal').onclick=function(e){if(e.target===this)this.classList.remove('on')};
  document.addEventListener('click',function(){
    document.querySelectorAll('.react-picker').forEach(function(p){p.remove()});
  });
}

/* ── Auth ─────────────────────────────────────── */
function switchTab(t){
  g('tab-in').classList.toggle('active',t==='in');
  g('tab-up').classList.toggle('active',t==='up');
  g('form-in').style.display=t==='in'?'block':'none';
  g('form-up').style.display=t==='up'?'block':'none';
  g('a-err').style.display='none';
  g('a-ok').style.display='none';
}
document.addEventListener('DOMContentLoaded',function(){
  var fi=document.getElementById('form-in'),fu=document.getElementById('form-up');
  if(fi)fi.style.display='block';
  if(fu)fu.style.display='none';
});
async function doLogin(){
  var email=g('in-email').value.trim(),pass=g('in-pass').value;
  if(!email||!pass)return setErr('Fill in all fields.');
  g('a-err').style.display='none';
  try{await FB.signInWithEmailAndPassword(FB.auth,email,pass);}
  catch(e){setErr(e.message.replace('Firebase:','').replace(/\(.*\)/,'').trim())}
}
async function doSignup(){
  var name=g('up-name').value.trim(),email=g('up-email').value.trim(),pass=g('up-pass').value;
  if(!name||!email||!pass)return setErr('Fill in all fields.');
  if(pass.length<6)return setErr('Password needs at least 6 characters.');
  g('a-err').style.display='none';
  try{
    var cred=await FB.createUserWithEmailAndPassword(FB.auth,email,pass);
    await FB.updateProfile(cred.user,{displayName:name});
    await FB.setDoc(FB.doc(FB.db,'users',cred.user.uid),{name:name,email:email,uid:cred.user.uid,createdAt:FB.serverTimestamp()});
  }catch(e){setErr(e.message.replace('Firebase:','').replace(/\(.*\)/,'').trim())}
}
async function doLogout(){
  if(postsUnsub)postsUnsub();if(chatUnsubFn)chatUnsubFn();
  if(callUnsub)callUnsub();hangup();
  await FB.signOut(FB.auth);
}
function setErr(m){g('a-err').textContent=m;g('a-err').style.display='block'}

/* ── App entry ────────────────────────────────── */
function showAuth(){g('auth-screen').style.display='flex';g('app').classList.remove('on')}
async function enterApp(){
  g('auth-screen').style.display='none';g('app').classList.add('on');
  var uref=FB.doc(FB.db,'users',me.uid);
  var usnap=await FB.getDoc(uref);
  if(!usnap.exists())await FB.setDoc(uref,{name:myName,email:me.email,uid:me.uid,createdAt:FB.serverTimestamp()});
  g('nav-av').textContent=myName[0].toUpperCase();g('nav-av').style.background=myGrad;
  g('cp-av').textContent=myName[0].toUpperCase();g('cp-av').style.background=myGrad;
  loadAllUsers();
  loadGroupsAtBoot();
  listenIncomingCalls();
  switchPage('feed');
}

/* ── Pages ────────────────────────────────────── */
function switchPage(page){
  ['feed','people','chat'].forEach(function(p){
    g('page-'+p).style.display='none';g('ntab-'+p).classList.remove('active');
  });
  g('page-'+page).style.display='flex';g('ntab-'+page).classList.add('active');
  if(page==='feed'&&!postsUnsub)loadFeed();
  if(page==='people')renderPeople(allUsers);
  if(page==='chat')renderChatList(allUsers);
  if(page==='chat'){totalUnread=0;updateChatBadge();}
  if(page==='feed'){newPostCount=0;updateFeedBadge();}
}
window.switchPage=switchPage;

/* ── Users realtime ───────────────────────────── */
function loadAllUsers(){
  FB.onSnapshot(FB.query(FB.collection(FB.db,'users'),FB.orderBy('name','asc')),function(snap){
    allUsers=[];
    snap.forEach(function(d){if(d.id!==me.uid)allUsers.push(Object.assign({id:d.id},d.data()))});
    allUsers.forEach(function(u){
      var roomId=[me.uid,u.id].sort().join('_');
      listenUnreadForRoom(roomId);
    });
    if(g('page-people').style.display!=='none')renderPeople(allUsers);
    if(g('page-chat').style.display!=='none')renderChatList(allUsers);
  });
}

/* ════ NOTIFICATIONS / BADGES ═══════════════════
   FIX: Use explicit style.display instead of class
   toggling — this forces a repaint on all browsers
   including mobile Safari/WebKit which can silently
   drop class-only display:none→flex transitions.
═════════════════════════════════════════════════ */
function setBadge(el, count){
  if(!el)return;
  if(count>0){
    el.textContent = count>99?'99+':String(count);
    el.style.display='flex';
  } else {
    el.style.display='none';
    el.textContent='';
  }
}
function updateChatBadge(){
  setBadge(g('badge-chat'), totalUnread);
}
function updateFeedBadge(){
  setBadge(g('badge-feed'), newPostCount);
}

function listenUnreadForRoom(roomId){
  if(unreadUnsubs[roomId])return;
  var q=FB.query(
    FB.collection(FB.db,'chats/'+roomId+'/messages'),
    FB.orderBy('createdAt','desc'),
    FB.limit(100)
  );
  unreadUnsubs[roomId]=FB.onSnapshot(q,function(snap){
    var count=0;
    if(chatWith!==roomId){
      snap.forEach(function(d){
        var m=d.data();
        if(m.from!==me.uid&&m.read===false)count++;
      });
    }
    unreadCounts[roomId]=count;
    totalUnread=Object.values(unreadCounts).reduce(function(a,b){return a+b},0);
    updateChatBadge();
    // sidebar row badge
    var row=document.querySelector('[data-room="'+roomId+'"]');
    if(row){
      var badge=row.querySelector('.cs-unread');
      if(badge) setBadge(badge, count);
    }
  });
}

async function markRoomRead(roomId){
  unreadCounts[roomId]=0;
  totalUnread=Object.values(unreadCounts).reduce(function(a,b){return a+b},0);
  updateChatBadge();
  var row=document.querySelector('[data-room="'+roomId+'"]');
  if(row){var b=row.querySelector('.cs-unread');if(b)setBadge(b,0);}
  try{
    var snap=await FB.getDocs(FB.query(
      FB.collection(FB.db,'chats/'+roomId+'/messages'),
      FB.orderBy('createdAt','desc'),
      FB.limit(100)
    ));
    var batch=[];
    snap.forEach(function(d){
      var m=d.data();
      if(m.from!==me.uid&&m.read===false)
        batch.push(FB.updateDoc(FB.doc(FB.db,'chats/'+roomId+'/messages',d.id),{read:true}));
    });
    if(batch.length)await Promise.all(batch);
  }catch(e){/* non-critical */}
}

/* ════ FEED ══════════════════════════════════════ */
function loadFeed(){
  feedLoaded=false;
  var q=FB.query(FB.collection(FB.db,'posts'),FB.orderBy('createdAt','desc'),FB.limit(50));
  postsUnsub=FB.onSnapshot(q,function(snap){
    if(feedLoaded && g('page-feed').style.display==='none'){
      var added=snap.docChanges().filter(function(c){return c.type==='added'}).length;
      if(added>0){newPostCount+=added;updateFeedBadge();}
    }
    feedLoaded=true;
    var posts=[];snap.forEach(function(d){posts.push(Object.assign({id:d.id},d.data()))});
    renderFeed(posts);
  });
}
function renderFeed(posts){
  var el=g('posts-list');
  if(!posts.length){el.innerHTML='<p style="text-align:center;color:var(--muted);padding:40px;font-size:.88rem;font-weight:500">No posts yet. Be the first! 🎉</p>';return}
  el.innerHTML='';posts.forEach(function(p){el.appendChild(buildPostCard(p))});
}
function buildPostCard(p){
  var div=document.createElement('div');div.className='post-card';div.dataset.pid=p.id;
  var uname=p.authorName||'User',ug=grad(p.authorId||'x');
  var reactions=p.reactions||{};
  var canDelete=(p.authorId===me.uid||ADMIN_UIDS.includes(me.uid));
  var reactionBtns=POST_REACTIONS.map(function(emoji){
    var arr=reactions[emoji]||[];
    var cnt=arr.length;
    var reacted=arr.includes(me.uid);
    var names=arr.map(function(uid){
      var u=allUsers.find(function(x){return x.id===uid});
      return u?u.name:uid.slice(0,6);
    }).join(', ');
    return '<button class="react-btn'+(reacted?' reacted':'')+'" data-emoji="'+emoji+'" data-pid="'+p.id+'">'
      +'<span>'+emoji+'</span>'+(cnt?'<span class="cnt">'+cnt+'</span>':'')
      +(names?'<span class="react-tooltip">'+esc(names)+'</span>':'')
      +'</button>';
  }).join('');
  var mediaHtml='';
  if(p.mediaUrl){
    var t=p.mediaType||'';
    if(t.startsWith('video'))mediaHtml='<div class="post-media"><video src="'+esc(p.mediaUrl)+'" controls preload="metadata"></video></div>';
    else if(t.startsWith('image'))mediaHtml='<div class="post-media"><img src="'+esc(p.mediaUrl)+'" loading="lazy" style="cursor:pointer" data-lb="'+esc(p.mediaUrl)+'"></div>';
    else mediaHtml='<div style="padding:8px 16px"><a class="msg-file-link" href="'+esc(p.mediaUrl)+'" target="_blank" rel="noopener">📎 Download attachment</a></div>';
  }
  div.innerHTML='<div class="post-head">'
    +'<div class="post-av" style="background:'+ug+'">'+uname[0].toUpperCase()+'</div>'
    +'<div class="post-meta"><div class="post-name">'+esc(uname)+'</div><div class="post-time">'+timeAgo(p.createdAt)+'</div></div>'
    +(canDelete?'<button class="post-menu-btn" title="More options">⋯</button>':'')
    +'</div>'
    +(p.text?'<div class="post-text">'+esc(p.text)+'</div>':'')
    +mediaHtml
    +'<div class="post-reactions">'+reactionBtns
    +'<button class="post-comment-toggle" data-pid="'+p.id+'"><svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>'+(p.commentCount||0?p.commentCount:'')+'</button></div>'
    +'<div class="post-comments" id="comments-'+p.id+'"><div class="comment-list" id="clist-'+p.id+'"></div>'
    +'<div class="comment-input-row"><input class="comment-input" id="cinput-'+p.id+'" placeholder="Write a comment…">'
    +'<button class="comment-send" data-pid="'+p.id+'">Send</button></div></div>';

  div.querySelectorAll('.react-btn').forEach(function(btn){
    btn.addEventListener('click',function(e){e.stopPropagation();togglePostReaction(btn.dataset.pid,btn.dataset.emoji)});
  });
  div.querySelector('.post-comment-toggle').addEventListener('click',function(){toggleComments(p.id)});
  div.querySelector('.comment-send').addEventListener('click',function(){postComment(p.id)});
  div.querySelector('#cinput-'+p.id).addEventListener('keydown',function(e){if(e.key==='Enter')postComment(p.id)});
  div.querySelectorAll('[data-lb]').forEach(function(img){img.addEventListener('click',function(){openLightbox(img.dataset.lb)})});

  if(canDelete){
    var menuBtn=div.querySelector('.post-menu-btn');
    menuBtn.addEventListener('click',function(e){
      e.stopPropagation();
      showOverflowMenu(menuBtn,[
        {label:'🗑️ Delete post',cls:'danger',action:function(){deletePost(p.id,p.mediaUrl||null)}}
      ],true);
    });
  }
  return div;
}
async function togglePostReaction(pid,emoji){
  var pref=FB.doc(FB.db,'posts',pid);
  var snap=await FB.getDoc(pref);if(!snap.exists())return;
  var reactions=snap.data().reactions||{};
  var arr=reactions[emoji]||[];
  var update={};
  if(arr.includes(me.uid))update['reactions.'+emoji]=FB.arrayRemove(me.uid);
  else update['reactions.'+emoji]=FB.arrayUnion(me.uid);
  await FB.updateDoc(pref,update);
}
function toggleComments(pid){
  var el=g('comments-'+pid);el.classList.toggle('open');
  if(el.classList.contains('open'))loadComments(pid);
}
async function loadComments(pid){
  var el=g('clist-'+pid);el.innerHTML='<div class="spin" style="margin:8px auto;width:14px;height:14px"></div>';
  var q=FB.query(FB.collection(FB.db,'posts/'+pid+'/comments'),FB.orderBy('createdAt','asc'));
  var snap=await FB.getDocs(q);el.innerHTML='';
  snap.forEach(function(d){
    var c=d.data();var item=document.createElement('div');item.className='comment-item';
    item.innerHTML='<div class="comment-av" style="background:'+grad(c.authorId||'x')+'">'+((c.authorName||'U')[0].toUpperCase())+'</div>'
      +'<div class="comment-body"><div class="comment-author">'+esc(c.authorName||'User')+'</div><div class="comment-text">'+esc(c.text)+'</div></div>';
    el.appendChild(item);
  });
  el.scrollTop=el.scrollHeight;
}
async function postComment(pid){
  var input=g('cinput-'+pid),text=input.value.trim();if(!text)return;input.value='';
  await FB.addDoc(FB.collection(FB.db,'posts/'+pid+'/comments'),{text:text,authorId:me.uid,authorName:myName,createdAt:FB.serverTimestamp()});
  await FB.updateDoc(FB.doc(FB.db,'posts',pid),{commentCount:FB.increment(1)}).catch(function(){});
  loadComments(pid);
}
async function deletePost(pid, mediaUrl){
  if(!confirm('Delete this post? This cannot be undone.'))return;
  try{
    await FB.deleteDoc(FB.doc(FB.db,'posts',pid));
  }catch(e){showErrorModal('Delete failed',e.message||'Could not delete the post. Please try again.')}
}

/* post file */
function onPostFileSelect(file){
  if(!file)return;window._postFileData=file;
  var prev=g('cp-preview'),img=g('cp-prev-img'),vid=g('cp-prev-vid');
  img.style.display='none';vid.style.display='none';
  if(file.type.startsWith('image')){img.src=URL.createObjectURL(file);img.style.display='block';}
  else if(file.type.startsWith('video')){vid.src=URL.createObjectURL(file);vid.style.display='block';}
  prev.style.display='block';
}
function clearPostFile(){
  window._postFileData=null;g('cp-preview').style.display='none';
  g('cp-prev-img').src='';g('cp-prev-vid').src='';
  g('cp-file-input').value='';g('cp-vid-input').value='';g('cp-any-input').value='';
}
async function submitPost(){
  var text=g('cp-ta').value.trim();
  if(!text&&!window._postFileData)return;
  g('cp-submit').disabled=true;
  try{
    var mediaUrl=null,mediaType=null;
    if(window._postFileData){
      g('cp-progress').style.display='block';
      var res=await uploadFile(window._postFileData,function(pct){g('cp-prog-fill').style.width=pct+'%'});
      mediaUrl=res.url;mediaType=window._postFileData.type;
      g('cp-progress').style.display='none';clearPostFile();
    }
    await FB.addDoc(FB.collection(FB.db,'posts'),{text:text||'',authorId:me.uid,authorName:myName,
      mediaUrl:mediaUrl||null,mediaType:mediaType||null,reactions:{},commentCount:0,createdAt:FB.serverTimestamp()});
    g('cp-ta').value='';
  }catch(e){
    g('cp-progress').style.display='none';
    showErrorModal('Post failed',e.message||'Could not create the post. Please try again.');
  }finally{
    g('cp-submit').disabled=false;
  }
}
